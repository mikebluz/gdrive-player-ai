<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artwork</title>
  <link rel="stylesheet" href="css/artwork.css" />
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-home">Mike Luz</a>
    <h1 class="page-title">Artwork</h1>

    <div class="artwork-grid" id="artwork-grid"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" alt="" />
  </div>

  <script>
    (async function loadArtwork() {
      const grid = document.getElementById('artwork-grid');
      let images = [];
      try {
        const res = await fetch('artwork/manifest.json', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data?.images)) images = data.images;
        }
      } catch (e) {
        // No manifest or invalid — fall through to empty state
      }

      if (images.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            No artwork yet. Drop image files into the
            <code>artwork/</code> folder and add them to
            <code>artwork/manifest.json</code>.
          </div>
        `;
        return;
      }

      // Fisher-Yates shuffle so the grid order varies each visit.
      for (let i = images.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [images[i], images[j]] = [images[j], images[i]];
      }

      images.forEach(entry => {
        // Allow both plain string filenames and {file, title, alt} objects.
        const file  = (typeof entry === 'string') ? entry : entry?.file;
        const title = (typeof entry === 'object') ? entry?.title : null;
        const alt   = (typeof entry === 'object') ? (entry?.alt || title || file) : file;
        if (!file) return;

        const card = document.createElement('div');
        card.className = 'artwork-card';

        const img = document.createElement('img');
        img.src = 'artwork/' + file;
        img.alt = alt || '';
        img.loading = 'lazy';
        card.appendChild(img);

        if (title) {
          const cap = document.createElement('div');
          cap.className = 'artwork-card-title';
          cap.textContent = title;
          card.appendChild(cap);
        }

        card.addEventListener('click', () => openLightbox(img.src, alt));
        grid.appendChild(card);
      });
    })();

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || '';
      lightbox.classList.add('open');
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
    }
    lightbox.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
    });
  </script>
</body>
</html>
