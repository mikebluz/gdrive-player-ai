<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (max-width: 700px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .grid {
        flex: none;
        grid-auto-rows: minmax(70px, 1fr);
        min-height: 55vh;
      }
      .grid-control-row2 {
        flex-basis: 100%;
      }
      /* Grid panel needs to wrap so its rows of controls fit a narrow
         viewport without overflowing the side. */
      .grid-settings-panel {
        width: calc(100vw - 16px);
        max-width: calc(100vw - 16px);
      }
      .grid-control { flex-wrap: wrap; }
      .grid-control select#scale-select { width: 100%; min-width: 90px; }
      .grid-control input[type=range] { flex: 1 1 80px; min-width: 60px; width: auto; }
    }

    /* MENU BAR */
    .menubar {
      background: #000;
      border-bottom: 3px solid #000;
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      padding: 10px 20px 10px 10px;
      gap: 12px;
      position: relative;
      overflow-x: auto;
    }
    .menubar > * { flex-shrink: 0; }

    .tone-panel {
      display: none;
      flex-direction: column;
      gap: 6px;
      position: absolute;
      top: calc(100% + 4px);
      right: 10px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 10px;
      padding: 10px;
      z-index: 9000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      min-width: 160px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .tone-panel.open { display: flex; }
    .tone-opt {
      padding: 6px 14px;
      border: 1px solid #2d2d3f;
      border-radius: 8px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
    }
    .tone-opt:hover { border-color: #4299e1; color: #4299e1; }

    /* Global FX panel — three slider rows for reverb / delay / distortion.
       Same panel chrome as the tone dropdown so the menubar feels uniform. */
    .fx-panel {
      display: none;
      flex-direction: column;
      gap: 10px;
      position: absolute;
      top: calc(100% + 4px);
      right: 10px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 10px;
      padding: 12px 14px;
      z-index: 9000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      min-width: 220px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .fx-panel.open { display: flex; }
    .fx-control { display: flex; flex-direction: column; gap: 4px; }
    .fx-control-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-family: 'Segoe UI', sans-serif; font-size: 0.75rem;
      color: #a0aec0;
    }
    .fx-val { color: #e2e8f0; font-weight: 600; }
    .fx-control input[type=range] { width: 100%; accent-color: #4299e1; }
    .fx-group-label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #4a4a6a;
      margin: 4px 0 -2px;
    }
    .fx-group-label:first-child { margin-top: 0; }
    .fx-actions { display: flex; justify-content: flex-end; margin-top: 4px; }
    .fx-reset {
      padding: 4px 12px;
      border: 1px solid #2d2d3f;
      border-radius: 12px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .fx-reset:hover { border-color: #4299e1; color: #4299e1; }

    .grid-settings-panel {
      display: none;
      flex-direction: column;
      gap: 10px;
      position: absolute;
      top: calc(100% + 4px);
      right: 10px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 10px;
      padding: 14px;
      z-index: 9000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-width: calc(100vw - 20px);
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      box-sizing: border-box;
    }
    .grid-settings-panel.open { display: flex; }

    .menubar a {
      color: #a0aec0;
      text-decoration: none;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s;
      margin-right: 4px;
    }
    .menubar a:hover { color: #4299e1; }

    .menubar-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .menubar-toggle input { cursor: pointer; }

    .menu-btn {
      width: 38px;
      height: 38px;
      min-width: 38px;
      min-height: 38px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    #play-btn {
      background: #000;
      color: #00bfff;
      border: 2px solid #00bfff;
      box-shadow: 0 0 12px rgba(0, 191, 255, 0.45);
    }
    #play-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(0, 191, 255, 0.7);
    }


    .tempo-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* Transport cluster — Play, Loop, BPM, Clear stay glued together so the
       Clear button always sits on the same row as the BPM slider, even
       when the footer wraps on narrow screens. */
    .footer-transport {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: nowrap;
    }
    #tempo-slider {
      width: 90px;
      min-width: 60px;
      accent-color: #00bfff;
      flex-shrink: 1;
      touch-action: manipulation;
    }
    @media (hover: none) and (pointer: coarse) {
      /* Bigger thumb + taller hit area so a fingertip can grab and drag the
         slider on touch devices. iOS in particular makes the native thumb
         too small to scrub at 90px width. */
      #tempo-slider {
        height: 32px;
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
      }
      #tempo-slider::-webkit-slider-runnable-track {
        height: 4px;
        background: #2d2d3f;
        border-radius: 2px;
      }
      #tempo-slider::-moz-range-track {
        height: 4px;
        background: #2d2d3f;
        border-radius: 2px;
      }
      #tempo-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--bpm-thumb, #00bfff);
        margin-top: -8px;
        border: none;
      }
      #tempo-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--bpm-thumb, #00bfff);
        border: none;
      }
    }
    #tempo-input {
      width: 52px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.85rem;
      font-family: 'Segoe UI', sans-serif;
      padding: 3px 6px;
      text-align: center;
    }
    #tempo-input:focus { outline: none; border-color: #00bfff; }
    .tempo-unit {
      color: #a0aec0;
      font-size: 0.8rem;
      font-family: 'Segoe UI', sans-serif;
    }

    .grid-control {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .grid-control label {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .grid-control input[type=number],
    .grid-control select {
      width: 54px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.8rem;
      font-family: 'Segoe UI', sans-serif;
      padding: 3px 6px;
      text-align: center;
    }
    .grid-control input[type=number]:focus,
    .grid-control select:focus { outline: none; border-color: #4299e1; }
    .grid-control select#scale-select { width: 110px; }
    .grid-control input[type=range] {
      width: 80px;
      accent-color: #4299e1;
    }

    .cell.out-of-scale {
      background: #000 !important;
      pointer-events: none;
    }
    .cell.out-of-scale span,
    .cell.out-of-scale .cell-sound-select { visibility: hidden; }

    #colors-menu-btn {
      padding: 6px 14px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #colors-menu-btn:hover { border-color: #4299e1; color: #4299e1; }
    #colors-menu-btn.open { border-color: #4299e1; color: #4299e1; background: rgba(66,153,225,0.12); }

    .colors-panel {
      display: none;
      flex-direction: column;
      gap: 6px;
      position: absolute;
      top: calc(100% + 4px);
      left: 10px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 10px;
      padding: 10px;
      z-index: 9000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      min-width: 160px;
    }
    .colors-panel.open { display: flex; }
    .colors-opt {
      padding: 6px 14px;
      border: 1px solid #2d2d3f;
      border-radius: 8px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
    }
    .colors-opt:hover { border-color: #4299e1; color: #4299e1; }

    /* Voices menu — same pill + panel styling as Colors, listing saved
       Voices (note grid presets) fetched from Drive on open. */
    #voices-menu-btn {
      padding: 6px 14px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #voices-menu-btn:hover { border-color: #4299e1; color: #4299e1; }
    #voices-menu-btn.open  { border-color: #4299e1; color: #4299e1; background: rgba(66,153,225,0.12); }

    /* "New" button — pinned to the right edge of the menubar so it always
       sits at the top-right of the page. Greenish accent so it reads as a
       create action, distinct from the blue dropdowns next to it. */
    #new-project-btn {
      margin-left: auto;
      padding: 6px 14px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #new-project-btn:hover { border-color: #38a169; color: #68d391; }
    .voices-panel {
      display: none;
      flex-direction: column;
      gap: 6px;
      position: absolute;
      top: calc(100% + 4px);
      left: 10px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 10px;
      padding: 10px;
      z-index: 9000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      min-width: 200px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .voices-panel.open { display: flex; }
    .voice-opt {
      padding: 6px 12px;
      border: 1px solid #2d2d3f;
      border-radius: 8px;
      background: transparent;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: all 0.15s ease;
    }
    .voice-opt:hover { border-color: #4299e1; color: #4299e1; }
    .voice-opt-project {
      font-size: 0.7rem;
      font-weight: 500;
      color: #4a4a6a;
      letter-spacing: 0.5px;
    }
    .voice-loading, .voice-empty {
      color: #4a4a6a;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      padding: 6px 4px;
      text-align: center;
    }

    .grid-state-row {
      display: flex; flex-direction: column; align-items: stretch; gap: 6px;
      border-top: 1px solid #2d2d3f; padding-top: 10px;
    }
    .grid-state-row label { color: #a0aec0; font-size: 0.78rem; }
    #grid-state-select {
      width: 100%;
      padding: 4px 8px;
      background: #0a0a14;
      border: 1px solid #2d2d3f;
      border-radius: 6px;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
    }
    .grid-state-actions { display: flex; gap: 6px; }
    .grid-state-actions button {
      flex: 1;
      padding: 5px 10px;
      background: transparent;
      border: 1px solid #2d2d3f;
      border-radius: 6px;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .grid-state-actions button:hover { border-color: #4299e1; color: #4299e1; }
    .grid-state-actions #grid-state-delete-btn:hover { border-color: #e53e3e; color: #e53e3e; }
    .grid-state-actions button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* NOTE GRID */
    /* Slim clickable banners above the note grid that double as menu
       triggers — Scale + Tone share a row, FX sits below. Each half opens
       its corresponding settings panel and reflects the current value where
       applicable. Updated by updateScaleBanner() whenever the underlying
       state changes. */
    .banner-row {
      display: flex;
      flex-shrink: 0;
      background: #050510;
      border-bottom: 1px solid #1a1a2e;
    }
    .banner-row--fx { border-bottom: 1px solid #1a1a2e; }
    .banner-half {
      flex: 1;
      padding: 6px 12px;
      background: transparent;
      border: none;
      border-right: 1px solid #1a1a2e;
      color: #4fd1c5;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .banner-half:last-child { border-right: none; }
    .banner-half::after {
      content: ' ▾';
      font-size: 0.65rem;
      margin-left: 4px;
      color: #2d8478;
      transition: color 0.15s ease;
      display: inline-block;
    }
    @media (hover: hover) {
      .banner-half:hover { background: #0a0a14; color: #81e6d9; }
      .banner-half:hover::after { color: #81e6d9; }
    }
    .banner-half.open {
      background: #0a0a14;
      color: #81e6d9;
    }
    .banner-half.open::after {
      content: ' ▴';
      color: #81e6d9;
    }
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(70px, 1fr);
      min-height: 0;
      overflow-y: auto;
    }

    .cell {
      border: 3px solid #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.08s ease;
      user-select: none;
      position: relative;
    }

    .cell-sound-select {
      position: absolute;
      bottom: 5px;
      left: 5px;
      background: rgba(0,0,0,0.35);
      border: none;
      border-radius: 4px;
      color: rgba(255,255,255,0.8);
      font-size: 0.6rem;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
      padding: 2px 4px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      z-index: 1;
      outline: none;
    }
    .cell-sound-select:focus { background: rgba(0,0,0,0.6); }
    .cell:active        { filter: brightness(0.75); }
    .cell.flash         { filter: brightness(1.35); }
    .cell.active-loop   { filter: brightness(1.25); outline: 4px solid #fff inset; }

    .cell span {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(2.25rem, 6vw, 3.3rem);
      font-weight: 900;
      color: rgba(0,0,0,0.35);
      letter-spacing: 1px;
      pointer-events: none;
    }
    .cell .cell-freq {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: rgba(0,0,0,0.45);
    }

    .cell:nth-child(12n+1)  { background: #e63946; }
    .cell:nth-child(12n+2)  { background: #f4a261; }
    .cell:nth-child(12n+3)  { background: #e9c46a; }
    .cell:nth-child(12n+4)  { background: #2a9d8f; }
    .cell:nth-child(12n+5)  { background: #457b9d; }
    .cell:nth-child(12n+6)  { background: #9b5de5; }
    .cell:nth-child(12n+7)  { background: #f15bb5; }
    .cell:nth-child(12n+8)  { background: #00bbf9; }
    .cell:nth-child(12n+9)  { background: #06d6a0; }
    .cell:nth-child(12n+10) { background: #ffbe0b; }
    .cell:nth-child(12n+11) { background: #fb5607; }
    .cell:nth-child(12n)    { background: #8338ec; }

    /* REST BAR */
    :root { --rest-color: hsl(280, 55%, 78%); }
    .rest-bar {
      height: 56px;
      min-height: 56px;
      background: #000;
      border-top: 3px solid var(--rest-color);
      border-bottom: 3px solid var(--rest-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.08s ease;
    }
    .rest-bar:active      { background: #1a1a2e; }
    .rest-bar.flash       { background: #2d2d3f; }
    .rest-bar.active-loop { background: #1a1a2e; outline: 3px solid var(--rest-color) inset; }
    .rest-bar span {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--rest-color);
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* SEQUENCE DISPLAY */
    .sequence-display {
      min-height: 62px;
      max-height: 140px;
      background: #0a0a14;
      border-bottom: 3px solid #000;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      align-items: center;
      padding: 8px 14px;
      gap: 6px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2d2d3f #0a0a14;
    }
    .sequence-display::-webkit-scrollbar { width: 4px; }
    .sequence-display::-webkit-scrollbar-track { background: #0a0a14; }
    .sequence-display::-webkit-scrollbar-thumb { background: #2d2d3f; border-radius: 2px; }
    /* Grid layout: fixed N columns. Chips drop their explicit pixel width
       and stretch to fill their grid cell. Triggered by JS setting both the
       class and the --grid-cols custom property. */
    .sequence-display.grid-mode {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols, 16), 1fr);
      align-items: stretch;
      max-height: none;
    }
    .sequence-display.grid-mode .seq-step { width: auto; }
    /* Empty pattern slot used while step-mode is on. */
    .seq-step.empty-slot {
      background: rgba(45, 45, 63, 0.35);
      border: 1px dashed #2d2d3f;
      color: #4a4a6a;
      cursor: pointer;
    }
    .seq-step.empty-slot:hover { border-color: #4299e1; color: #4299e1; }
    /* Highlight the currently-armed grid cell while step-mode is on. */
    .cell.step-mode-armed {
      outline: 2px solid #f6ad55;
      outline-offset: -2px;
      box-shadow: 0 0 12px rgba(246, 173, 85, 0.6);
    }

    .seq-empty {
      color: #2d2d3f;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      white-space: nowrap;
      pointer-events: none;
    }

    .seq-step {
      width: 80px;
      height: 38px;
      border-radius: 8px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: #a0aec0;
      user-select: none;
      cursor: grab;
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
      white-space: pre-line;
      text-align: center;
      transition: all 0.1s ease;
    }
    .seq-step.rest { color: #4a4a6a; }

    .seq-cursor {
      width: 4px;
      height: 38px;
      background: #68d391;
      border-radius: 2px;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(104, 211, 145, 0.7);
      animation: seqCursorPulse 1.1s ease-in-out infinite;
    }
    @keyframes seqCursorPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    .seq-step.subseq {
      border-color: #68d391;
      color: #68d391;
      background: rgba(104, 211, 145, 0.08);
    }
    .seq-step.active {
      background: linear-gradient(135deg, #d91e7c, #f472b6);
      border-color: #f472b6;
      color: #fff;
      transform: scale(1.1);
      box-shadow: 0 0 14px rgba(244, 114, 182, 0.55);
    }
    /* Click-selected step — distinguishes "the step I'm editing" from "the
       step currently playing". Cyan double-outline pairs with the play
       button color but doesn't fight the magenta active highlight. */
    .seq-step.selected:not(.active) {
      outline: 2px solid #00bfff;
      outline-offset: -3px;
      box-shadow: 0 0 12px rgba(0, 191, 255, 0.45);
    }
    .seq-step.subseq.active {
      background: linear-gradient(135deg, #38a169, #68d391);
      border-color: #68d391;
      color: #fff;
    }

    #subedit-banner {
      display: none;
      align-items: center;
      gap: 12px;
      margin: 6px 8px 0;
      padding: 6px 12px;
      background: rgba(104, 211, 145, 0.12);
      border: 1px solid #68d391;
      border-radius: 8px;
      color: #68d391;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
    }
    #subedit-banner.open { display: flex; }
    #subedit-cancel {
      margin-left: auto;
      padding: 4px 12px;
      border: 1px solid #68d391;
      background: transparent;
      color: #68d391;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #subedit-cancel:hover { background: rgba(104, 211, 145, 0.15); }

    /* FOOTER */
    .footer-bar {
      min-height: 48px;
      background: #000;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      padding: 6px 20px;
      gap: 10px;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    /* Stretch buttons (and select-bearing labels) to share row width. The
       group label stays auto-sized so it doesn't grow with the rest. */
    .btn-group--seq > button {
      flex: 1 1 80px;
    }
    .btn-group--step > *:not(.btn-group-label) {
      flex: 1 1 80px;
    }
    .btn-group--step .note-length-label {
      justify-content: space-between;
    }
    .btn-group--step .note-length-label select {
      flex: 1 1 auto;
    }
    .btn-group + .btn-group {
      padding-left: 12px;
      margin-left: 2px;
      border-left: 1px solid #2d2d3f;
    }
    @media (max-width: 700px) {
      .btn-group + .btn-group {
        padding-left: 0;
        margin-left: 0;
        border-left: none;
      }
    }

    /* Step controls cluster — its own row above the play button, framed
       with a thin teal border so it reads as a coherent group apart from
       the transport / sequence controls. */
    .btn-group--step {
      flex-basis: 100%;
      padding: 6px 12px;
      border: 1px solid rgba(79, 209, 197, 0.45);
      border-radius: 12px;
      background: rgba(79, 209, 197, 0.05);
    }
    .btn-group--step + .btn-group {
      border-left: none;
      padding-left: 0;
      margin-left: 0;
    }
    .btn-group-label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #4fd1c5;
      padding-right: 4px;
    }
    .btn-group--step #chord-btn {
      border-color: #4fd1c5;
      color: #81e6d9;
    }
    .btn-group--step #chord-btn:hover {
      border-color: #81e6d9;
      color: #b2f5ea;
    }
    .btn-group--step #chord-btn.active {
      border-color: #9f7aea;
      background: linear-gradient(135deg, #553c9a, #9f7aea);
      color: #fff;
      box-shadow: 0 0 14px rgba(159, 122, 234, 0.55);
    }
    .btn-group--step.chord-active {
      border-color: #9f7aea;
      background: rgba(159, 122, 234, 0.10);
    }
    .btn-group--step.chord-active .btn-group-label {
      color: #d6bcfa;
    }
    /* Highlight the Step section while a chip is selected — clicking a grid
       cell will retune the selected step rather than appending a new one,
       so the pink outline signals "you're editing, not creating". */
    .btn-group--step.step-selected {
      border-color: #ed64a6;
      background: rgba(237, 100, 166, 0.10);
    }
    .btn-group--step.step-selected .btn-group-label { color: #fbb6ce; }
    .btn-group--step .note-length-label { color: #81e6d9; }
    .btn-group--step #note-length,
    .btn-group--step #subdivision-select,
    .btn-group--step #grid-cols-select {
      border-color: #4fd1c5;
      color: #b2f5ea;
      background: #1a1a2e;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 0.8rem;
      font-family: 'Segoe UI', sans-serif;
    }
    .btn-group--step #note-length:focus,
    .btn-group--step #subdivision-select:focus,
    .btn-group--step #grid-cols-select:focus {
      border-color: #81e6d9;
    }
    .btn-group--step #step-mode-btn {
      padding: 4px 14px;
      border: 1px solid #4fd1c5;
      border-radius: 16px;
      background: transparent;
      color: #81e6d9;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-group--step #step-mode-btn:hover {
      border-color: #81e6d9;
      color: #b2f5ea;
    }
    .btn-group--step #step-mode-btn.active {
      background: rgba(79, 209, 197, 0.18);
      border-color: #81e6d9;
      color: #b2f5ea;
      box-shadow: 0 0 12px rgba(79, 209, 197, 0.4);
    }
    .btn-group--step .step-multi-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #81e6d9;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      padding: 0 6px;
    }
    .btn-group--step .step-multi-toggle input { cursor: pointer; }

    /* Undo toast — fades in at the top of the page when an action is undone. */
    #undo-toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: #1a1a2e;
      border: 1px solid #00bfff;
      color: #00bfff;
      padding: 9px 18px;
      border-radius: 999px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 6px 20px rgba(0, 191, 255, 0.25);
    }
    #undo-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #clear-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #clear-btn:hover { border-color: #e53e3e; color: #e53e3e; }

    #save-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #save-btn:hover { border-color: #4299e1; color: #4299e1; }
    #save-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #save-btn.flash-confirm { border-color: #68d391; color: #68d391; }
    /* Save button while editing a subsequence — matches the green of the
       subedit banner so the action's scope is clear without renaming. */
    #save-btn.sub-edit {
      border-color: #38a169;
      background: rgba(56, 161, 105, 0.18);
      color: #68d391;
    }
    #save-btn.sub-edit:hover { border-color: #68d391; color: #b2f5ea; }

    #append-track-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #append-track-btn:hover { border-color: #4299e1; color: #4299e1; }
    #append-track-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #append-track-btn.flash-confirm { border-color: #68d391; color: #68d391; }

    #chord-btn,
    #rec-btn,
    #random-btn,
    #reverse-btn,
    #shuffle-btn,
    #repeat-btn,
    #condense-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #chord-btn:hover { border-color: #9f7aea; color: #9f7aea; }
    #chord-btn.active {
      border-color: #9f7aea;
      background: rgba(159,122,234,0.15);
      color: #d6bcfa;
    }
    /* Rec: red outline + red text by default. When recording, the colors invert
       — fill becomes red, border and text adopt the original (transparent) fill —
       producing a solid red blob that pulses. */
    #rec-btn {
      border-color: #e53e3e;
      color: #e53e3e;
    }
    #rec-btn:hover {
      border-color: #fc8181;
      color: #fc8181;
    }
    #random-btn:hover { border-color: #ed8936; color: #fbd38d; }
    #reverse-btn:hover { border-color: #4299e1; color: #4299e1; }
    #reverse-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #shuffle-btn:hover { border-color: #4299e1; color: #4299e1; }
    #shuffle-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #repeat-btn:hover { border-color: #4299e1; color: #4299e1; }
    #repeat-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #condense-btn:hover { border-color: #68d391; color: #68d391; }
    #condense-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #rec-btn.recording {
      background: #e53e3e;
      border-color: #e53e3e;
      color: #fff;
      animation: rec-pulse 1s ease-in-out infinite;
    }
    #rec-btn.counting {
      border-color: #f6ad55;
      color: #fbd38d;
      animation: rec-pulse 0.5s ease-in-out infinite;
    }
    @keyframes rec-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229,62,62,0.6); }
      50%      { box-shadow: 0 0 0 6px rgba(229,62,62,0); }
    }
    /* Undo / Redo pill — two adjacent buttons sharing the inner border, with
       only their outside corners rounded. Red theme matches Rec. */
    .btn-group--seq > .undo-redo-pair {
      flex: 2 1 160px;
      display: flex;
    }
    .undo-redo-pair > button {
      flex: 1;
      padding: 6px 14px;
      border: 1px solid #e53e3e;
      background: transparent;
      color: #e53e3e;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .undo-redo-pair > #undo-btn {
      border-radius: 20px 0 0 20px;
    }
    .undo-redo-pair > #redo-btn {
      border-radius: 0 20px 20px 0;
      border-color: #68d391;
      color: #68d391;
    }
    .undo-redo-pair > button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    @media (hover: hover) {
      .undo-redo-pair > #undo-btn:hover:not(:disabled) {
        border-color: #fc8181;
        color: #fc8181;
      }
      .undo-redo-pair > #redo-btn:hover:not(:disabled) {
        border-color: #9ae6b4;
        color: #9ae6b4;
      }
    }

    .saved-block.audio-item {
      border-color: #e53e3e;
    }
    .saved-block.audio-item.active-seq {
      background: linear-gradient(135deg, #3a1a2a, #5a1e3a);
      border-color: #fc8181;
    }
    .track-item.audio-item {
      background: linear-gradient(135deg, #4a1a2a, #5a2a3a);
      border-color: #e53e3e;
    }
    .track-item.audio-item.active {
      background: linear-gradient(135deg, #b13a50, #e53e3e);
      border-color: #fc8181;
    }

    .note-length-label {
      display: flex; align-items: center; gap: 4px;
      color: #a0aec0; font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem; flex-shrink: 0;
    }
    #note-length,
    #subdivision-select {
      width: 60px;
      background: #1a1a2e; border: 1px solid #2d2d3f;
      border-radius: 6px; color: #e2e8f0;
      font-size: 0.8rem; font-family: 'Segoe UI', sans-serif;
      padding: 3px 6px; text-align: center;
    }
    #note-length:focus,
    #subdivision-select:focus { outline: none; border-color: #4299e1; }

    #loop-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #loop-btn:hover { border-color: #38b2ac; color: #38b2ac; }
    #loop-btn.active {
      border-color: #38b2ac;
      background: rgba(56,178,172,0.15);
      color: #81e6d9;
    }

    .seq-step.chord {
      background: rgba(159,122,234,0.18);
      border-color: #9f7aea;
      color: #d6bcfa;
      min-width: 48px;
    }
    .seq-step.chord.active {
      background: linear-gradient(135deg, #553c9a, #9f7aea);
      border-color: #9f7aea;
      color: #fff;
    }
    .seq-step.chord-pending {
      background: rgba(159,122,234,0.08);
      border: 1px dashed #9f7aea;
      color: #9f7aea;
      min-width: 48px;
    }

    .seq-count {
      color: #4a4a6a;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      min-width: 60px;
    }

    /* SAVED SEQUENCES VIEWER */
    .saved-viewer {
      background: #050510;
      border-top: 3px solid #000;
      padding: 14px 20px;
      overflow-y: auto;
      max-height: 160px;
    }

    .saved-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .saved-block {
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 8px;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      gap: 3px;
    }
    .saved-block:hover { border-color: #4299e1; background: #1e2a3a; }
    .saved-block.dragging { opacity: 0.35; }
    .saved-block.drag-over { outline: 2px solid #4299e1; }
    .seq-step.dragging { opacity: 0.35; cursor: grabbing; }
    .seq-step.drag-over { outline: 2px solid #4299e1; outline-offset: -1px; }
    /* Pitch bend indicator — small arrow in the chip's top-right corner so
       a bending step is recognizable at a glance without crowding the label. */
    .seq-step.bend-up::after,
    .seq-step.bend-down::after {
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #f6ad55;
      pointer-events: none;
    }
    .seq-step.bend-up::after   { content: '↗'; }
    .seq-step.bend-down::after { content: '↘'; }
    .saved-block.active-seq { border-color: #4299e1; background: linear-gradient(135deg, #1a2a4a, #1e3a5a); }

    .saved-block-name {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .saved-block-count {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.65rem;
      color: #4a4a6a;
    }

    /* PLAYLIST BAR */
    /* TRACKS SECTION */
    .tracks-section {
      background: #050510;
      border-top: 3px solid #000;
      padding: 10px 16px;
      overflow-y: auto;
      max-height: 240px;
    }
    .tracks-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
      flex-wrap: wrap;
    }
    /* Mobile: tighten the transport row so buttons fit and wrap cleanly,
       and shorten the multi-word labels so a row of pill buttons doesn't
       blow out the viewport. */
    @media (max-width: 700px) {
      .tracks-header {
        gap: 6px;
        margin-bottom: 8px;
      }
      .tracks-header #tracks-title-btn {
        flex: 0 1 auto;
        font-size: 0.78rem;
        padding: 0;
      }
      .tracks-header #tracks-play-all {
        width: 30px; height: 30px; min-width: 30px; min-height: 30px;
        font-size: 0.85rem;
      }
      .tracks-header #add-track-btn,
      .tracks-header #tracks-export-btn,
      .tracks-header #tracks-share-btn,
      .tracks-header #tracks-save-project-btn,
      .tracks-header #tracks-load-project-btn,
      .tracks-header #tracks-loop-all,
      .tracks-header #tracks-back-btn {
        padding: 4px 9px;
        font-size: 0.7rem;
        letter-spacing: 0;
      }
      /* Replace multi-word labels with single-word equivalents so each pill
         takes minimal width while still being self-explanatory. */
      .tracks-header #tracks-save-project-btn { font-size: 0; }
      .tracks-header #tracks-save-project-btn::before {
        content: 'Save'; font-size: 0.7rem;
      }
      .tracks-header #tracks-load-project-btn { font-size: 0; }
      .tracks-header #tracks-load-project-btn::before {
        content: 'Load'; font-size: 0.7rem;
      }
      .tracks-header #add-track-btn { font-size: 0; }
      .tracks-header #add-track-btn::before {
        content: '+ Track'; font-size: 0.7rem;
      }
    }
    #tracks-title-btn {
      flex: 1;
      text-align: left;
      background: transparent;
      border: none;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s ease;
    }
    #tracks-title-btn:hover { color: #4299e1; }
    #tracks-back-btn {
      display: none;
      padding: 5px 12px;
      border: 1px solid #2d2d3f;
      border-radius: 16px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #tracks-back-btn:hover { border-color: #4299e1; color: #4299e1; }

    /* Fullscreen tracks view — triggered by tapping the Tracks title.
       Hides every sibling and pins the tracks section to the viewport so
       a phone held lengthwise shows the whole tracks grid edge-to-edge. */
    /* Songs bank — preset compositions that populate the workspace. */
    .songs-bank {
      background: #050510;
      border-top: 3px solid #000;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 20px;
      flex-shrink: 0;
    }
    .songs-bank-label {
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .song-btn {
      padding: 6px 16px;
      border: 1px solid #2d2d3f;
      border-radius: 16px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .song-btn:hover { border-color: #4299e1; color: #4299e1; }
    .projects-bank .projects-load { border-color: #4fd1c5; color: #4fd1c5; }
    .projects-bank .projects-load:hover { border-color: #81e6d9; color: #81e6d9; }
    .project-chip { border-color: #2d2d3f; }
    .project-chip-empty { color: #4a4a6a; cursor: default; padding: 6px 12px; font-style: italic; }

    body.tracks-fullscreen > *:not(.tracks-section) { display: none !important; }
    body.tracks-fullscreen {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* track the visible viewport on iOS so the URL bar
                         collapsing in landscape doesn't clip content */
    }
    body.tracks-fullscreen .tracks-section {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      max-height: none;
      z-index: 1000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(14px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));

    /* Pin the header to the top of the scrollable area so Back / Play / Add
       Track stay reachable in landscape where vertical room is tight. */

    #tracks-export-btn:hover { border-color: #38a169; color: #38a169; }
    #tracks-export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #tracks-save-project-btn:hover,
    #tracks-load-project-btn:hover { border-color: #4299e1; color: #4299e1; }
    #tracks-save-project-btn:disabled,
    #tracks-load-project-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #tracks-share-btn:hover { border-color: #f6ad55; color: #fbd38d; }
    #tracks-share-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #tracks-countin-btn:hover { border-color: #e53e3e; color: #fc8181; }
    #tracks-countin-btn.active {
      border-color: #e53e3e;
      background: rgba(229, 62, 62, 0.18);
      color: #fc8181;
    }
    #tracks-loop-all:hover { border-color: #38b2ac; color: #38b2ac; }

    .track-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      margin-bottom: 8px;
      align-items: stretch;
    }
    .track-controls {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .track-controls button {
      padding: 4px 8px;
      border: 1px solid #2d2d3f;

    .track-loop.active { border-color: #38b2ac; color: #81e6d9; background: rgba(56,178,172,0.15); }
    .track-remove:hover { border-color: #e53e3e; color: #e53e3e; }
    .track-clear { font-size: 0.66rem !important; padding: 2px 8px !important; letter-spacing: 0.5px; }
    .track-clear:hover { border-color: #e53e3e; color: #e53e3e; }
    .track-eq { font-size: 0.66rem !important; padding: 2px 8px !important; letter-spacing: 0.5px; }
    .track-eq:hover { border-color: #f6ad55; color: #fbd38d; }
    .track-eq.active { border-color: #f6ad55; color: #fbd38d; background: rgba(246,173,85,0.12); }
    .track-rec {
      font-size: 0.66rem !important; padding: 2px 8px !important; letter-spacing: 0.5px;
      border-color: #e53e3e !important; color: #e53e3e !important;
    }
    .track-rec:hover { border-color: #fc8181 !important; color: #fc8181 !important; }
    .track-rec.recording {
      background: #e53e3e !important;
      border-color: #e53e3e !important;
      color: #fff !important;
      animation: rec-pulse 1s ease-in-out infinite;
    }
    .track-rec.counting {
      border-color: #f6ad55 !important;
      color: #fbd38d !important;
      animation: rec-pulse 0.5s ease-in-out infinite;
    }
    .track-name {
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.76rem; font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .track-name:hover { border-color: #38a169; color: #68d391; }
    .track-name.soloed {
      background: rgba(56, 161, 105, 0.18);
      border-color: #38a169;
      color: #68d391;
    }
    .track-grid {
      display: grid;
      grid-auto-flow: column;
      /* Fixed pixel cells (not 1fr) so the same time-duration takes the same
         visual width across every track row. With 1fr the cells stretched
         per-track, making short tracks appear as wide as long ones; with a
         pinned cell width, longer tracks just extend further into their
         scroll area. */
      grid-auto-columns: 18px;
      grid-template-rows: 44px;
      gap: 2px;
      overflow-x: auto;
      background: #0a0a14;
      border: 1px solid #1a1a2e;
      border-radius: 6px;
      padding: 4px;
      min-height: 52px;
      scrollbar-width: thin;
      scrollbar-color: #2d2d3f #0a0a14;

    .track-grid.drag-over {

      outline-offset: -2px;
      background: #0e1324;

    .track-grid::-webkit-scrollbar { height: 4px; }
    .track-grid::-webkit-scrollbar-track { background: #0a0a14; }
    .track-grid::-webkit-scrollbar-thumb { background: #2d2d3f; border-radius: 2px; }
    .track-item {
      background: linear-gradient(135deg, #1a2a4a, #1e3a5a);
      border: 1px solid #2b6cb0;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer;
      transition: all 0.15s;
    }
    .track-item:hover { border-color: #4299e1; }
    .track-item.active {
      background: linear-gradient(135deg, #2b6cb0, #4299e1);
      border-color: #4299e1;
    }
    /* Silent placeholder — left behind when a saved sequence is deleted so
       items after it keep their absolute time position in the track. */
    .track-item.silent-item {
      background: repeating-linear-gradient(
        45deg,
        #1a1a2e,
        #1a1a2e 6px,
        #15151f 6px,
        #15151f 12px
      );
      border: 1px dashed #2d2d3f;
      color: #4a4a6a;
      font-style: italic;
    }
    .track-item.silent-item:hover { border-color: #4a4a6a; }
    .track-empty {
      color: #4a4a6a;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      padding: 10px;
      grid-column: 1 / -1;
      white-space: nowrap;
    }

    /* LONG-PRESS CONTEXT MENU */
    .ctx-menu {
      position: fixed;
      background: #1a1a2e;

      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);

      overflow: hidden;

    .ctx-menu button {
      display: block;
      width: 100%;

      background: none;
      border: none;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ctx-menu button:hover { background: #2d2d3f; }
    .ctx-menu button.danger { color: #fc8181; }
    .ctx-menu button.danger:hover { background: #2d1a1a; }
    .ctx-menu hr { border: none; border-top: 1px solid #2d2d3f; margin: 0; }

    .saved-empty {
      color: #2d2d3f;

    .sm-param { margin-bottom: 12px; }

      display: flex; justify-content: space-between; align-items: baseline;

    }
    .sm-preview:hover { border-color: #4299e1; color: #4299e1; }

    .sm-apply {
      padding: 6px 18px; border-radius: 18px;

    .rename-input {

      padding: 8px 10px;
      margin-bottom: 12px;
    }
    .rename-input:focus { outline: none; border-color: #4299e1; }

    /* Modal scrolling — touch-action: pan-y tells iOS the content scrolls
       vertically so a finger drag inside the modal scrolls the modal rather
       than getting captured by the body. overscroll-behavior keeps scroll
       chains from leaking out into the page underneath. */
    .sm-modal {
      max-height: 85vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    .sm-modal::-webkit-scrollbar { width: 6px; }
    .sm-modal::-webkit-scrollbar-track { background: transparent; }
    .sm-modal::-webkit-scrollbar-thumb { background: #2d2d3f; border-radius: 3px; }

    /* Collapsible "fold" sections — group related controls under a click-to-
       expand summary header, matching the menubar's panel aesthetic so the
       editor reads as a stack of compact dropdowns rather than a tall list. */
    .sm-fold {

      border: 1px solid #2d2d3f;
      border-radius: 10px;
      background: #0a0a14;
      overflow: hidden;

    .sm-fold[open] { border-color: #4299e1; }
    .sm-fold > summary {
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;

      color: #a0aec0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      list-style: none;

    .sm-fold > summary::-webkit-details-marker { display: none; }
    .sm-fold > summary::after {
      content: '▾';
      font-size: 0.7rem;
      color: #4a4a6a;
      transition: transform 0.15s ease;
    }
    .sm-fold[open] > summary { color: #e2e8f0; }
    .sm-fold[open] > summary::after { transform: rotate(180deg); color: #4299e1; }
    @media (hover: hover) {
      .sm-fold > summary:hover { color: #4299e1; }
      .sm-fold > summary:hover::after { color: #4299e1; }

    .sm-fold-body {

  <div class="menubar">
    <a href="index.html">Mike Luz</a>
    <button id="colors-menu-btn" title="Note block colors">Colors ▾</button>

      <button type="button" class="colors-opt" data-mode="shuffle">Color shuffle</button>

    <div class="grid-settings-panel" id="grid-settings-panel">

        <label title="Starting note of the chromatic grid">Root
          <select id="root-select"></select>
        </label>

          <select id="octave-range-select"></select>

          <select id="scale-select"></select>
        </label>
        <label title="Master tuning: frequency of A4 (Hz)">A4
          <input type="range" id="master-freq-slider" min="400" max="480" value="440" step="1" />
          <input type="number" id="master-freq-input" min="400" max="480" value="440" />
        </label>
      </div>
      <div class="grid-state-row" title="Save and recall the whole grid state — root, scale, octaves, palette, and per-cell sounds.">
        <label for="grid-state-select">Saved states</label>

          <option value="">— Load a saved state —</option>
        </select>
        <div class="grid-state-actions">

          <button type="button" id="grid-state-delete-btn" disabled>Delete</button>

        <div class="grid-state-actions">
          <button type="button" id="grid-save-voice-btn">Save Voice…</button>

        <div class="grid-state-actions">
          <button type="button" id="grid-reset-btn" title="Reset grid settings to defaults (root, octave, scale, A4, sounds) and shuffle palette colors">Reset</button>
        </div>
      </div>
    </div>
    <div class="fx-panel" id="fx-panel">
      <div class="fx-group-label">Reverb</div>
      <div class="fx-control">
        <div class="fx-control-row">Mix <span class="fx-val" id="fx-rev-v">0%</span></div>
        <input type="range" id="fx-rev" min="0" max="100" value="0" />
      </div>
      <div class="fx-control">
        <div class="fx-control-row">Size <span class="fx-val" id="fx-rev-size-v">70%</span></div>
        <input type="range" id="fx-rev-size" min="0" max="100" value="70" />
      </div>
      <div class="fx-control">
        <div class="fx-control-row">Tone <span class="fx-val" id="fx-rev-tone-v">50%</span></div>
        <input type="range" id="fx-rev-tone" min="0" max="100" value="50" />
      </div>

  <div class="songs-bank">
