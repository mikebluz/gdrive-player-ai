    <button type="button" class="song-btn" data-song="vivaldi">Vivaldi</button>
    <button type="button" class="song-btn" data-song="bach">Bach</button>
    <button type="button" class="song-btn" data-song="mozart">Mozart</button>
    <button type="button" class="song-btn" data-song="beethoven">Beethoven</button>
    <button type="button" class="song-btn" data-song="miles">Miles Davis</button>
    <button type="button" class="song-btn" data-song="takeiteasy">Take It Easy</button>
    <button type="button" class="song-btn" data-song="margaritaville">Margaritaville</button>
    <button type="button" class="song-btn" data-song="likeaprayer">Like a Prayer</button>
  </div>

  <script>
    const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    let rootIdx = 0;       // 0 = C
    let baseOctave = 4;    // octave number of the root note
    let octaveCount = 1;   // 1..3
    let masterFreqA = 440; // Hz — master tuning reference (A4)

    function computeNotes() {
      const out = [];
      const total = 12 * octaveCount;
      for (let i = 0; i < total; i++) {
        const semi = rootIdx + i;
        const noteIdx = semi % 12;
        const octaveNum = baseOctave + Math.floor(semi / 12);
        const midi = 12 * (octaveNum + 1) + noteIdx;
        const freq = masterFreqA * Math.pow(2, (midi - 69) / 12);
        out.push({ freq, label: CHROMATIC[noteIdx] + octaveNum });
      }
      return out;
    }

    let notes = computeNotes();

    let sequenceTimer = null;
    let sequence = []; // [{ freq, label, cellIndex }] — freq null = rest; chord: [{...}]
    let chordMode = false;
    let loopMode = false;
    let noteLength = 1;
    let stepSubdivision = 0.5; // multiplier vs quarter note (1 = 1/4, 0.5 = 1/8, 0.25 = 1/16, 2 = 1/2, 4 = 1/1)
    let pendingChord = [];
    const cells = [];

    // Saved sequences — persisted to localStorage
    let savedSequences = JSON.parse(localStorage.getItem('sounds-saved') || '[]');
    let activeSeqIndex = null;

    function seqName(index) {
      let name = '';
      let n = index;
      while (true) {
        name = String.fromCharCode(65 + (n % 26)) + name;
        if (n < 26) break;
        n = Math.floor(n / 26) - 1;
      }
      return name;
    }

    function persistSaved() {
      localStorage.setItem('sounds-saved', JSON.stringify(savedSequences));
    }

    function renderSavedSequences() {
      const grid = document.getElementById('saved-grid');
      if (savedSequences.length === 0) {
        grid.innerHTML = '<span class="saved-empty">No saved sequences yet.</span>';
        return;
      }
      grid.innerHTML = '';
      savedSequences.forEach((saved, i) => {
        const isAudio = saved.type === 'audio';
        const block = document.createElement('div');
        block.className = 'saved-block'
          + (i === activeSeqIndex ? ' active-seq' : '')
          + (isAudio ? ' audio-item' : '');
        block.dataset.seqIndex = i;
        const countLabel = isAudio
          ? `audio · ${(saved.durationSec || 0).toFixed(1)}s`
          : `${(saved.steps || []).length} steps${saved.bpm ? ` · ${saved.bpm}` : ''}`;
        block.innerHTML = `
          <span class="saved-block-name">${saved.name}</span>
          <span class="saved-block-count">${countLabel}</span>
        `;
        block.addEventListener('click', () => {
          if (isAudio) {
            previewSavedAudio(saved);
            return;
          }
          if (saved.rootIdx != null)     rootIdx     = saved.rootIdx;
          if (saved.baseOctave != null)  baseOctave  = saved.baseOctave;
          if (saved.octaveCount != null) octaveCount = saved.octaveCount;
          if (saved.masterFreqA != null) masterFreqA = saved.masterFreqA;
          if (saved.scale)               currentScale = normalizeScaleName(saved.scale);
          if (saved.subdivision != null) stepSubdivision = saved.subdivision;
          if (saved.restColor)           { restColor = saved.restColor; applyRestColor(); }
          if (Array.isArray(saved.palette) && saved.palette.length === 12) {
            palette = [...saved.palette];
            chipPalette = [...palette];
          }

          const rootSel   = document.getElementById('root-select');
          const octRange  = document.getElementById('octave-range-select');
          const freqSl    = document.getElementById('master-freq-slider');
          const freqIn    = document.getElementById('master-freq-input');
          const scaleSel  = document.getElementById('scale-select');
          if (rootSel)   rootSel.value   = String(rootIdx);
          if (octRange)  octRange.value  = `${baseOctave}x${octaveCount}`;
          if (freqSl)    freqSl.value    = masterFreqA;
          if (freqIn)    freqIn.value    = masterFreqA;
          if (scaleSel)  scaleSel.value  = currentScale;
          const subSel = document.getElementById('subdivision-select');
          if (subSel)    subSel.value    = String(stepSubdivision);
          refreshHoldEnabled();

          rebuildGrid();

          if (Array.isArray(saved.cellSounds) && saved.cellSounds.length === cellSounds.length
              && Array.isArray(saved.cellParams) && saved.cellParams.length === cellParams.length) {
            cellSounds = [...saved.cellSounds];
            cellParams = saved.cellParams.map(p => ({ ...p }));
            cells.forEach((cell, idx) => {
              const sel = cell.querySelector('.cell-sound-select');
              if (sel) sel.value = cellSounds[idx];
            });
            refreshAllCellFreqLabels();
            updateScaleBanner();
          }

          if (saved.loopMode != null) {
            loopMode = !!saved.loopMode;
            document.getElementById('loop-btn').classList.toggle('active', loopMode);
          }

          sequence = [...saved.steps];
          insertionPoint = null;
          if (saved.bpm) {
            tempoInput.value = saved.bpm;
            tempoSlider.value = saved.bpm;
          }
          activeSeqIndex = i;
          renderSequence();
          renderSavedSequences();
          document.getElementById('save-btn').disabled = false;
        });
        bindDrag(block, i);
        bindLongPress(block, i);
        grid.appendChild(block);
      });
    }

    document.addEventListener('pointerdown', () => Tone.start(), { once: true });

    const tempoSlider = document.getElementById('tempo-slider');
    const tempoInput  = document.getElementById('tempo-input');

    // BPM slider color: lerp between two polar-opposite hues (cyan ↔ red,
    // 180° apart on the colour wheel) so the slider feels cool when slow
    // and hot when fast.
    function updateBpmAccent() {
      const sliderMin = parseInt(tempoSlider.min, 10) || 60;
      const sliderMax = parseInt(tempoSlider.max, 10) || 320;
      const v = parseInt(tempoSlider.value, 10) || sliderMin;
      const t = Math.max(0, Math.min(1, (v - sliderMin) / (sliderMax - sliderMin)));
      const hue = 188 * (1 - t); // 188° (cyan) at min → 0° (red) at max
      const color = `hsl(${hue.toFixed(0)}, 80%, 55%)`;
      tempoSlider.style.accentColor = color;
      tempoSlider.style.setProperty('--bpm-thumb', color);
      tempoInput.style.borderColor = color;
    }

    tempoSlider.addEventListener('input', () => {
      tempoInput.value = tempoSlider.value;
      updateBpmAccent();
    });

    tempoInput.addEventListener('input', () => {
      const v = Math.min(320, Math.max(60, parseInt(tempoInput.value) || 60));
      tempoSlider.value = v;
      updateBpmAccent();
    });

    updateBpmAccent();

    // iOS audio unlock: Tone.start() alone is async and often hasn't finished
    // resuming by the time the first tap fires playNote. Playing a silent buffer
    // synchronously inside the gesture forces the context to transition to
    // running immediately, and Tone.start() keeps the Tone-level state in sync.
    ['pointerdown','touchstart','keydown'].forEach(ev => {
      document.addEventListener(ev, () => {
        try {
          const ac = Tone.getContext().rawContext;
          const src = ac.createBufferSource();
          src.buffer = ac.createBuffer(1, 1, 22050);
          src.connect(ac.destination);
          src.start(0);
        } catch (e) {}
        Tone.start();
      }, { once: true, capture: true });
    });
    document.addEventListener('visibilitychange', () => {
      const tctx = Tone.getContext().rawContext;
      if (!document.hidden && tctx && tctx.state === 'suspended') tctx.resume();
    });

    function getStepMs() {
      return Math.round(60000 / (parseInt(tempoInput.value) || 120) * stepSubdivision);
    }

    const SOUNDS = ['sine','square','triangle','sawtooth','pulse','fat','fm','am','mono','bell','pluck','kick','metal'];

    // Master bus: compressor softens dynamic peaks, limiter is a brick wall at
    // -1 dB so simultaneous voices (chords, overlapping tracks, long releases)
    // never clip. Aggressive settings because chord playback can spike well
    // above 0 dB from the raw sum of multiple synths.
    const masterLimiter = new Tone.Limiter(-1).toDestination();
    // Global FX chain — sits post-compressor / pre-limiter so the dynamics
    // settle before reverb/delay tails layer on. wet=0 / distortion=0 are
    // effective pass-throughs; the FX panel UI updates these in place.
    const masterReverb = new Tone.Freeverb({
      roomSize: 0.7, dampening: 3000, wet: 0,
    }).connect(masterLimiter);
    const masterDelay = new Tone.FeedbackDelay({
      delayTime: '8n', feedback: 0.4, wet: 0,
    }).connect(masterReverb);
    const masterDistortion = new Tone.Distortion({
      distortion: 0, wet: 1,
    }).connect(masterDelay);
    const masterBus = new Tone.Compressor({
      threshold: -24, ratio: 4, attack: 0.003, release: 0.25, knee: 12,
    }).connect(masterDistortion);

    // Persisted global effect mix — applied to every voice via the master
    // chain above. Loaded from localStorage so settings stick across reloads.
    const GLOBAL_FX_DEFAULTS = {
      reverb:        0,
      reverbSize:    70,
      reverbTone:    50,
      delay:         0,
      delayTime:     250,
      delayFeedback: 40,
      distortion:    0,
    };
    const globalFx = (() => {
      try {
        const raw = JSON.parse(localStorage.getItem('sounds-global-fx') || '{}');
        const out = { ...GLOBAL_FX_DEFAULTS };
        Object.keys(GLOBAL_FX_DEFAULTS).forEach(k => {
          if (Number.isFinite(raw[k])) out[k] = raw[k];
        });
        return out;
      } catch (e) {
        return { ...GLOBAL_FX_DEFAULTS };
      }
    })();
    function applyGlobalFx() {
      try {
        masterReverb.roomSize.value  = Math.max(0, Math.min(0.99, globalFx.reverbSize / 100));
        masterReverb.dampening.value = 500 + Math.max(0, Math.min(100, globalFx.reverbTone)) * 95;
        masterReverb.wet.value       = Math.max(0, Math.min(1, globalFx.reverb / 100));
        masterDelay.delayTime.value  = Math.max(0.001, (globalFx.delayTime || 0) / 1000);
        masterDelay.feedback.value   = Math.max(0, Math.min(0.95, globalFx.delayFeedback / 100));
        masterDelay.wet.value        = Math.max(0, Math.min(1, globalFx.delay / 100));
        masterDistortion.distortion  = Math.max(0, Math.min(1, globalFx.distortion / 100));
      } catch (e) {}
    }
    function persistGlobalFx() {
      localStorage.setItem('sounds-global-fx', JSON.stringify(globalFx));
    }
    applyGlobalFx();

    // ---- Custom sample loading (samples/manifest.json) ----
    // Each entry creates a Tone.Sampler that pitch-shifts the file across
    // the keyboard. type strings of the form 'sample:<id>' route through these.
    const sampleSamplers = new Map();

    function isSampleType(type) {
      return typeof type === 'string' && type.startsWith('sample:');
    }
    // Lets the offline export route sample-based notes through a parallel
    // bank of samplers bound to the offline audio context. When set, this
    // takes precedence over the live sampleSamplers map. When null, normal
    // live playback resolves through the registered live samplers.
    let _offlineSamplerOverride = null;
    function getSampleEntry(type) {
      if (!isSampleType(type)) return null;
      const id = type.slice(7);
      if (_offlineSamplerOverride && _offlineSamplerOverride.has(id)) {
        return { sampler: _offlineSamplerOverride.get(id) };
      }
      return sampleSamplers.get(id) || null;
    }
    function getAllSoundOptions() {
      const opts = SOUNDS.map(s => ({ value: s, label: s.charAt(0).toUpperCase() + s.slice(1) }));
      for (const [id, info] of sampleSamplers) {
        opts.push({ value: 'sample:' + id, label: info.name });
      }
      return opts;
    }

    // Open-source sample-based instruments. Each loads as a Tone.Sampler
    // connected to the master bus, then surfaces as a 'sample:<id>' tone
    // option alongside any local samples. Ranges are intentionally sparse —
    // Tone.Sampler pitch-shifts between provided sample points so 4–8 notes
    // is enough for keyboard coverage without bloating page-load fetches.
    const REMOTE_INSTRUMENTS = [
      {
        // Salamander Grand Piano — Tone.js's official example set, by
        // Alexander Holm under Creative Commons.
        id: 'piano',
        label: 'Piano',
        baseUrl: 'https://tonejs.github.io/audio/salamander/',
        urls: {
          'A0': 'A0.mp3', 'C1': 'C1.mp3', 'A1': 'A1.mp3', 'C2': 'C2.mp3',
          'A2': 'A2.mp3', 'C3': 'C3.mp3', 'A3': 'A3.mp3', 'C4': 'C4.mp3',
          'A4': 'A4.mp3', 'C5': 'C5.mp3', 'A5': 'A5.mp3', 'C6': 'C6.mp3',
          'A6': 'A6.mp3', 'C7': 'C7.mp3', 'A7': 'A7.mp3', 'C8': 'C8.mp3',
        },
      },
      {
        // tonejs-instruments by Nicholaus Brosowsky — VSCO-derived samples
        // hosted on GitHub Pages, mostly CC-licensed.
        id: 'organ',
        label: 'Organ',
        baseUrl: 'https://nbrosowsky.github.io/tonejs-instruments/samples/organ/',
        urls: { 'C3': 'C3.mp3', 'C4': 'C4.mp3', 'C5': 'C5.mp3', 'C6': 'C6.mp3' },
      },
      {
        id: 'guitar',
        label: 'Guitar',
        baseUrl: 'https://nbrosowsky.github.io/tonejs-instruments/samples/guitar-acoustic/',
        urls: {
          'E2': 'E2.mp3', 'A2': 'A2.mp3', 'D3': 'D3.mp3',
          'G3': 'G3.mp3', 'B3': 'B3.mp3', 'E4': 'E4.mp3',
        },
      },
      {
        id: 'violin',
        label: 'Violin',
        baseUrl: 'https://nbrosowsky.github.io/tonejs-instruments/samples/violin/',
        urls: {
          'G3': 'G3.mp3', 'C4': 'C4.mp3', 'A4': 'A4.mp3',
          'C5': 'C5.mp3', 'E5': 'E5.mp3',
        },
      },
      {
        id: 'flute',
        label: 'Flute',
        baseUrl: 'https://nbrosowsky.github.io/tonejs-instruments/samples/flute/',
        urls: {
          'C4': 'C4.mp3', 'E4': 'E4.mp3', 'A4': 'A4.mp3',
          'C5': 'C5.mp3', 'E5': 'E5.mp3', 'A5': 'A5.mp3',
        },
      },
    ];
    function loadRemoteInstruments() {
      REMOTE_INSTRUMENTS.forEach(inst => {
        if (sampleSamplers.has(inst.id)) return;
        try {
          const sampler = new Tone.Sampler({
            urls: inst.urls,
            baseUrl: inst.baseUrl,
            release: 1,
          }).connect(masterBus);
          sampleSamplers.set(inst.id, {
            sampler,
            name: inst.label,
            rootNote: 'C4',
            remote: true,
            // Stash the original URL map so the offline export can recreate
            // a parallel sampler bound to the offline audio context.
            urls: inst.urls,
            baseUrl: inst.baseUrl,
          });
        } catch (e) {
          console.warn('Failed to register remote instrument', inst.id, e);
        }
      });
    }

    async function loadSampleManifest() {
      try {
        const res = await fetch('samples/manifest.json', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        const list = Array.isArray(data?.samples) ? data.samples : [];
        list.forEach(s => {
          if (!s || !s.id || !s.file) return;
          const rootNote = s.rootNote || 'C4';
          try {
            const urls = { [rootNote]: s.file };
            const sampler = new Tone.Sampler({
              urls,
              release: 1,
              baseUrl: 'samples/',
            }).connect(masterBus);
            sampleSamplers.set(s.id, {
              sampler,
              name: s.name || s.id,
              rootNote,
              urls,
              baseUrl: 'samples/',
            });
          } catch (e) {
            console.warn('Failed to load sample', s.id, e);
          }
        });
      } catch (e) {
        // No manifest, malformed JSON, or offline — just skip samples silently.
      }
    }

    // ---- User-imported samples (persisted in IndexedDB) ----
    let _importedDB = null;
    function getImportedDB() {
      if (_importedDB) return Promise.resolve(_importedDB);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('bloops-imported-samples', 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('blobs')) {
            db.createObjectStore('blobs', { keyPath: 'id' });
          }
        };
        req.onsuccess = () => { _importedDB = req.result; resolve(req.result); };
        req.onerror = () => reject(req.error);
      });
    }
    async function persistImportedSample(id, name, blob) {
      try {
        const db = await getImportedDB();
        await new Promise((resolve, reject) => {
          const tx = db.transaction('blobs', 'readwrite');
          tx.objectStore('blobs').put({ id, name, blob });
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      } catch (e) {
        console.warn('Failed to persist imported sample', id, e);
      }
    }
    async function loadImportedSamples() {
      try {
        const db = await getImportedDB();
        const records = await new Promise((resolve, reject) => {
          const tx = db.transaction('blobs', 'readonly');
          const req = tx.objectStore('blobs').getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
        });
        for (const rec of records) {
          if (!rec || !rec.id || !rec.blob) continue;
          try {
            const url = URL.createObjectURL(rec.blob);
            const urls = { 'C4': url };
            const sampler = new Tone.Sampler({
              urls,
              release: 1,
            }).connect(masterBus);
            sampleSamplers.set(rec.id, {
              sampler,
              name: rec.name || rec.id,
              rootNote: 'C4',
              imported: true,
              urls,
            });
          } catch (e) {
            console.warn('Failed to restore imported sample', rec.id, e);
          }
        }
      } catch (e) {
        // No DB or read failure — not fatal.
      }
    }
    function makeImportedSampleId(filename) {
      const base = (filename || '')
        .replace(/\.[^.]+$/, '')
        .replace(/[^a-z0-9]+/gi, '-')
        .replace(/^-+|-+$/g, '')
        .toLowerCase();
      let id = 'imported-' + (base || 'sample');
      let n = 1;
      while (sampleSamplers.has(id)) {
        id = 'imported-' + (base || 'sample') + '-' + n++;
      }
      return id;
    }
    // Pop a file picker, register the chosen audio file as a Tone.Sampler,
    // and call onLoaded(id, friendlyName) once the buffer is ready. Persists
    // the blob in IndexedDB so it survives reloads.
    function triggerImportSample(onLoaded) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'audio/*';
      input.style.display = 'none';
      document.body.appendChild(input);
      input.addEventListener('change', async () => {
        const file = input.files && input.files[0];
        input.remove();
        if (!file) return;
        const id = makeImportedSampleId(file.name);
        const friendly = (file.name || id).replace(/\.[^.]+$/, '');
        try {
          const url = URL.createObjectURL(file);
          const urls = { 'C4': url };
          const sampler = new Tone.Sampler({
            urls,
            release: 1,
          }).connect(masterBus);
          sampleSamplers.set(id, {
            sampler,
            name: friendly,
            rootNote: 'C4',
            imported: true,
            urls,
          });
          await persistImportedSample(id, friendly, file);
          if (typeof onLoaded === 'function') onLoaded(id, friendly);
        } catch (e) {
          console.warn('Failed to import sample', e);
          alert('Could not import this audio file.');
        }
      });
      input.click();
    }

    // Scale a chord note's params so N simultaneous voices sum to a roughly
    // single-voice loudness — otherwise the bus hits the compressor / limiter
    // far above threshold and audibly distorts on the attack.
    function chordVoiceParams(noteParams, chordSize) {
      const scale = 1 / Math.sqrt(Math.max(1, chordSize));
      const base = (noteParams && typeof noteParams === 'object') ? noteParams : (typeof noteParams === 'string' ? { type: noteParams } : {});
      const baseVol = base.volume ?? 100;
      return { ...base, volume: baseVol * scale };
    }

    // Fold a step-level bend into the per-note params object that playNote
    // expects, leaving non-bending steps' params untouched. The bend always
    // applies as a relative semitone offset so chord notes glide together.
    function paramsWithBend(noteParams, bend) {
      const base = (noteParams && typeof noteParams === 'object')
        ? { ...noteParams }
        : { type: typeof noteParams === 'string' ? noteParams : 'sine' };
      if (bend && Number.isFinite(bend.semitones) && bend.semitones !== 0) {
        base.bend = { semitones: bend.semitones, atFraction: bend.atFraction };
      }
      return base;
    }

    function playNote(freq, params = {}, durationMs, startTime, destination, trackIdx) {
      if (typeof params === 'string') params = { type: params };
      const {
        type    = 'sine',
        attack  = 10,
        decay   = 100,
        sustain = 50,
        release = 1400,
        volume  = 100,
        detune  = 0,
        bend    = null,
        // Effect mix levels (0–100). Underlying params below shape the
        // sound — defaults match the values that were hard-coded before
        // these knobs existed, so old steps round-trip identically.
        reverb     = 0,
        reverbSize = 70,
        reverbTone = 50,
        delay         = 0,
        delayTime     = 250,
        delayFeedback = 40,
        distortion = 0,
        // When true, the per-note effect chain bypasses the master compressor
        // and global FX chain — track-level EQ/pan also gets skipped, since
        // the route reroutes straight to the master limiter. Keeps the note's
        // local FX settings as the only effects applied to that voice.
        fxOverrideGlobal = false,
      } = params;

      const atk = Math.max(attack  / 1000, 0.005);
      const dec = Math.max(decay   / 1000, 0.01);
      const sus = Math.max(sustain / 100,  0.001);
      const rel = Math.max(release / 1000, 0.1);
      const velocity = Math.min(1, Math.max(0, volume / 100));
      const env = { attack: atk, decay: dec, sustain: sus, release: rel };

      const targetDur = durationMs ? durationMs / 1000 : Math.max(atk + dec, 0.1);
      const preReleaseDur = durationMs
        ? Math.max(0.02, targetDur - rel)
        : atk + dec;
      const disposeMs = (preReleaseDur + rel + 0.4) * 1000;

      // Loaded sample (Tone.Sampler) — pitch-shifts the file to play any note.
      // Per-note effects are skipped on samples (the sampler is shared); pan
      // and EQ are still applied when called from track playback because we
      // route through a per-track sampler bound to the track's bus.
      if (isSampleType(type)) {
        let sampler = null;
        if (Number.isFinite(trackIdx) && tracks[trackIdx]) {
          sampler = getOrCreateTrackSampler(trackIdx, type.slice(7));
        }
        if (!sampler) {
          const entry = getSampleEntry(type);
          sampler = entry?.sampler || null;
        }
        if (sampler && sampler.loaded) {
          const tunedFreq = (typeof freq === 'number')
            ? freq * Math.pow(2, detune / 1200)
            : freq;
          const dur = Math.max(targetDur, 0.05);
          try {
            sampler.triggerAttackRelease(tunedFreq, dur, startTime, velocity);
          } catch (e) {
            console.warn('Sample playback failed', type, e);
          }
        }
        return;
      }

      // Per-note effect chain — order is synth → distortion → delay → reverb
      // → destination. Built backward from the destination so each new node's
      // output is the previous head. `chainHead` becomes the synth's connect
      // target; effect nodes are disposed alongside the synth so they don't
      // leak.
      const finalDest = fxOverrideGlobal ? masterLimiter : (destination || masterBus);
      let chainHead = finalDest;
      const effectNodes = [];
      if (reverb > 0) {
        const rev = new Tone.Freeverb({
          // reverbTone is mapped to dampening (Hz) where higher Tone reads
          // brighter — 0 → 500 Hz (very damped), 100 → 10000 Hz (open).
          roomSize:  Math.max(0, Math.min(0.99, reverbSize / 100)),
          dampening: 500 + Math.max(0, Math.min(100, reverbTone)) * 95,
          wet:       Math.max(0, Math.min(1, reverb / 100)),
        }).connect(chainHead);
        effectNodes.unshift(rev);
        chainHead = rev;
      }
      if (delay > 0) {
        const dly = new Tone.FeedbackDelay({
          delayTime: Math.max(0.001, (delayTime || 0) / 1000),
          feedback:  Math.max(0, Math.min(0.95, delayFeedback / 100)),
          wet:       Math.max(0, Math.min(1, delay / 100)),
        }).connect(chainHead);
        effectNodes.unshift(dly);
        chainHead = dly;
      }
      if (distortion > 0) {
        const dist = new Tone.Distortion({
          distortion: Math.max(0, Math.min(1, distortion / 100)),
          wet: 1,
        }).connect(chainHead);
        effectNodes.unshift(dist);
        chainHead = dist;
      }
      const disposeEffectChain = () => {
        effectNodes.forEach(n => { try { n.dispose(); } catch (e) {} });
      };

      let synth;

      if (type === 'bell') {
        synth = new Tone.FMSynth({
          harmonicity: 2.14,
          modulationIndex: 4,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.001, decay: 2.0, sustain: 0, release: 0.8 },
          modulation: { type: 'sine' },
          modulationEnvelope: { attack: 0.001, decay: 0.5, sustain: 0.2, release: 0.5 },
        }).connect(chainHead);
      } else if (type === 'pluck') {
        // PluckSynth has no detune param — fold cents into the frequency.
        synth = new Tone.PluckSynth({
          attackNoise: 1,
          dampening: 4000,
          resonance: 0.7,
          release: 1,
        }).connect(chainHead);
        const tunedFreq = (typeof freq === 'number') ? freq * Math.pow(2, detune / 1200) : freq;
        synth.triggerAttackRelease(tunedFreq, Math.max(targetDur, 0.1), startTime, velocity);
        if (startTime === undefined) setTimeout(() => {
          try { synth.dispose(); } catch (e) {}
          disposeEffectChain();
        }, (targetDur + 1.5) * 1000);
        return;
      } else if (type === 'fm') {
        synth = new Tone.FMSynth({
          harmonicity: 3,
          modulationIndex: 10,
          oscillator: { type: 'sine' },
          envelope: env,
          modulation: { type: 'square' },
          modulationEnvelope: { attack: 0.5, decay: 0, sustain: 1, release: 0.5 },
        }).connect(chainHead);
      } else if (type === 'am') {
        synth = new Tone.AMSynth({
          harmonicity: 2,
          oscillator: { type: 'sine' },
          envelope: env,
          modulation: { type: 'square' },
          modulationEnvelope: { attack: 0.5, decay: 0, sustain: 1, release: 0.5 },
        }).connect(chainHead);
      } else if (type === 'mono') {
        synth = new Tone.MonoSynth({
          oscillator: { type: 'sawtooth' },
          envelope: env,
          filterEnvelope: {
            attack: 0.01, decay: 0.3, sustain: 0.3, release: 2,
            baseFrequency: 200, octaves: 3,
          },
          filter: { Q: 6, type: 'lowpass', rolloff: -24 },
        }).connect(chainHead);
      } else if (type === 'kick') {
        synth = new Tone.MembraneSynth({
          pitchDecay: 0.05,
          octaves: 10,
          envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 },
        }).connect(chainHead);
      } else if (type === 'metal') {
        synth = new Tone.MetalSynth({
          harmonicity: 5.1,
          modulationIndex: 32,
          resonance: 4000,
          octaves: 1.5,
          envelope: { attack: 0.001, decay: 1.4, release: 0.2 },
        }).connect(chainHead);
      } else {
        // Sustainable waves: sine / square / triangle / sawtooth / pulse / fat
        const oscOpts = type === 'fat'
          ? { type: 'fatsawtooth', count: 3, spread: 30 }
          : type === 'pulse'
            ? { type: 'pulse', width: 0.4 }
            : { type };
        synth = new Tone.Synth({
          oscillator: oscOpts,
          envelope: env,
        }).connect(chainHead);
      }

      if (synth.detune) synth.detune.value = detune;
      synth.triggerAttackRelease(freq, preReleaseDur, startTime, velocity);

      // Pitch bend: ramp the synth's frequency from the start pitch up/down
      // by `semitones` over the first `atFraction` of the step duration, then
      // hold. Only attempts the schedule when the synth exposes an
      // automatable frequency Param — pluck/kick/metal are skipped.
      if (bend && Number.isFinite(bend.semitones) && bend.semitones !== 0 && synth.frequency
          && typeof synth.frequency.setValueAtTime === 'function') {
        const bendStart = (typeof startTime === 'number') ? startTime : Tone.now();
        const at = Math.max(0, Math.min(1, Number.isFinite(bend.atFraction) ? bend.atFraction : 1));
        const bendArrive = bendStart + Math.max(0.001, targetDur * at);
        const endFreq = freq * Math.pow(2, bend.semitones / 12);
        try {
          synth.frequency.cancelScheduledValues(bendStart);
          synth.frequency.setValueAtTime(freq, bendStart);
          synth.frequency.linearRampToValueAtTime(endFreq, bendArrive);
        } catch (e) {}
      }

      if (startTime === undefined) setTimeout(() => {
        try { synth.dispose(); } catch (e) {}
        disposeEffectChain();
      }, disposeMs);
    }

    // ---- Sequence display ----

    // Visual width of a step chip. The reference unit is "length 1, step 1/1"
    // (subdivision value 4) → 80 px. Anything shorter shrinks proportionally;
    // anything longer grows. A subsequence's width is the sum of its subSteps.
    const STEP_BASE_PX = 80;
    function stepLengthFactor(step) {
      if (step.isSub && Array.isArray(step.subSteps)) {
        if (step.subSteps.length === 0) return 1;
        return step.subSteps.reduce((sum, s) => sum + stepLengthFactor(s), 0);
      }
      const dur = step.duration || 1;
      const sub = (step.subdivision != null) ? step.subdivision : stepSubdivision;
      return dur * sub / 4;
    }
    function stepWidthPx(step) {
      return STEP_BASE_PX * stepLengthFactor(step);
    }

    function renderSequence(activeIndex = -1) {
      clampSelectionToSequence();
      const display = document.getElementById('sequence-display');
      const count   = document.getElementById('seq-count');

      // Grid layout: applies whenever the user picks a column count, or
      // whenever step-mode is active (which always lays out as a grid).
      const cols = (gridColumns >= 4 || stepMode) ? effectiveGridCols() : 0;
      if (cols > 0) {
        display.classList.add('grid-mode');
        display.style.setProperty('--grid-cols', String(cols));
      } else {
        display.classList.remove('grid-mode');
        display.style.removeProperty('--grid-cols');
      }

      const isEmpty = sequence.length === 0 && pendingChord.length === 0;
      if (isEmpty) {
        display.innerHTML = '<span class="seq-empty">Click notes or REST to build a sequence…</span>';
        count.textContent = '0 steps';
        const revBtn = document.getElementById('reverse-btn');
        if (revBtn) revBtn.disabled = true;
        const shuffBtn = document.getElementById('shuffle-btn');
        if (shuffBtn) shuffBtn.disabled = true;
        const repeatBtn = document.getElementById('repeat-btn');
        if (repeatBtn) repeatBtn.disabled = true;
        const condenseBtn = document.getElementById('condense-btn');
        if (condenseBtn) condenseBtn.disabled = true;
        const appBtn = document.getElementById('append-track-btn');
        if (appBtn) appBtn.disabled = true;
        return;
      }

      display.innerHTML = '';
      sequence.forEach((step, i) => {
        if (insertionPoint === i) display.appendChild(makeInsertCursor());
        const chip = document.createElement('div');
        const durSuffix = (step.duration && step.duration > 1) ? `×${step.duration}` : '';
        const bendDir = step.bend && Number.isFinite(step.bend.semitones) && step.bend.semitones !== 0
          ? (step.bend.semitones > 0 ? 'bend-up' : 'bend-down')
          : '';
        // In step mode, rests are rendered as dashed empty-slot placeholders
        // that the user can click to drop the armed note into.
        const treatAsEmptySlot = stepMode && isRestStep(step);
        if (step.isSub) {
          const count = (step.subSteps || []).length;
          chip.className = 'seq-step subseq' + (i === activeIndex ? ' active' : '');
          chip.textContent = count > 0 ? `▤\n×${count}` : '▤';
        } else if (step.chord) {
          chip.className = 'seq-step chord' + (i === activeIndex ? ' active' : '') + (bendDir ? ' ' + bendDir : '');
          chip.textContent = step.chord.map(n => n.label).join('·') + (durSuffix ? ' ' + durSuffix : '');
        } else if (treatAsEmptySlot) {
          chip.className = 'seq-step empty-slot' + (i === activeIndex ? ' active' : '');
          chip.textContent = '·';
        } else {
          chip.className = 'seq-step' + (step.freq === null ? ' rest' : '') + (i === activeIndex ? ' active' : '') + (bendDir ? ' ' + bendDir : '');
          const main = step.freq !== null
            ? `${step.label}${step.sound && step.sound !== 'sine' ? '\n' + step.sound.slice(0,3) : ''}`
            : step.label;
          chip.textContent = durSuffix ? `${main}\n${durSuffix}` : main;
        }
        // In grid mode, span the chip across as many cells as its duration
        // calls for so longer notes look longer. Step-mode is the exception
        // — its grid IS the pattern of fixed slots, so each chip stays in
        // exactly one cell. Outside grid mode, pin the width directly.
        if (cols > 0) {
          chip.style.width = '';
          if (stepMode) {
            chip.style.gridColumn = '';
          } else {
            const span = Math.max(1, Math.round(stepLengthFactor(step) * cols));
            chip.style.gridColumn = `span ${Math.min(span, cols)}`;
          }
        } else {
          chip.style.gridColumn = '';
          chip.style.width = stepWidthPx(step) + 'px';
        }
        if (!step.isSub && isSelectedStep(step)) chip.classList.add('selected');
        // Click behaviour: in step mode (and only on non-sub chips) toggle
        // the slot between rest and the armed note; otherwise select the
        // step (so the step controls retarget it) and preview its audio.
        // The single-click action is deferred ~250 ms so a double-click
        // can hijack it and remove the step instead.
        let _chipClickTimer = null;
        const performSingleClick = () => {
          if (stepMode && !step.isSub) {
            if (isRestStep(sequence[i])) {
              if (!stepModeArmed) return;
              sequence[i] = { ...stepModeArmed, params: { ...(stepModeArmed.params || {}) } };
            } else {
              sequence[i] = makeRestStep();
            }
            renderSequence();
            document.getElementById('save-btn').disabled = sequence.length === 0;
            return;
          }
          // Re-click on an already-selected chip toggles it off — in Multi
          // mode just that chip leaves the selection, otherwise the whole
          // selection clears. No audio preview on deselect since the user
          // is dismissing the edit, not auditioning.
          if (isSelectedStep(step)) {
            if (multiSelectMode && !step.isSub) {
              const sIdx = selectedStepRefs.indexOf(step);
              if (sIdx >= 0) selectedStepRefs.splice(sIdx, 1);
              syncStepEditorFromSelection();
            } else {
              clearSelection();
            }
            renderSequence();
            return;
          }
          // First click on this chip — select it so Hold / Step Div retarget
          // it, and preview the audio so the user hears what they selected.
          // Multi-mode adds to the selection; otherwise it replaces.
          if (multiSelectMode && !step.isSub) {
            addSelectedStep(i);
          } else {
            setSelectedStep(i);
          }
          renderSequence();
          previewStep(sequence[i]);
        };
        chip.addEventListener('click', () => {
          if (_chipClickTimer) {
            clearTimeout(_chipClickTimer);
            _chipClickTimer = null;
            return;
          }
          _chipClickTimer = setTimeout(() => {
            _chipClickTimer = null;
            performSingleClick();
          }, 250);
        });
        chip.addEventListener('dblclick', () => {
          if (_chipClickTimer) { clearTimeout(_chipClickTimer); _chipClickTimer = null; }
          snapshotForUndo('Delete step');
          const removedRef = sequence[i];
          sequence.splice(i, 1);
          if (insertionPoint !== null) {
            if (i < insertionPoint) insertionPoint--;
            if (insertionPoint > sequence.length) insertionPoint = sequence.length;
            if (sequence.length === 0) insertionPoint = null;
          }
          // Drop the removed step from selection if it was there.
          const sIdx = selectedStepRefs.indexOf(removedRef);
          if (sIdx >= 0) selectedStepRefs.splice(sIdx, 1);
          renderSequence();
          document.getElementById('save-btn').disabled = sequence.length === 0;
          syncStepEditorFromSelection();
        });
        // Note-coloured chips: tint border + fill from chipPalette by pitch
        // class. Skip subsequence chips (they keep their green identity) and
        // skip the active chip so the playback highlight isn't masked.
        if (!step.isSub && i !== activeIndex) {
          const pc = stepColorPitchClass(step);
          if (pc != null && chipPalette[pc]) {
            const c = chipPalette[pc];
            chip.style.borderColor = c;
            chip.style.background = tintHsl(c, 0.22);
            chip.style.color = c;
          }
        }
        bindStepLongPress(chip, i);
        bindStepDrag(chip, i);
        bindStepDragTouch(chip, i);
        display.appendChild(chip);
      });
      if (insertionPoint != null && insertionPoint >= sequence.length) {
        display.appendChild(makeInsertCursor());
      }

      // Show in-progress chord as a dashed pending chip
      if (chordMode && pendingChord.length > 0) {
        const chip = document.createElement('div');
        chip.className = 'seq-step chord-pending';
        chip.textContent = pendingChord.map(n => n.label).join('·') + '…';
        display.appendChild(chip);
        chip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      count.textContent = `${sequence.length} step${sequence.length !== 1 ? 's' : ''}`;

      if (activeIndex >= 0) {
        const chips = display.querySelectorAll('.seq-step:not(.chord-pending)');
        chips[activeIndex]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      const revBtn = document.getElementById('reverse-btn');
      if (revBtn) revBtn.disabled = sequence.length < 2;
      const shuffBtn = document.getElementById('shuffle-btn');
      if (shuffBtn) shuffBtn.disabled = sequence.length < 2;
      const repeatBtn = document.getElementById('repeat-btn');
      if (repeatBtn) repeatBtn.disabled = sequence.length === 0;
      const condenseBtn = document.getElementById('condense-btn');
      if (condenseBtn) condenseBtn.disabled = sequence.length === 0;
      const appBtn = document.getElementById('append-track-btn');
      if (appBtn) appBtn.disabled = sequence.length === 0;
    }

    // null = append; otherwise the next note is spliced at this index.
    // The cursor advances by 1 after each insert so consecutive clicks
    // build a run of notes at the insertion point.
    let insertionPoint = null;

    // Click-selected steps. We track step *references* (not just indices) so
    // selection survives reorderings — reverse/shuffle/splice keep the same
    // step objects, just at different positions. Wholesale replacements
    // (Random, Vivaldi, Condense, sub-edit enter/exit, load saved) drop the
    // refs and selection clears automatically via clampSelectionToSequence.
    // selectedStepRefs[last] is the "primary" / most-recently-clicked step;
    // it drives the editor's displayed Hold/Div values.
    let multiSelectMode = false;
    let selectedStepRefs = [];

    // ---- Undo / Redo stacks --------------------------------------------
    // Snapshots the chunks of state that user-mutating actions affect so
    // Cmd/Ctrl+Z can roll back the most recent one and Cmd/Ctrl+Shift+Z
    // can replay it. A new mutation clears redoStack — branching past an
    // undo abandons the redone-future, matching standard editor behavior.
    const UNDO_LIMIT = 60;
    const undoStack = [];
    const redoStack = [];
    function refreshHistoryButtons() {
      const u = document.getElementById('undo-btn');
      const r = document.getElementById('redo-btn');
      if (u) u.disabled = undoStack.length === 0;
      if (r) r.disabled = redoStack.length === 0;
    }
    function captureSnapshot(label) {
      return {
        label,
        sequence: sequence.map(cloneStep),
        selectedStepRefIdxs: selectedStepRefs.map(r => sequence.indexOf(r)),
        multiSelectMode,
        insertionPoint,
        activeSeqIndex,
        chordMode,
        pendingChord: pendingChord.map(p => ({ ...p })),
        stepMode,
        gridColumns,
        noteLength,
        stepSubdivision,
        bpm: parseInt(tempoInput?.value, 10) || 120,
      };
    }
    function applySnapshot(snap) {
      stopSequence();
      sequence = snap.sequence.map(cloneStep);
      // Restore selection from the indices recorded at snapshot time. After
      // the sequence array has been replaced, those indices point into the
      // newly-restored array, so we read the refs back out.
      selectedStepRefs = snap.selectedStepRefIdxs
        .map(i => (i >= 0 && i < sequence.length) ? sequence[i] : null)
        .filter(Boolean);
      multiSelectMode = !!snap.multiSelectMode;
      insertionPoint = snap.insertionPoint;
      activeSeqIndex = snap.activeSeqIndex;
      chordMode = !!snap.chordMode;
      pendingChord = (snap.pendingChord || []).map(p => ({ ...p }));
      stepMode = !!snap.stepMode;
      gridColumns = snap.gridColumns | 0;
      noteLength = snap.noteLength | 0 || 1;
      stepSubdivision = snap.stepSubdivision || 1;

      // Sync the UI controls to the restored state.
      const chordBtn = document.getElementById('chord-btn');
      const stepClu  = document.querySelector('.btn-group--step');
      const stepBtn  = document.getElementById('step-mode-btn');
      const gridSel  = document.getElementById('grid-cols-select');
      const multiCb  = document.getElementById('multi-select-toggle');
      const noteSel  = document.getElementById('note-length');
      const subSel   = document.getElementById('subdivision-select');
      if (chordBtn) chordBtn.classList.toggle('active', chordMode);
      if (stepClu)  stepClu.classList.toggle('chord-active', chordMode);
      if (stepBtn)  stepBtn.classList.toggle('active', stepMode);
      if (gridSel)  gridSel.value = String(gridColumns || 0);
      if (multiCb)  multiCb.checked = multiSelectMode;
      if (noteSel)  noteSel.value = String(noteLength);
      if (subSel)   subSel.value = String(stepSubdivision);
      if (typeof tempoInput  !== 'undefined' && tempoInput)  tempoInput.value  = String(snap.bpm);
      if (typeof tempoSlider !== 'undefined' && tempoSlider) tempoSlider.value = String(snap.bpm);

      syncStepEditorFromSelection();
      renderSequence();
      renderSavedSequences();
    }
    function snapshotForUndo(label) {
      undoStack.push(captureSnapshot(label));
      while (undoStack.length > UNDO_LIMIT) undoStack.shift();
      redoStack.length = 0;
      refreshHistoryButtons();
    }
    function performUndo() {
      const snap = undoStack.pop();
      if (!snap) { refreshHistoryButtons(); return; }
      redoStack.push(captureSnapshot(snap.label));
      while (redoStack.length > UNDO_LIMIT) redoStack.shift();
      applySnapshot(snap);
      showHistoryToast('Undone: ' + (snap.label || 'last action'));
      refreshHistoryButtons();
    }
    function performRedo() {
      const snap = redoStack.pop();
      if (!snap) { refreshHistoryButtons(); return; }
      undoStack.push(captureSnapshot(snap.label));
      while (undoStack.length > UNDO_LIMIT) undoStack.shift();
      applySnapshot(snap);
      showHistoryToast('Redone: ' + (snap.label || 'last action'));
      refreshHistoryButtons();
    }
    function showHistoryToast(text) {
      let toast = document.getElementById('undo-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'undo-toast';
        document.body.appendChild(toast);
      }
      toast.textContent = text;
      toast.classList.remove('hide');
      // Force reflow so the next class change re-triggers the transition.
      // eslint-disable-next-line no-unused-expressions
      toast.offsetWidth;
      toast.classList.add('show');
      clearTimeout(showHistoryToast._t);
      showHistoryToast._t = setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }
    // Wrap a state-mutating user action so it can be undone.
    function withUndo(label, fn) {
      snapshotForUndo(label);
      try { fn(); } catch (e) { undoStack.pop(); refreshHistoryButtons(); throw e; }
    }
    document.addEventListener('keydown', (e) => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      const isMeta = e.metaKey || e.ctrlKey;
      if (!isMeta || (e.key !== 'z' && e.key !== 'Z')) return;
      e.preventDefault();
      if (e.shiftKey) performRedo();
      else            performUndo();
    });
    document.getElementById('undo-btn').addEventListener('click', performUndo);
    document.getElementById('redo-btn').addEventListener('click', performRedo);
    function lastSelectedStep() {
      if (selectedStepRefs.length === 0) return null;
      return selectedStepRefs[selectedStepRefs.length - 1];
    }
    function isSelectedStep(step) {
      return selectedStepRefs.indexOf(step) !== -1;
    }
    function selectedStepIndices() {
      const out = [];
      selectedStepRefs.forEach(ref => {
        const idx = sequence.indexOf(ref);
        if (idx >= 0) out.push(idx);
      });
      return out;
    }
    function syncStepEditorFromSelection() {
      const step = lastSelectedStep();
      const noteLengthSel = document.getElementById('note-length');
      const subSel = document.getElementById('subdivision-select');
      if (step && !step.isSub && (step.freq != null || step.chord)) {
        if (noteLengthSel) noteLengthSel.value = String(step.duration ?? 1);
        if (subSel) {
          const v = (step.subdivision != null) ? step.subdivision : stepSubdivision;
          subSel.value = String(v);
        }
      } else {
        if (noteLengthSel) noteLengthSel.value = String(noteLength);
        if (subSel) subSel.value = String(stepSubdivision);
      }
      refreshHoldEnabled();
      // Pink outline on the Step section while a chip is selected, so the
      // user sees that grid clicks now retune the selection instead of
      // appending fresh steps.
      const stepGroup = document.querySelector('.btn-group--step');
      if (stepGroup) stepGroup.classList.toggle('step-selected', selectedStepRefs.length > 0);
    }
    // Hold is meaningful only when Step Div is 1/1 (value=4). Below 1/1 the
    // step is already shorter than a beat, so multiplying its length leads
    // to mismatched timings — easier to lock the control out than to debug
    // the resulting groove.
    function refreshHoldEnabled() {
      const noteLengthSel = document.getElementById('note-length');
      const subSel = document.getElementById('subdivision-select');
      if (!noteLengthSel || !subSel) return;
      const isWhole = parseFloat(subSel.value) === 4;
      noteLengthSel.disabled = !isWhole;
      const label = noteLengthSel.closest('.note-length-label');
      if (label) label.style.opacity = isWhole ? '' : '0.4';
    }
    function setSelectedStep(idx) {
      // Single-select replacement (multi off) or "set primary" (multi on
      // adds rather than replaces — handled at the click site).
      if (idx == null || idx < 0 || idx >= sequence.length) {
        selectedStepRefs = [];
      } else {
        selectedStepRefs = [sequence[idx]];
      }
      syncStepEditorFromSelection();
    }
    function addSelectedStep(idx) {
      if (idx == null || idx < 0 || idx >= sequence.length) return;
      const step = sequence[idx];
      if (!step || step.isSub) return;
      const existing = selectedStepRefs.indexOf(step);
      if (existing >= 0) {
        // Already selected — toggle off, but if it's the primary, keep it
        // as primary by re-adding to the end of the list.
        selectedStepRefs.splice(existing, 1);
      }
      selectedStepRefs.push(step);
      syncStepEditorFromSelection();
    }
    function clearSelection() {
      selectedStepRefs = [];
      syncStepEditorFromSelection();
    }
    function clampSelectionToSequence() {
      // Drop any step refs that no longer live in the sequence (e.g., after
      // Random / Condense / load-saved replaced the array entirely).
      selectedStepRefs = selectedStepRefs.filter(ref => sequence.indexOf(ref) >= 0 && !ref.isSub);
      // If multi was on but we're down to 0 or 1 selected, the toggle stays
      // wherever the user last left it — but we resync the editor.
      syncStepEditorFromSelection();
    }

    // Visual layout: 0 = current flex-wrap behavior; 4..16 = grid mode with
    // that many chips per row.
    let gridColumns = 8;
    // Step-sequencer mode — when on, the workspace is treated as a fixed
    // pattern of `gridColumns` slots (defaults to 16 if grid isn't set).
    // Cell clicks arm the current note; chip clicks toggle that note in/out.
    let stepMode = false;
    let stepModeArmed = null; // a step template prepped by the last grid click
    function effectiveGridCols() {
      return gridColumns >= 4 ? gridColumns : 16;
    }
    function isRestStep(s) {
      return !!s && !s.isSub && !s.chord && (s.freq == null);
    }
    function makeRestStep() {
      return { freq: null, label: '—', cellIndex: null, duration: 1, subdivision: stepSubdivision };
    }
    function padToStepGrid() {
      const n = effectiveGridCols();
      while (sequence.length < n) sequence.push(makeRestStep());
    }
    function armStepModeNote(step) {
      stepModeArmed = step;
      cells.forEach((cell, idx) => {
        cell.classList.toggle('step-mode-armed', step && idx === step.cellIndex);
      });
    }
    function clearStepModeArm() {
      stepModeArmed = null;
      cells.forEach(c => c.classList.remove('step-mode-armed'));
    }

    function addToSequence(step) {
      const label = step?.chord ? 'Add chord' : (step?.freq == null ? 'Add rest' : ('Add ' + (step?.label || 'note')));
      snapshotForUndo(label);
      if (insertionPoint !== null && insertionPoint >= 0 && insertionPoint <= sequence.length) {
        sequence.splice(insertionPoint, 0, step);
        insertionPoint++;
      } else {
        sequence.push(step);
      }
      renderSequence();
      document.getElementById('save-btn').disabled = false;
    }

    function makeInsertCursor() {
      const cursor = document.createElement('div');
      cursor.className = 'seq-cursor';
      cursor.title = 'Insertion point — click to cancel';
      cursor.addEventListener('click', () => {
        insertionPoint = null;
        renderSequence();
      });
      return cursor;
    }

    // ---- Playback ----

    function clearHighlights() {
      cells.forEach(c => c.classList.remove('active-loop'));
      document.getElementById('rest-bar').classList.remove('active-loop');
    }

    function stopSequence() {
      clearTimeout(sequenceTimer);
      sequenceTimer = null;
      clearHighlights();
      renderSequence();
      document.getElementById('play-btn').textContent = '▶';
    }

    function advanceAfterStep(index) {
      const next = index + 1;
      if (next < sequence.length) {
        playSequence(next);
      } else if (loopMode && sequence.length > 0) {
        playSequence(0);
      } else {
        stopSequence();
      }
    }

    function playStepCB(step, onDone) {
      // Subsequence: recurse through subSteps, then onDone.
      if (step.isSub && Array.isArray(step.subSteps) && step.subSteps.length > 0) {
        playSubStepsCB(step.subSteps, 0, onDone);
        return;
      }
      const stepDur = step.duration || 1;
      const stepSub = (step.subdivision != null) ? step.subdivision : stepSubdivision;
      const bpm = parseInt(tempoInput.value) || 120;
      const waitMs = Math.round(60000 / bpm * stepSub) * stepDur;
      clearHighlights();
      if (step.chord) {
        const size = step.chord.length;
        step.chord.forEach(n => {
          playNote(n.freq, paramsWithBend(chordVoiceParams(n.params || n.sound || 'sine', size), step.bend), waitMs);
          if (n.cellIndex != null) cells[n.cellIndex]?.classList.add('active-loop');
        });
      } else if (step.freq != null) {
        playNote(step.freq, paramsWithBend(step.params || step.sound || 'sine', step.bend), waitMs);
        if (step.cellIndex != null) cells[step.cellIndex]?.classList.add('active-loop');
      } else {
        document.getElementById('rest-bar').classList.add('active-loop');
      }
      sequenceTimer = setTimeout(onDone, waitMs);
    }

    function playSubStepsCB(subSteps, idx, onDone) {
      if (idx >= subSteps.length) { onDone(); return; }
      playStepCB(subSteps[idx], () => playSubStepsCB(subSteps, idx + 1, onDone));
    }

    // One-shot preview that doesn't touch sequenceTimer / playback state, so
    // clicking a chip during normal playback (or while idle) just auditions
    // the chip's audio without disrupting the running sequence.
    function previewStep(step) {
      if (!step) return;
      try { Tone.start(); } catch (e) {}
      const bpm = parseInt(tempoInput.value) || 120;
      const stepWaitMs = (s) => {
        const dur = s.duration || 1;
        const sub = (s.subdivision != null) ? s.subdivision : stepSubdivision;
        return Math.round(60000 / bpm * sub) * dur;
      };
      const playOne = (s) => {
        const waitMs = stepWaitMs(s);
        if (s.chord) {
          const size = s.chord.length;
          s.chord.forEach(n => {
            if (n.freq != null) playNote(n.freq, paramsWithBend(chordVoiceParams(n.params || n.sound || 'sine', size), s.bend), waitMs);
          });
        } else if (s.freq != null) {
          playNote(s.freq, paramsWithBend(s.params || s.sound || 'sine', s.bend), waitMs);
        }
        return waitMs;
      };
      const walkSubSteps = (subSteps, idx) => {
        if (idx >= subSteps.length) return;
        const sub = subSteps[idx];
        let waitMs = 0;
        if (sub && sub.isSub && Array.isArray(sub.subSteps) && sub.subSteps.length > 0) {
          // Nested sub: walk its children, summing the elapsed time before
          // moving on to the sibling at idx+1.
          waitMs = sub.subSteps.reduce((acc, c) => acc + stepWaitMs(c), 0);
          walkSubSteps(sub.subSteps, 0);
        } else if (sub) {
          waitMs = stepWaitMs(sub);
          playOne(sub);
        }
        setTimeout(() => walkSubSteps(subSteps, idx + 1), waitMs);
      };
      if (step.isSub && Array.isArray(step.subSteps) && step.subSteps.length > 0) {
        walkSubSteps(step.subSteps, 0);
      } else {
        playOne(step);
      }
    }

    // Cheap active-chip update for the playback hot path — toggling a class
    // on existing nodes instead of rebuilding the whole sequence-display
    // DOM. The full renderSequence runs only when the sequence structure
    // actually changes (mutations call renderSequence themselves).
    function setActiveSequenceChip(index) {
      const display = document.getElementById('sequence-display');
      if (!display) return;
      const chips = display.querySelectorAll('.seq-step:not(.chord-pending)');
      chips.forEach((c, i) => c.classList.toggle('active', i === index));
      if (index >= 0 && chips[index]) {
        chips[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function playSequence(index = 0) {
      if (index === 0) {
        document.getElementById('play-btn').textContent = '■';
      }
      if (sequence.length === 0) { stopSequence(); return; }
      // Audio first — calling renderSequence before playStepCB used to
      // delay the next note's audio scheduling by however long the DOM
      // rebuild took, which was especially noticeable between the first
      // two notes (no synth caching yet, render runs cold). With audio
      // scheduled first and a cheap class-toggle for the highlight, the
      // setTimeout-driven gap stays close to the intended waitMs.
      playStepCB(sequence[index], () => advanceAfterStep(index));
      setActiveSequenceChip(index);
    }

    document.getElementById('play-btn').addEventListener('click', async () => {
      if (sequence.length === 0) return;
      await Tone.start();
      if (sequenceTimer !== null) {
        stopSequence();
        return;
      }
      // Wait for any pending sample buffers + warm-up before the first
      // note, so sample-based tones aren't silent and the first attack
      // doesn't get clipped on a cold audio context.
      try { await Tone.loaded(); } catch (e) {}
      setTimeout(() => {
        if (sequenceTimer === null && sequence.length > 0) playSequence(0);
      }, 60);
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (sequence.length === 0) return;
      snapshotForUndo('Clear');
      stopSequence();
      sequence = [];
      pendingChord = [];
      activeSeqIndex = null;
      insertionPoint = null;
      renderSequence();
      renderSavedSequences();
      document.getElementById('save-btn').disabled = true;
    });

    document.getElementById('reverse-btn').addEventListener('click', () => {
      if (sequence.length < 2) return;
      snapshotForUndo('Reverse');
      stopSequence();
      sequence.reverse();
      pendingChord = [];
      insertionPoint = null;
      renderSequence();
    });

    document.getElementById('shuffle-btn').addEventListener('click', () => {
      if (sequence.length < 2) return;
      snapshotForUndo('Shuffle');
      stopSequence();
      // Fisher-Yates
      for (let i = sequence.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [sequence[i], sequence[j]] = [sequence[j], sequence[i]];
      }
      pendingChord = [];
      insertionPoint = null;
      renderSequence();
    });

    document.getElementById('repeat-btn').addEventListener('click', () => {
      if (sequence.length === 0) return;
      snapshotForUndo('Repeat');
      stopSequence();
      const copy = sequence.map(cloneStep);
      sequence = sequence.concat(copy);
      pendingChord = [];
      insertionPoint = null;
      renderSequence();
    });

    document.getElementById('condense-btn').addEventListener('click', showCondenseDialog);

    // Wrap every current step into a single subsequence chip, applying the
    // user-chosen Hold/Div to each contained step.
    function showCondenseDialog() {
      if (sequence.length === 0) return;
      const overlay = document.createElement('div');
      overlay.className = 'sm-overlay';
      const modal = document.createElement('div');
      modal.className = 'sm-modal';
      modal.innerHTML = `
        <div class="sm-title">Condense to subsequence</div>
        <div style="color:#a0aec0;font-family:'Segoe UI',sans-serif;font-size:0.8rem;padding:4px 0 12px;">
          Wrap all ${sequence.length} step${sequence.length === 1 ? '' : 's'} into a single ▤ chip.
          Div below will be applied to every step inside the new subsequence.
        </div>
        <div class="sm-section-label">Div (subdivision)</div>
        <select id="cond-div" style="width:100%;padding:6px 10px;background:#0a0a14;border:1px solid #2d2d3f;color:#e2e8f0;border-radius:6px;font-family:inherit;font-size:0.85rem;">
          <option value="4">1/1</option>
          <option value="2">1/2</option>
          <option value="1" selected>1/4</option>
          <option value="0.5">1/8</option>
          <option value="0.25">1/16</option>
          <option value="0.125">1/32</option>
        </select>
        <div style="display:flex;gap:8px;padding:12px 0 0;">
          <button type="button" class="sm-preview" id="cond-rand" style="flex:1;">🎲 Randomize</button>
        </div>
        <div class="sm-footer">
          <button type="button" class="sm-preview" id="cond-cancel">Cancel</button>
          <button type="button" class="sm-apply" id="cond-apply">Condense</button>
        </div>
      `;
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

      const divSel  = modal.querySelector('#cond-div');
      // Reflect the workspace's current Div as a useful default.
      divSel.value = String(stepSubdivision);

      modal.querySelector('#cond-rand').addEventListener('click', () => {
        const divs  = [4, 2, 1, 0.5, 0.25, 0.125];
        divSel.value  = String(divs[Math.floor(Math.random() * divs.length)]);
      });

      modal.querySelector('#cond-cancel').addEventListener('click', () => overlay.remove());

      modal.querySelector('#cond-apply').addEventListener('click', () => {
        const newDiv  = parseFloat(divSel.value) || 1;
        snapshotForUndo('Condense');
        stopSequence();
        const subSteps = sequence.map(s => {
          const c = cloneStep(s);
          c.duration = 1;
          c.subdivision = newDiv;
          return c;
        });
        sequence = [{
          isSub: true,
          subSteps,
          label: '▤',
          duration: 1,
          subdivision: 1,
        }];
        pendingChord = [];
        insertionPoint = null;
        renderSequence();
        overlay.remove();
      });
    }

    function appendWorkspaceToTrack(trackIdx) {
      if (sequence.length === 0 || !tracks[trackIdx]) return;
      let name;
      if (activeSeqIndex !== null && savedSequences[activeSeqIndex]) {
        name = savedSequences[activeSeqIndex].name;
      } else {
        // No saved entry yet — push the workspace into the bank first so
        // the track item is sourced from a named saved sequence and Save
        // overwrites can later propagate edits via name match.
        name = seqName(savedSequences.length);
        savedSequences.push({ name, ...currentSequenceSnapshot() });
        activeSeqIndex = savedSequences.length - 1;
        persistSaved();
        renderSavedSequences();
      }
      const snapshot = {
        name,
        bpm: parseInt(tempoInput.value) || 120,
        subdivision: stepSubdivision,
        steps: sequence.map(cloneStep),
      };
      tracks[trackIdx].items.push(snapshot);
      persistTracks();
      renderTracks();
      const btn = document.getElementById('append-track-btn');
      const original = btn.textContent;
      btn.textContent = 'Appended ✓';
      btn.classList.add('flash-confirm');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('flash-confirm');
      }, 1100);
    }

    document.getElementById('append-track-btn').addEventListener('click', (e) => {
      if (sequence.length === 0) return;
      const actions = [
        { label: '+ New track', fn: () => {
          addTrack();
          appendWorkspaceToTrack(tracks.length - 1);
        } },
      ];
      if (tracks.length > 0) {
        actions.push('hr');
        tracks.forEach((track, tIdx) => {
          actions.push({ label: `→ ${track.name}`, fn: () => appendWorkspaceToTrack(tIdx) });
        });
      }
      const rect = e.currentTarget.getBoundingClientRect();
      showCtxMenu(rect.left, rect.bottom + 4, actions);
    });

    // Hold: when steps are selected, edit those steps' durations in place
    // (all of them when Multi is on; just the primary otherwise). With no
    // selection, update the global default for the next note added.
    document.getElementById('note-length').addEventListener('change', (e) => {
      const v = parseInt(e.target.value) || 1;
      if (selectedStepRefs.length > 0) {
        const targets = (multiSelectMode ? selectedStepRefs : [lastSelectedStep()]).filter(Boolean);
        if (targets.length > 0) snapshotForUndo('Hold ' + v);
        targets.forEach(s => { if (s && !s.isSub) s.duration = v; });
        renderSequence();
      } else {
        noteLength = v;
      }
    });

    // Step Div: edits the selected steps' subdivisions (all of them when
    // Multi is on; just the primary otherwise). With no selection, sets
    // the global next-note default.
    document.getElementById('subdivision-select').addEventListener('change', (e) => {
      const v = parseFloat(e.target.value) || 1;
      if (selectedStepRefs.length > 0) {
        const targets = (multiSelectMode ? selectedStepRefs : [lastSelectedStep()]).filter(Boolean);
        if (targets.length > 0) snapshotForUndo('Step Div');
        targets.forEach(s => { if (s && !s.isSub) s.subdivision = v; });
        renderSequence();
      } else {
        stepSubdivision = v;
      }
      refreshHoldEnabled();
    });

    document.getElementById('multi-select-toggle').addEventListener('change', (e) => {
      multiSelectMode = !!e.target.checked;
      // When turning multi off, collapse to just the primary so the user
      // doesn't accidentally bulk-edit one chip while thinking only one
      // is selected.
      if (!multiSelectMode && selectedStepRefs.length > 1) {
        const primary = lastSelectedStep();
        selectedStepRefs = primary ? [primary] : [];
      }
      renderSequence();
    });

    document.getElementById('grid-cols-select').addEventListener('change', (e) => {
      gridColumns = parseInt(e.target.value, 10) || 0;
      // If step mode is on we need to top-up rests so the pattern fits the
      // new column count.
      if (stepMode) padToStepGrid();
      renderSequence();
    });

    document.getElementById('step-mode-btn').addEventListener('click', () => {
      stepMode = !stepMode;
      const btn = document.getElementById('step-mode-btn');
      btn.classList.toggle('active', stepMode);
      if (stepMode) {
        // Need a column count for step mode; default to 16 if Grid is Off.
        if (gridColumns < 4) {
          gridColumns = 16;
          const sel = document.getElementById('grid-cols-select');
          if (sel) sel.value = '16';
        }
        padToStepGrid();
      } else {
        clearStepModeArm();
        // If the user never filled any slots, dump the rest-only pattern so
        // they don't leave step mode with a workspace full of placeholders.
        if (sequence.length > 0 && sequence.every(isRestStep)) {
          stopSequence();
          sequence = [];
          pendingChord = [];
          insertionPoint = null;
          document.getElementById('save-btn').disabled = true;
        }
      }
      renderSequence();
    });

    function resetUIToDefault() {
      stopSequence();
      stopAllTracks();
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        try { mediaRecorder.stop(); } catch (e) {}
      }
      if (_previewAudio) { try { _previewAudio.pause(); } catch (e) {} _previewAudio = null; }
      sequence = [];
      pendingChord = [];

      chordMode = false;
      loopMode = false;
      noteLength = 1;
      stepSubdivision = 0.5;
      gridColumns = 8;

    // ---- Random sequence generator ----

    function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    const _RAND_SUBS = [4, 2, 1, 1, 0.5, 0.5, 0.5, 0.25, 0.25, 0.125];

    function sampleWithoutReplacement(sourceLen, k) {
      const pool = [];
      for (let i = 0; i < sourceLen; i++) pool.push(i);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, Math.min(k, sourceLen));
    }

    function randomStepParams(type) {
      return { type, attack: 10, decay: 100, sustain: 50, release: 1400, volume: 100, detune: 0, reverb: 0, reverbSize: 70, reverbTone: 50, delay: 0, delayTime: 250, delayFeedback: 40, distortion: 0 };
    }

    // Text → sequence translation. Mapping rules:
    //   letters       → scale-tone note. Letter index (a=0, …, z=25) wraps
    //                   over the available scale cells of the chosen scale.
    //   tone          → deterministic by letter (tonePool[letterIdx % len])
    //                   so every 'a' uses the same sound.
    //   vowels        → +1 to duration (held longer)
    //   uppercase     → +1 to duration (combines with vowel rule)
    //   consonant run → groups of 2+ consecutive consonants flush as one
    //                   chord (capped at MAX_CHORD voices, deduped by pitch).
    //                   Vowels and non-letters break the run.
    //   non-letters   → rest if includeRests, otherwise skipped (also flush
    //                   any pending chord run first).
    function generateTextSequence(text, scaleName, tones, includeRests, octavesToUse = null) {
      const intervals = (scaleName && SCALES[scaleName]) || SCALES['chromatic'];
      const totalOcts = Math.max(1, Math.floor(notes.length / 12));
      const octCap = Math.max(1, Math.min(totalOcts, Number.isFinite(octavesToUse) ? octavesToUse : totalOcts));
      const scaleCells = [];
      for (let i = 0; i < notes.length; i++) {
        if (Math.floor(i / 12) >= octCap) break;
        if (intervals.includes(i % 12)) scaleCells.push(i);
      }
      if (scaleCells.length === 0) return [];
      const tonePool = (Array.isArray(tones) && tones.length > 0) ? tones : SOUNDS;
      const VOWELS = new Set(['a','e','i','o','u']);
      const MAX_CHORD = 5;
      const subdivision = 1;
      const out = [];

      const letterCellIdx = (ch) => {
        const i = ch.toLowerCase().charCodeAt(0) - 97;
        return scaleCells[i % scaleCells.length];
      };
      const letterTone = (ch) => {
        const i = ch.toLowerCase().charCodeAt(0) - 97;
        return tonePool[i % tonePool.length];
      };
      const makeVoice = (letter) => {
        const cellIdx = letterCellIdx(letter);
        const sound = letterTone(letter);
        return {
          freq: notes[cellIdx].freq,
          label: notes[cellIdx].label,
          cellIndex: cellIdx,
          sound,
          params: randomStepParams(sound),
        };
      };

      let run = [];
      let runHasUpper = false;
      const flushRun = () => {
        if (run.length === 0) return;
        const dur = 1 + (runHasUpper ? 1 : 0);
        if (run.length === 1) {
          const v = makeVoice(run[0]);
          out.push({ ...v, duration: dur, subdivision });
        } else {
          const voices = [];
          const seenCells = new Set();
          for (const letter of run.slice(0, MAX_CHORD)) {
            const v = makeVoice(letter);
            if (seenCells.has(v.cellIndex)) continue;
            seenCells.add(v.cellIndex);
            voices.push(v);
          }
          if (voices.length === 1) {
            out.push({ ...voices[0], duration: dur, subdivision });
          } else {
            out.push({
              chord: voices,
              label: voices.map(n => n.label).join('·'),
              duration: dur, subdivision,
            });
          }
        }
        run = [];
        runHasUpper = false;
      };

      for (const ch of String(text)) {
        if (/[a-zA-Z]/.test(ch)) {
          const lower = ch.toLowerCase();
          const isUpper = ch !== lower;
          if (VOWELS.has(lower)) {
            flushRun();
            const dur = 2 + (isUpper ? 1 : 0);
            const v = makeVoice(ch);
            out.push({ ...v, duration: dur, subdivision });
          } else {
            run.push(ch);
            if (isUpper) runHasUpper = true;
          }
        } else {
          flushRun();
          if (includeRests) {
            out.push({ freq: null, label: '—', cellIndex: null, duration: 1, subdivision });
          }
        }
      }
      flushRun();
      return out;
    }

    function generateRandomSequence(numSteps, maxChordSize, includeRests = true, includeChords = true, scaleName = null, tones = null, octavesToUse = null) {
      // Filter the chromatic note grid down to scale tones — `pool` holds
      // the cell indices we're allowed to sample from. octavesToUse caps the
      // pool to the bottom N octaves of the grid (1 = lowest octave only).
      const intervals = (scaleName && SCALES[scaleName]) || SCALES['chromatic'];
      const totalOcts = Math.max(1, Math.floor(notes.length / 12));
      const octCap = Math.max(1, Math.min(totalOcts, Number.isFinite(octavesToUse) ? octavesToUse : totalOcts));
      const pool = [];
      for (let i = 0; i < notes.length; i++) {
        if (Math.floor(i / 12) >= octCap) break;
        if (intervals.includes(i % 12)) pool.push(i);
      }
      const poolSize = pool.length;
      if (poolSize === 0) return [];
      const tonePool = (Array.isArray(tones) && tones.length > 0) ? tones : SOUNDS;
      const out = [];
      const chordAllowed = includeChords && maxChordSize > 1 && poolSize > 1;
      for (let s = 0; s < numSteps; s++) {
        const roll = Math.random();
        const subdivision = randomFrom(_RAND_SUBS);
        const duration    = 1;
        if (includeRests && roll < 0.18) {
          out.push({ freq: null, label: '—', cellIndex: null, duration, subdivision });
          continue;
        }
        if (chordAllowed && roll < 0.45) {
          const size = 2 + Math.floor(Math.random() * (maxChordSize - 1));
          const picked = sampleWithoutReplacement(poolSize, size);
          const chord = picked.map(p => {
            const idx = pool[p];
            const sound = randomFrom(tonePool);
            return {
              freq: notes[idx].freq,
              label: notes[idx].label,
              cellIndex: idx,
              sound,
              params: randomStepParams(sound),
            };
          });
          out.push({
            chord,
            label: chord.map(n => n.label).join('·'),
            duration, subdivision,
          });
          continue;
        }
        const idx = pool[Math.floor(Math.random() * poolSize)];
        const sound = randomFrom(tonePool);
        out.push({
          freq: notes[idx].freq,
          label: notes[idx].label,
          cellIndex: idx,
          sound,
          params: randomStepParams(sound),
          duration, subdivision,
        });
      }
      return out;
    }

    // ---- Subsequence editor mode ----

    let subEditState = null; // { parentStepIndex, parentSequence, parentActiveSeqIndex }

    function enterSubEditMode(parentStepIndex) {
      if (subEditState) return; // No nesting
      stopSequence();
      const parentStep = sequence[parentStepIndex];
      let initialSubSteps;
      if (parentStep && parentStep.isSub && Array.isArray(parentStep.subSteps)) {
        initialSubSteps = parentStep.subSteps.map(s => ({ ...s }));
      } else if (parentStep) {
        // Carry the existing step into the subsequence so the user starts
        // from what was there instead of an empty workspace.
        initialSubSteps = [{ ...parentStep }];
      } else {
        initialSubSteps = [];
      }
      subEditState = {
        parentStepIndex,
        parentSequence: sequence.map(s => ({ ...s })),
        parentActiveSeqIndex: activeSeqIndex,
        parentInsertionPoint: insertionPoint,
      };
      sequence = initialSubSteps;
      pendingChord = [];
      activeSeqIndex = null;
      insertionPoint = null;
      document.getElementById('subedit-banner').classList.add('open');
      document.getElementById('save-btn').classList.add('sub-edit');
      document.getElementById('save-btn').disabled = sequence.length === 0;
      renderSequence();
    }

    function exitSubEditMode(parentSequence) {
      sequence = parentSequence;
      pendingChord = [];
      activeSeqIndex = subEditState.parentActiveSeqIndex;
      insertionPoint = subEditState.parentInsertionPoint ?? null;
      subEditState = null;
      document.getElementById('subedit-banner').classList.remove('open');
      document.getElementById('save-btn').classList.remove('sub-edit');
      document.getElementById('save-btn').disabled = sequence.length === 0;
      renderSequence();
      renderSavedSequences();
    }

    function commitSubEditAndExit() {
      if (!subEditState) return;
      const subSteps = sequence.map(s => ({ ...s }));
      const parent = subEditState.parentSequence;
      if (subSteps.length > 0) {
        parent[subEditState.parentStepIndex] = {
          isSub: true,
          subSteps,
          label: '▤',
          duration: 1,
        };
      } else {
        parent.splice(subEditState.parentStepIndex, 1);
      }
      exitSubEditMode(parent);
    }

    function cancelSubEdit() {
      if (!subEditState) return;
      stopSequence();
      exitSubEditMode(subEditState.parentSequence);
    }

    document.getElementById('subedit-cancel').addEventListener('click', cancelSubEdit);

    function flashSaveConfirm(label = 'Saved ✓') {
      const btn = document.getElementById('save-btn');
      const original = btn.textContent;
      btn.textContent = label;
      btn.classList.add('flash-confirm');
      setTimeout(() => {
        btn.textContent = original;
