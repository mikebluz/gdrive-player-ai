    function playCountIn() {
      const bpm = parseInt(tempoInput?.value, 10) || 120;
      const beatMs = 60000 / bpm;
      return new Promise(resolve => {
        for (let i = 0; i < 4; i++) {
          setTimeout(() => {
            const freq = (i === 0) ? 1318.5 : 880; // E6 downbeat, A5 inner beats
            try {
              playNote(freq, { type: 'triangle', attack: 4, decay: 60, sustain: 0, release: 80, volume: 70 }, 90);
            } catch (e) {}
          }, beatMs * i);
        }
        // Resolve at the end of the fourth beat so callers can start the
        // recorder + monitor tracks exactly on what would be beat 5.
        setTimeout(resolve, beatMs * 4);
      });
    }

    // ---- Export: render tracks offline to WAV and upload to Google Drive ----

    function audioBufferToWav(buffer) {
      const numCh = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const bytesPerSample = 2;
      const blockAlign = numCh * bytesPerSample;
      const samples = buffer.length;
      const dataLen = samples * blockAlign;
      const ab = new ArrayBuffer(44 + dataLen);
      const v = new DataView(ab);
      const ws = (o, s) => { for (let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
      ws(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true); ws(8, 'WAVE');
      ws(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, numCh, true);
      v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * blockAlign, true);
      v.setUint16(32, blockAlign, true); v.setUint16(34, 16, true);
      ws(36, 'data'); v.setUint32(40, dataLen, true);
      let off = 44;
      const chans = [];
      for (let c = 0; c < numCh; c++) chans.push(buffer.getChannelData(c));
      for (let i = 0; i < samples; i++) {
        for (let c = 0; c < numCh; c++) {
          let s = Math.max(-1, Math.min(1, chans[c][i]));
          v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
          off += 2;
        }
      }
      return new Blob([ab], { type: 'audio/wav' });
    }

    // Estimate how long an effect tail keeps producing audible signal. Used
    // to size the offline-render buffer so reverb / delay tails don't get
    // chopped off the end of the export.
    //   • Reverb tail scales with Freeverb's roomSize. roomSize 0.7 ≈ 5s,
    //     0.99 ≈ 7s; tiny rooms decay almost immediately.
    //   • Delay tail repeats until amplitude * feedback^N drops below ~-60dB
    //     (0.001). Total tail = N × delayTime.
    function fxTailSec(reverb, reverbSize, delay, delayTime, delayFeedback) {
      let t = 0;
      if (reverb > 0) {
        const sizeFactor = Math.max(0, Math.min(1, reverbSize / 100));
        t = Math.max(t, 1 + sizeFactor * 6);
      }
      if (delay > 0 && delayFeedback > 0) {
        const f = Math.max(0.001, Math.min(0.95, delayFeedback / 100));
        const repeats = Math.ceil(Math.log(0.001) / Math.log(f));
        const delaySec = (delayTime || 0) / 1000;
        t = Math.max(t, repeats * delaySec);
      }
      return t;
    }
    function estimateExportTailSec() {
      // Start with the global FX tail.
      let tail = fxTailSec(
        globalFx.reverb, globalFx.reverbSize,
        globalFx.delay,  globalFx.delayTime, globalFx.delayFeedback
      );
      // Fold in the worst-case per-note FX tail across every step in every
      // track (chord voices, step params, and any nested subsequences).
      const visit = (step) => {
        if (!step) return;
        if (step.isSub && Array.isArray(step.subSteps)) { step.subSteps.forEach(visit); return; }
        const probe = (p) => {
          if (!p) return;
          tail = Math.max(tail, fxTailSec(
            p.reverb     || 0, p.reverbSize    ?? 70,
            p.delay      || 0, p.delayTime     ?? 250,
                                p.delayFeedback ?? 40
          ));
        };
        if (step.chord) step.chord.forEach(n => probe(n.params));
        else probe(step.params);
      };
      tracks.forEach(track => {
        (track.items || []).forEach(item => {
          if (item.type === 'audio' || item.type === 'silent') return;
          (item.steps || []).forEach(visit);
        });
      });
      // Add 2s on top for envelope release decays past the FX tail, and
      // clamp to a sane upper bound so a runaway feedback setting can't
      // produce a multi-minute buffer.
      return Math.min(60, Math.max(2, tail) + 2);
    }

    async function renderTracksToBuffer() {
      const durationsMs = tracks.map(track => {
        let ms = 0;
        (track.items || []).forEach(item => { ms += itemDurationMs(item); });
        return ms;
      });
      const totalMs = Math.max(...durationsMs, 1000);
      // Add an FX-aware trailing tail so reverb / delay decays render in
      // full (the previous fixed 3 s could chop long tails off the export).
      const tailSec = estimateExportTailSec();
      const totalSec = (totalMs / 1000) + tailSec;

      // Match the live audio context's sample rate so the exported buffer
      // (and the resulting WAV) plays back at the same speed and pitch as
      // what's heard live. Without this, Tone.Offline can fall back to a
      // different rate than the live context.
      const sampleRate = (Tone.getContext && Tone.getContext().sampleRate) || 44100;
      return await Tone.Offline(async () => {
        const limiter = new Tone.Limiter(-1).toDestination();
        // Mirror the live global FX chain so the exported WAV matches what
        // the user hears in the browser.
        const offReverb = new Tone.Freeverb({
          roomSize:  Math.max(0, Math.min(0.99, globalFx.reverbSize / 100)),
          dampening: 500 + Math.max(0, Math.min(100, globalFx.reverbTone)) * 95,
          wet:       Math.max(0, Math.min(1, globalFx.reverb / 100)),
        }).connect(limiter);
        const offDelay = new Tone.FeedbackDelay({
          delayTime: Math.max(0.001, (globalFx.delayTime || 0) / 1000),
          feedback:  Math.max(0, Math.min(0.95, globalFx.delayFeedback / 100)),
          wet:       Math.max(0, Math.min(1, globalFx.delay / 100)),
        }).connect(offReverb);
        const offDistortion = new Tone.Distortion({
          distortion: Math.max(0, Math.min(1, globalFx.distortion / 100)),
          wet: 1,
        }).connect(offDelay);
        const bus = new Tone.Compressor({ threshold: -24, ratio: 4, attack: 0.003, release: 0.25, knee: 12 }).connect(offDistortion);

        // Rebuild every registered sampler inside the offline context — the
        // live samplers are bound to the live AudioContext, so triggering
        // them in here would render to the live destination, not the offline
        // buffer (which is why sample-based notes vanished from exports).
        // Wait for them to load before scheduling notes so .loaded checks
        // pass at trigger time.
        const offlineSamplerMap = new Map();
        sampleSamplers.forEach((info, id) => {
          if (!info.urls) return;
          try {
            const samp = new Tone.Sampler({
              urls: info.urls,
              baseUrl: info.baseUrl,
              release: 1,
            }).connect(bus);
            offlineSamplerMap.set(id, samp);
          } catch (e) {
            console.warn('Failed to recreate sampler in offline render', id, e);
          }
        });
        // Block until the offline samplers have decoded their buffers so
        // that .loaded is true at schedule time. Audio-item Tone.Player
        // loads also drain through this same await.
        await Tone.loaded();
        _offlineSamplerOverride = offlineSamplerMap;

        const players = [];
        try {
        tracks.forEach(track => {
          // Mirror the live per-track EQ + Pan in the offline render so the
          // exported WAV matches what the user hears in the browser.
          const teq = track.eq || { low: 0, mid: 0, high: 0 };
          const tpan = Math.max(-1, Math.min(1, Number.isFinite(track.pan) ? track.pan : 0));
          const trackPanner = new Tone.Panner(tpan).connect(bus);
          const trackBus = new Tone.EQ3({
            low:  teq.low  || 0,
            mid:  teq.mid  || 0,
            high: teq.high || 0,
          }).connect(trackPanner);
          let time = 0;
          (track.items || []).forEach(item => {
            if (item.type === 'audio') {
              const player = new Tone.Player({ url: item.audioDataUrl }).connect(trackBus);
              players.push({ player, startTime: time });
              time += (item.durationSec || 0);
              return;
            }
            if (item.type === 'silent') {
              time += (item.durationSec || 0);
              return;
            }
            const itemBpm = item.bpm || 120;
            const itemSub = item.subdivision || 1;
            flattenItemSteps(item.steps).forEach(step => {
              const stepSub = (step.subdivision != null) ? step.subdivision : itemSub;
              const stepMs = Math.round(60000 / itemBpm * stepSub);
              const durMs  = stepMs * (step.duration || 1);
              const durSec = durMs / 1000;
              if (step.chord) {
                const size = step.chord.length;
                step.chord.forEach(n => playNote(n.freq, paramsWithBend(chordVoiceParams(n.params || n.sound || 'sine', size), step.bend), durMs, time, trackBus));
              } else if (step.freq !== null && step.freq !== undefined) {
                playNote(step.freq, paramsWithBend(step.params || step.sound || 'sine', step.bend), durMs, time, trackBus);
              }
              time += durSec;
            });
          });
        });
        // Wait for any audio-item Tone.Player buffers to decode (offline
        // samplers were already awaited above) before scheduling starts.
        if (players.length > 0) await Tone.loaded();
        players.forEach(({ player, startTime }) => {
          try { player.start(startTime); } catch (e) {}
        });
        } finally {
          // Drop the override regardless of whether scheduling threw —
          // otherwise live playback after a failed export would keep
          // resolving to disposed offline samplers.
          _offlineSamplerOverride = null;
        }
      }, totalSec, 2, sampleRate);
    }

    // Google Drive auth + upload (lazy-loads gapi/GIS via <script> on demand)
    let googleAccessToken = null;
    let googleTokenClient = null;

    function loadExternalScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) return resolve();
        const s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(s);
      });
    }

    async function googleSignInForDrive() {
      if (!window.APP_CONFIG || !window.APP_CONFIG.clientId || !window.APP_CONFIG.apiKey) {
        throw new Error('Missing Google API config (js/config.js).');
      }
      await loadExternalScript('https://apis.google.com/js/api.js');
      await loadExternalScript('https://accounts.google.com/gsi/client');
      if (!gapi.client) await new Promise(res => gapi.load('client', res));
      if (!gapi.client.drive) {
        await gapi.client.init({
          apiKey: window.APP_CONFIG.apiKey,
          discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        });
      }
      if (googleAccessToken) {
        gapi.client.setToken({ access_token: googleAccessToken });
        return googleAccessToken;
      }
      return new Promise((resolve, reject) => {
        googleTokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.APP_CONFIG.clientId,
          scope: 'https://www.googleapis.com/auth/drive.file',
          callback: (resp) => {
            if (resp.error) return reject(new Error(resp.error));
            googleAccessToken = resp.access_token;
            gapi.client.setToken({ access_token: googleAccessToken });
            resolve(googleAccessToken);
          },
        });
        googleTokenClient.requestAccessToken();
      });
    }

    async function findOrCreateDriveFolder(name) {
      const q = `name='${name.replace(/'/g, "\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
      const list = await gapi.client.drive.files.list({
        q, fields: 'files(id, name)', spaces: 'drive',
      });
      if (list.result.files && list.result.files.length > 0) return list.result.files[0].id;
      const create = await gapi.client.drive.files.create({
        resource: { name, mimeType: 'application/vnd.google-apps.folder' },
        fields: 'id',
      });
      return create.result.id;
    }

    async function uploadJsonToDrive(name, jsonString, folderId, existingFileId) {
      // POST /files for new uploads, PATCH /files/{id} to replace an existing
      // file in place (preserves the file's id / shared links / Drive history).
      const url = existingFileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${existingFileId}?uploadType=resumable`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable';
      const method = existingFileId ? 'PATCH' : 'POST';
      // PATCH must not include a `parents` field unless paired with the
      // addParents/removeParents query params, so omit it when updating.
      const metadata = existingFileId
        ? { name, mimeType: 'application/json' }
        : { name, parents: [folderId], mimeType: 'application/json' };
      const initResp = await fetch(url, {
        method,
        headers: {
          'Authorization': `Bearer ${googleAccessToken}`,
          'Content-Type': 'application/json; charset=UTF-8',
          'X-Upload-Content-Type': 'application/json',
        },
        body: JSON.stringify(metadata),
      });
      if (!initResp.ok) throw new Error(`Drive init failed: ${initResp.status} ${await initResp.text()}`);
      const uploadUrl = initResp.headers.get('Location');
      if (!uploadUrl) throw new Error('Drive did not return an upload URL.');
      const putResp = await fetch(uploadUrl, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json; charset=UTF-8' },
        body: jsonString,
      });
      if (!putResp.ok) throw new Error(`Drive upload failed: ${putResp.status} ${await putResp.text()}`);
      return putResp.json();
    }

    async function uploadWavToDrive(name, blob, folderId) {
      const initResp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${googleAccessToken}`,
          'Content-Type': 'application/json; charset=UTF-8',
          'X-Upload-Content-Type': 'audio/wav',
        },
        body: JSON.stringify({ name, parents: [folderId], mimeType: 'audio/wav' }),
      });
      if (!initResp.ok) throw new Error(`Drive init failed: ${initResp.status} ${await initResp.text()}`);
      const uploadUrl = initResp.headers.get('Location');
      if (!uploadUrl) throw new Error('Drive did not return an upload URL.');
      const putResp = await fetch(uploadUrl, {
        method: 'PUT',
        headers: { 'Content-Type': 'audio/wav' },
        body: blob,
      });
      if (!putResp.ok) throw new Error(`Drive upload failed: ${putResp.status} ${await putResp.text()}`);
      return putResp.json();
    }

    async function exportTracksToDrive() {
      const btn = document.getElementById('tracks-export-btn');
      const anyItems = tracks.some(t => (t.items || []).length > 0);
      if (!anyItems) { alert('Add at least one saved sequence to a track before exporting.'); return; }
      const defaultName = `sounds-mix-${new Date().toISOString().replace(/[:.]/g, '-').slice(0,19)}`;
      const filename = prompt('File name for the export (no extension):', defaultName);
      if (!filename) return;
      const folderName = prompt('Google Drive folder to save in:', 'Bloops exports');
      if (!folderName) return;

      const origText = btn.textContent;
      btn.disabled = true;
      try {
        btn.textContent = 'Rendering…';
        const buffer = await renderTracksToBuffer();
        const blob = audioBufferToWav(buffer);

        btn.textContent = 'Signing in…';
        await googleSignInForDrive();

        btn.textContent = 'Uploading…';
        const folderId = await findOrCreateDriveFolder(folderName);
        const file = await uploadWavToDrive(`${filename}.wav`, blob, folderId);

        btn.textContent = 'Saved';
        alert(`Saved "${file.name || filename + '.wav'}" to Drive folder "${folderName}".`);
      } catch (e) {
        console.error(e);
        alert(`Export failed: ${e.message || e}`);
      } finally {
        setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 1200);
      }
    }

    document.getElementById('tracks-export-btn').addEventListener('click', exportTracksToDrive);

    // Render the mix and hand the resulting WAV to the system share sheet —
    // on mobile this brings up text/email/chat targets without bouncing
    // through Drive. Falls back to a clear message when the browser doesn't
    // implement the Web Share API for files (e.g. desktop Firefox).
    async function shareTracksAudio() {
      const btn = document.getElementById('tracks-share-btn');
      const anyItems = tracks.some(t => (t.items || []).length > 0);
      if (!anyItems) { alert('Add at least one saved sequence to a track before sharing.'); return; }
      if (typeof navigator.share !== 'function') {
        alert('This browser does not support sharing. Use Export to save the file and share it manually.');
        return;
      }
      const filename = `bloops-mix-${new Date().toISOString().replace(/[:.]/g, '-').slice(0,19)}.wav`;
      const origText = btn.textContent;
      btn.disabled = true;
      try {
        btn.textContent = 'Rendering…';
        const buffer = await renderTracksToBuffer();
        const blob   = audioBufferToWav(buffer);
        const file   = new File([blob], filename, { type: 'audio/wav' });
        if (typeof navigator.canShare === 'function' && !navigator.canShare({ files: [file] })) {
          alert('This browser cannot share audio files directly. Use Export to save the file and share it manually.');
          return;
        }
        btn.textContent = 'Sharing…';
        await navigator.share({
          title: 'Bloops mix',
          text:  'Made with Bloops',
          files: [file],
        });
        btn.textContent = 'Shared';
      } catch (e) {
        // Web Share rejects with AbortError when the user dismisses the
        // share sheet — that's a normal cancel, not an error worth alerting.
        if (e && e.name !== 'AbortError') {
          console.error(e);
          alert(`Share failed: ${e.message || e}`);
        }
      } finally {
        setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 1200);
      }
    }
    document.getElementById('tracks-share-btn').addEventListener('click', shareTracksAudio);

    // Capture the whole workspace into a JSON-friendly snapshot — what the
    // user has on screen plus every persisted side-store (saved sequences,
    // tracks, grid states, global FX). Loaded back later via the matching
    // restore path. Imported samples themselves are NOT bundled (their
    // blobs live in IndexedDB and could be megabytes); cell sound types
    // that reference 'sample:<id>' will only resolve on a device that
    // already has the sample registered.
    // Tracks the most recently saved or loaded project name so voice saves
    // can prepend it without re-asking the user. Stays null until a project
    // is named — voice flows then prompt the user for a project name first.
    let currentProjectName = null;

    function buildProjectSnapshot() {
      return {
        version: 1,
        savedAt: new Date().toISOString(),
        workspace: {
          sequence: sequence.map(cloneStep),
          pendingChord: pendingChord.map(p => ({ ...p, params: p.params ? { ...p.params } : undefined })),
          bpm: parseInt(tempoInput?.value, 10) || 120,
          noteLength,
          stepSubdivision,
          gridColumns,
          chordMode: !!chordMode,
          loopMode:  !!loopMode,
          stepMode:  !!stepMode,
          multiSelectMode: !!multiSelectMode,
          activeSeqIndex,
        },
        grid: {
          rootIdx,
          baseOctave,
          octaveCount,
          masterFreqA,
          currentScale,
          palette: [...palette],
          chipPalette: [...chipPalette],
          restColor,
          cellSounds: [...cellSounds],
          cellParams: cellParams.map(p => ({ ...p })),
        },
        savedSequences: savedSequences.map(s => JSON.parse(JSON.stringify(s))),
        tracks: tracks.map(t => ({
          id: t.id,
          name: t.name,
          items: t.items,
          loopMode: !!t.loopMode,
          solo: !!t.solo,
          eq: t.eq || { low: 0, mid: 0, high: 0 },
          pan: Number.isFinite(t.pan) ? t.pan : 0,
        })),
        globalFx: { ...globalFx },
        savedGridStates: JSON.parse(JSON.stringify(savedGridStates || [])),
      };
    }

    async function saveProjectToDrive() {
      const btn = document.getElementById('tracks-save-project-btn');
      const defaultName = `bloops-project-${new Date().toISOString().replace(/[:.]/g, '-').slice(0,19)}`;
      const projectName = prompt('Name for this project:', defaultName);
      if (!projectName) return false;
      const filename = projectName.trim().replace(/\.json$/i, '') + '.json';

      const origText = btn.textContent;
      btn.disabled = true;
      let saved = false;
      try {
        btn.textContent = 'Building…';
        const snapshot = buildProjectSnapshot();
        const jsonString = JSON.stringify(snapshot, null, 2);

        btn.textContent = 'Signing in…';
        await googleSignInForDrive();

        btn.textContent = 'Checking…';
        const folderId = await findOrCreateDriveFolder('Bloops Projects');
        const existing = await listProjectsInDrive(folderId);
        // Drive permits multiple files with the same name in one folder, so
        // a strict-match scan is the only way to detect a name collision.
        const match = existing.find(f => f.name === filename);
        let existingFileId = null;
        if (match) {
          const ok = confirm(`A project named "${projectName.trim()}" already exists in "Bloops Projects".\n\nOverwrite it?`);
          if (!ok) {
            btn.textContent = origText;
            btn.disabled = false;
            return false;
          }
          existingFileId = match.id;
        }

        btn.textContent = existingFileId ? 'Overwriting…' : 'Uploading…';
        const file = await uploadJsonToDrive(filename, jsonString, folderId, existingFileId);

        // Remember this name so subsequent Save Voice flows can prepend it
        // to the voice filename without re-prompting.
        currentProjectName = projectName.trim();
        btn.textContent = existingFileId ? 'Overwritten' : 'Saved';
        alert(`${existingFileId ? 'Overwrote' : 'Saved'} "${file.name || filename}" in Drive folder "Bloops Projects".`);
        saved = true;
      } catch (e) {
        console.error(e);
        alert(`Save failed: ${e.message || e}`);
      } finally {
        setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 1200);
      }
      return saved;
    }
    document.getElementById('tracks-save-project-btn').addEventListener('click', saveProjectToDrive);

    // ---- New project ---------------------------------------------------
    // Wipes the in-memory state plus every persisted side-store back to
    // the same shape the app boots into on a clean install. Runs after the
    // user has had a chance to save the current project.
    function resetToDefaultProject() {
      stopSequence();
      stopAllTracks();
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        try { mediaRecorder.stop(); } catch (e) {}
      }
      if (_previewAudio) { try { _previewAudio.pause(); } catch (e) {} _previewAudio = null; }

      // Dispose live track audio nodes before we drop the array — same
      // teardown the project-load path uses.
      tracks.forEach(t => {
        if (t._recording) {
          try { t._recorder?.stop(); } catch (e) {}
          if (t._recStream) {
            try { t._recStream.getTracks().forEach(s => s.stop()); } catch (e) {}
          }
          t._recording = false;
          t._recorder = null;
          t._recStream = null;
        }
        if (t._bus)    { try { t._bus.dispose(); }    catch (e) {} t._bus = null; }
        if (t._panner) { try { t._panner.dispose(); } catch (e) {} t._panner = null; }
        if (t._samplers) {
          t._samplers.forEach(s => { try { s.dispose(); } catch (e) {} });
          t._samplers = null;
        }
        if (t.timer) { clearTimeout(t.timer); t.timer = null; }
      });

      // Workspace.
      sequence = [];
      pendingChord = [];
      selectedStepRefs = [];
      insertionPoint = null;
      activeSeqIndex = null;
      noteLength = 1;
      stepSubdivision = 0.5;
      gridColumns = 8;
      chordMode = false;
      loopMode = false;
      stepMode = false;
      multiSelectMode = false;

      if (typeof tempoInput  !== 'undefined' && tempoInput)  tempoInput.value  = '120';
      if (typeof tempoSlider !== 'undefined' && tempoSlider) tempoSlider.value = '120';
      document.getElementById('chord-btn')?.classList.remove('active');
      document.querySelector('.btn-group--step')?.classList.remove('chord-active');
      document.getElementById('loop-btn')?.classList.remove('active');
      const noteSel  = document.getElementById('note-length');        if (noteSel)  noteSel.value  = '1';
      const subSel   = document.getElementById('subdivision-select'); if (subSel)   subSel.value   = '0.5';
      const gridSel  = document.getElementById('grid-cols-select');   if (gridSel)  gridSel.value  = '8';
      document.getElementById('step-mode-btn')?.classList.remove('active');
      const multiCb  = document.getElementById('multi-select-toggle');if (multiCb)  multiCb.checked = false;
      refreshHoldEnabled();

      // Grid (root, octaves, scale, palette, A4) + cell sounds via rebuildGrid.
      resetGridToDefault();

      // Saved sequences bank.
      savedSequences = [];
      persistSaved();

      // Tracks.
      tracks = [];
      persistTracks();

      // Saved grid states.
      savedGridStates = [];
      persistGridStates();
      refreshGridStateDropdown('');

      // Global FX → defaults + sync the FX panel UI.
      Object.keys(GLOBAL_FX_DEFAULTS).forEach(k => { globalFx[k] = GLOBAL_FX_DEFAULTS[k]; });
      applyGlobalFx();
      persistGlobalFx();
      [
        ['fx-rev',      'fx-rev-v',      'reverb',        '%'],
        ['fx-rev-size', 'fx-rev-size-v', 'reverbSize',    '%'],
        ['fx-rev-tone', 'fx-rev-tone-v', 'reverbTone',    '%'],
        ['fx-dly',      'fx-dly-v',      'delay',         '%'],
        ['fx-dly-time', 'fx-dly-time-v', 'delayTime',     ' ms'],
        ['fx-dly-fb',   'fx-dly-fb-v',   'delayFeedback', '%'],
        ['fx-dst',      'fx-dst-v',      'distortion',    '%'],
      ].forEach(([id, valId, key, unit]) => {
        const input = document.getElementById(id);
        const label = document.getElementById(valId);
        if (input) input.value = String(globalFx[key]);
        if (label) label.textContent = globalFx[key] + unit;
      });

      currentProjectName = null;

      renderSequence();
      renderSavedSequences();
      renderTracks();
      const saveBtn = document.getElementById('save-btn');
      if (saveBtn) saveBtn.disabled = true;
    }

    // 3-button modal: Save first / Don't save / Cancel.
    function askNewProjectChoice() {
      return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.className = 'sm-overlay';
        const modal = document.createElement('div');
        modal.className = 'sm-modal';
        modal.innerHTML = `
          <div class="sm-title">Start a new project?</div>
          <div style="color:#a0aec0;font-family:'Segoe UI',sans-serif;font-size:0.85rem;line-height:1.4;margin-bottom:18px;">
            This clears the workspace, tracks, saved sequences, grid states, and effects. Save the current project first?
          </div>
          <div class="sm-footer">
            <button type="button" class="sm-preview" id="np-cancel">Cancel</button>
            <button type="button" class="sm-preview" id="np-discard">Don't save</button>
            <button type="button" class="sm-apply"   id="np-save">Save first…</button>
          </div>
        `;
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
        const close = (val) => { overlay.remove(); resolve(val); };
        overlay.addEventListener('click', e => { if (e.target === overlay) close('cancel'); });
        modal.querySelector('#np-cancel').addEventListener('click', () => close('cancel'));
        modal.querySelector('#np-discard').addEventListener('click', () => close('discard'));
        modal.querySelector('#np-save').addEventListener('click',   () => close('save'));
      });
    }

    async function newProject() {
      const choice = await askNewProjectChoice();
      if (choice === 'cancel') return;
      if (choice === 'save') {
        const ok = await saveProjectToDrive();
        if (!ok) return; // user cancelled the name prompt or the save errored
      }
      resetToDefaultProject();
    }
    document.getElementById('new-project-btn').addEventListener('click', newProject);

    // ---- Voices: grid-only snapshots saved to Drive --------------------
    // A "voice" captures just the note grid (root, octaves, scale, palette,
    // per-cell sounds) — no workspace sequence, no tracks. Filenames are
    // namespaced by the current project name so multiple projects can have
    // their own "Lead", "Bass", etc. presets without colliding.
    function buildVoiceSnapshot(name) {
      return {
        type: 'voice',
        version: 1,
        name,
        project: currentProjectName || null,
        savedAt: new Date().toISOString(),
        grid: {
          rootIdx,
          baseOctave,
          octaveCount,
          masterFreqA,
          currentScale,
          palette: [...palette],
          chipPalette: [...chipPalette],
          restColor,
          cellSounds: [...cellSounds],
          cellParams: cellParams.map(p => ({ ...p })),
        },
      };
    }
    function applyVoiceSnapshot(snap) {
      if (!snap || !snap.grid) throw new Error('Voice file is malformed.');
      const g = snap.grid;
      rootIdx     = Number.isFinite(g.rootIdx)     ? g.rootIdx     : 0;
      baseOctave  = Number.isFinite(g.baseOctave)  ? g.baseOctave  : 4;
      octaveCount = Number.isFinite(g.octaveCount) ? g.octaveCount : 1;
      masterFreqA = Number.isFinite(g.masterFreqA) ? g.masterFreqA : 440;
      currentScale = (g.currentScale && SCALES[g.currentScale]) ? g.currentScale : 'chromatic';
      palette = Array.isArray(g.palette) && g.palette.length === 12 ? [...g.palette] : [...DEFAULT_PALETTE];
      chipPalette = Array.isArray(g.chipPalette) && g.chipPalette.length === palette.length ? [...g.chipPalette] : [...palette];
      restColor = g.restColor || DEFAULT_REST_COLOR;
      applyRestColor();

      const rootSel   = document.getElementById('root-select');
      const octRange  = document.getElementById('octave-range-select');
      const freqSl    = document.getElementById('master-freq-slider');
      const freqIn    = document.getElementById('master-freq-input');
      const scaleSel  = document.getElementById('scale-select');
      if (rootSel)   rootSel.value   = String(rootIdx);
      if (octRange)  octRange.value  = `${baseOctave}x${octaveCount}`;
      if (freqSl)    freqSl.value    = String(masterFreqA);
      if (freqIn)    freqIn.value    = String(masterFreqA);
      if (scaleSel)  scaleSel.value  = currentScale;

      rebuildGrid();

      if (Array.isArray(g.cellSounds) && g.cellSounds.length === cellSounds.length
          && Array.isArray(g.cellParams) && g.cellParams.length === cellParams.length) {
        cellSounds = [...g.cellSounds];
        cellParams = g.cellParams.map(p => ({ ...p }));
        refreshAllCellFreqLabels();
      }
      updateScaleBanner();
    }

    // Drive-safe filename token: strip anything that would mess with Drive's
    // file-name parsing or our `name.voice.something.json` convention.
    function sanitizeVoiceToken(s) {
      return String(s || '').trim().replace(/[\\/]+/g, '-').replace(/\.+/g, '-');
    }

    async function saveVoiceToDrive() {
      const btn = document.getElementById('grid-save-voice-btn');
      // Force a project name first — voices are namespaced under the current
      // project so the user always knows what they belong to.
      if (!currentProjectName || !currentProjectName.trim()) {
        const ok = confirm('Save the project first? Voices are saved with the project\'s name in the filename.');
        if (!ok) return;
        await saveProjectToDrive();
        if (!currentProjectName) return; // user cancelled the project save
      }
      const voiceRaw = prompt('Name for this Voice (grid state):', '');
      if (!voiceRaw || !voiceRaw.trim()) return;
      const voiceName = sanitizeVoiceToken(voiceRaw);
      const projectToken = sanitizeVoiceToken(currentProjectName);
      const filename = `${projectToken}.voice.${voiceName}.json`;

      const origText = btn.textContent;
      btn.disabled = true;
      try {
        btn.textContent = 'Building…';
        const snapshot = buildVoiceSnapshot(voiceName);
        const jsonString = JSON.stringify(snapshot, null, 2);

        btn.textContent = 'Signing in…';
        await googleSignInForDrive();

        btn.textContent = 'Checking…';
        const folderId = await findOrCreateDriveFolder('Bloops Projects');
        const existing = await listProjectsInDrive(folderId);
        const match = existing.find(f => f.name === filename);
        let existingFileId = null;
        if (match) {
          const ok = confirm(`A voice "${voiceName}" already exists for project "${projectToken}" — overwrite it?`);
          if (!ok) {
            btn.textContent = origText;
            btn.disabled = false;
            return;
          }
          existingFileId = match.id;
        }

        btn.textContent = existingFileId ? 'Overwritten' : 'Saved';

      } catch (e) {

        alert(`Save voice failed: ${e.message || e}`);

    // ---- FX preset save / load (Drive folder "Bloops effects") ----------
    function buildEffectsSnapshot(name) {
      return {
        type: 'effects',
        version: 1,
        name,
        savedAt: new Date().toISOString(),
        globalFx: { ...globalFx },
      };
    }
    function applyEffectsSnapshot(snap) {
      if (!snap || !snap.globalFx) throw new Error('Effects file is malformed.');
      Object.keys(GLOBAL_FX_DEFAULTS).forEach(k => {
        if (Number.isFinite(snap.globalFx[k])) globalFx[k] = snap.globalFx[k];
      });
      applyGlobalFx();
      persistGlobalFx();
    }

    // Apply a saved-project snapshot to every relevant piece of state. Stops
    // playback first, disposes the live track audio nodes (so a fresh chain
    // is built when the new tracks first play), and clears undo/redo since
    // history doesn't carry meaning across a project switch.
    function applyProjectSnapshot(snap) {
      if (!snap || typeof snap !== 'object') throw new Error('Project file is empty or malformed.');
      stopSequence();
      stopAllTracks();
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        try { mediaRecorder.stop(); } catch (e) {}
      }
      if (_previewAudio) { try { _previewAudio.pause(); } catch (e) {} _previewAudio = null; }

      // Drop history — restored state is the new origin.
      undoStack.length = 0;
      redoStack.length = 0;
      refreshHistoryButtons();

      const w = snap.workspace || {};
      const g = snap.grid || {};

      // Grid (notes / palette / scale).
      rootIdx     = Number.isFinite(g.rootIdx)     ? g.rootIdx     : 0;
      baseOctave  = Number.isFinite(g.baseOctave)  ? g.baseOctave  : 4;
      octaveCount = Number.isFinite(g.octaveCount) ? g.octaveCount : 1;
      masterFreqA = Number.isFinite(g.masterFreqA) ? g.masterFreqA : 440;
      currentScale = (g.currentScale && SCALES[g.currentScale]) ? g.currentScale : 'chromatic';
      palette = Array.isArray(g.palette) && g.palette.length === 12 ? [...g.palette] : [...DEFAULT_PALETTE];
      chipPalette = Array.isArray(g.chipPalette) && g.chipPalette.length === palette.length ? [...g.chipPalette] : [...palette];
      restColor = g.restColor || DEFAULT_REST_COLOR;
      applyRestColor();

      const rootSel   = document.getElementById('root-select');
      const octRange  = document.getElementById('octave-range-select');
      const freqSl    = document.getElementById('master-freq-slider');
      const freqIn    = document.getElementById('master-freq-input');
      const scaleSel  = document.getElementById('scale-select');
      if (rootSel)   rootSel.value   = String(rootIdx);
      if (octRange)  octRange.value  = `${baseOctave}x${octaveCount}`;
      if (freqSl)    freqSl.value    = String(masterFreqA);
      if (freqIn)    freqIn.value    = String(masterFreqA);
      if (scaleSel)  scaleSel.value  = currentScale;

      rebuildGrid();

      // Per-cell sound config — apply only when the dimensions match the
      // freshly-rebuilt grid (octaveCount changes can otherwise misalign).
      if (Array.isArray(g.cellSounds) && g.cellSounds.length === cellSounds.length
          && Array.isArray(g.cellParams) && g.cellParams.length === cellParams.length) {
        cellSounds = [...g.cellSounds];
        cellParams = g.cellParams.map(p => ({ ...p }));
        refreshAllCellFreqLabels();
      }

      // Workspace state.
      sequence = Array.isArray(w.sequence) ? w.sequence.map(cloneStep) : [];
      pendingChord = Array.isArray(w.pendingChord)
        ? w.pendingChord.map(p => ({ ...p, params: p.params ? { ...p.params } : undefined }))
        : [];
      selectedStepRefs = [];
      insertionPoint = null;
      activeSeqIndex = (typeof w.activeSeqIndex === 'number') ? w.activeSeqIndex : null;
      noteLength      = w.noteLength      ?? 1;
      stepSubdivision = w.stepSubdivision ?? 0.5;
      gridColumns     = w.gridColumns     ?? 8;
      chordMode       = !!w.chordMode;
      loopMode        = !!w.loopMode;
      stepMode        = !!w.stepMode;
      multiSelectMode = !!w.multiSelectMode;

      const bpm = Number.isFinite(w.bpm) ? w.bpm : 120;
      if (typeof tempoInput  !== 'undefined' && tempoInput)  tempoInput.value  = String(bpm);
      if (typeof tempoSlider !== 'undefined' && tempoSlider) tempoSlider.value = String(bpm);
      const chordBtn = document.getElementById('chord-btn');
      if (chordBtn) chordBtn.classList.toggle('active', chordMode);
      document.querySelector('.btn-group--step')?.classList.toggle('chord-active', chordMode);
      const loopBtn = document.getElementById('loop-btn');
      if (loopBtn) loopBtn.classList.toggle('active', loopMode);
      const noteSel  = document.getElementById('note-length');
      if (noteSel)  noteSel.value  = String(noteLength);
      const subSel2  = document.getElementById('subdivision-select');
      if (subSel2)  subSel2.value  = String(stepSubdivision);
      const gridSel = document.getElementById('grid-cols-select');
      if (gridSel)  gridSel.value  = String(gridColumns || 0);
      const stepBtn = document.getElementById('step-mode-btn');
      if (stepBtn)  stepBtn.classList.toggle('active', stepMode);
      const multiCb = document.getElementById('multi-select-toggle');
      if (multiCb)  multiCb.checked = multiSelectMode;
      refreshHoldEnabled();

      // Saved sequences bank — replace and persist.
      savedSequences = Array.isArray(snap.savedSequences)
        ? snap.savedSequences.map(s => JSON.parse(JSON.stringify(s)))
        : [];
      persistSaved();

      // Tracks — dispose existing live audio nodes before swapping the
      // array so the next note creates a fresh chain in the live context.
      tracks.forEach(t => {
        if (t._recording) {
          try { t._recorder?.stop(); } catch (e) {}
          if (t._recStream) {
            try { t._recStream.getTracks().forEach(s => s.stop()); } catch (e) {}
          }
          t._recording = false;
          t._recorder = null;
          t._recStream = null;
        }
        if (t._bus)    { try { t._bus.dispose(); }    catch (e) {} t._bus = null; }
        if (t._panner) { try { t._panner.dispose(); } catch (e) {} t._panner = null; }
        if (t._samplers) {
          t._samplers.forEach(s => { try { s.dispose(); } catch (e) {} });
          t._samplers = null;
        }
        if (t.timer)   { clearTimeout(t.timer); t.timer = null; }
      });
      tracks = Array.isArray(snap.tracks) ? snap.tracks.map(t => ({
        id: t.id ?? trackIdCounter++,
        name: t.name || '?',
        items: Array.isArray(t.items) ? t.items : [],
        loopMode: !!t.loopMode,
        solo: !!t.solo,
        eq: t.eq && typeof t.eq === 'object' ? t.eq : { low: 0, mid: 0, high: 0 },
        pan: Number.isFinite(t.pan) ? t.pan : 0,
        playing: false,
        currentItemIdx: null,
        timer: null,
      })) : [];
      trackIdCounter = Math.max(0, ...tracks.map(t => t.id || 0)) + 1;
      persistTracks();

      // Saved grid states.
      if (Array.isArray(snap.savedGridStates)) {
        savedGridStates = JSON.parse(JSON.stringify(snap.savedGridStates));
        persistGridStates();
        refreshGridStateDropdown('');
      }

      // Global FX — write into the live globalFx and refresh the panel.
      if (snap.globalFx && typeof snap.globalFx === 'object') {
        Object.keys(GLOBAL_FX_DEFAULTS).forEach(k => {
          if (Number.isFinite(snap.globalFx[k])) globalFx[k] = snap.globalFx[k];
        });
        applyGlobalFx();
        persistGlobalFx();
        [
          ['fx-rev',      'fx-rev-v',      'reverb',        '%'],
          ['fx-rev-size', 'fx-rev-size-v', 'reverbSize',    '%'],
          ['fx-rev-tone', 'fx-rev-tone-v', 'reverbTone',    '%'],
          ['fx-dly',      'fx-dly-v',      'delay',         '%'],
          ['fx-dly-time', 'fx-dly-time-v', 'delayTime',     ' ms'],
          ['fx-dly-fb',   'fx-dly-fb-v',   'delayFeedback', '%'],
          ['fx-dst',      'fx-dst-v',      'distortion',    '%'],
        ].forEach(([id, valId, key, unit]) => {
          const input = document.getElementById(id);
          const label = document.getElementById(valId);
          if (input) input.value = String(globalFx[key]);
          if (label) label.textContent = globalFx[key] + unit;
        });
      }

      // Final renders.
      renderSequence();
      renderSavedSequences();
      renderTracks();
      const saveBtn = document.getElementById('save-btn');
      if (saveBtn) saveBtn.disabled = sequence.length === 0;
    }

    async function listProjectsInDrive(folderId) {
      const resp = await gapi.client.drive.files.list({
        q: `'${folderId}' in parents and trashed=false and mimeType='application/json'`,
        fields: 'files(id, name, modifiedTime, size)',
        orderBy: 'modifiedTime desc',
        pageSize: 100,
      });
      return resp.result.files || [];
    }

    async function fetchProjectJson(fileId) {
      const resp = await gapi.client.drive.files.get({ fileId, alt: 'media' });
      // gapi returns the body as a string for media downloads.
      return JSON.parse(resp.body || '{}');
    }

    // Drive's gapi delete() can fail silently in some environments (the
    // Request thenable resolves but the file isn't removed). The raw v3
    // DELETE endpoint is more predictable and also surfaces failures via a
    // real status code we can throw on.
    async function deleteDriveFile(fileId) {
      const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(fileId)}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${googleAccessToken}` },
      });
      // 204 No Content is success; some browsers report ok for any 2xx.
      if (!resp.ok && resp.status !== 204) {
        const body = await resp.text().catch(() => '');
        throw new Error(`Drive delete failed: ${resp.status} ${body}`);
      }
      return true;
    }

    // List Drive projects in a picker modal. On select, fetch + apply.
    function showProjectPickerDialog(files, onPick) {
      const overlay = document.createElement('div');
      overlay.className = 'sm-overlay';
      const modal = document.createElement('div');
      modal.className = 'sm-modal';
      const fmtDate = (iso) => {
        if (!iso) return '';
        try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
      };
      const rows = files.length === 0
        ? `<div style="color:#4a4a6a;font-family:'Segoe UI',sans-serif;font-size:0.85rem;padding:12px 0;text-align:center;">No projects found in "Bloops Projects".</div>`
        : files.map((f, i) => `
          <button type="button" class="picker-row" data-idx="${i}" style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;width:100%;text-align:left;padding:10px 12px;border:1px solid #2d2d3f;border-radius:8px;background:transparent;color:#e2e8f0;font-family:'Segoe UI',sans-serif;cursor:pointer;transition:all 0.15s ease;">
            <span style="font-size:0.85rem;font-weight:600;">${f.name.replace(/\.json$/i, '')}</span>
            <span style="font-size:0.7rem;color:#4a4a6a;">${fmtDate(f.modifiedTime)}</span>
          </button>
        `).join('');
      modal.innerHTML = `
        <div class="sm-title">Load project</div>
        <div style="display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto;margin-bottom:14px;">
          ${rows}
        </div>
        <div class="sm-footer">
          <button type="button" class="sm-preview" id="picker-cancel">Cancel</button>
        </div>
      `;
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      modal.querySelector('#picker-cancel').addEventListener('click', () => overlay.remove());
      modal.querySelectorAll('.picker-row').forEach(btn => {
        btn.addEventListener('mouseenter', () => { btn.style.borderColor = '#4299e1'; btn.style.background = 'rgba(66,153,225,0.08)'; });
        btn.addEventListener('mouseleave', () => { btn.style.borderColor = '#2d2d3f'; btn.style.background = 'transparent'; });
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx, 10);
          overlay.remove();
          onPick(files[idx]);
        });
      });
    }

    async function loadProjectFromDrive() {
      const btn = document.getElementById('tracks-load-project-btn');
      const origText = btn.textContent;
      btn.disabled = true;
      try {
        btn.textContent = 'Signing in…';
        await googleSignInForDrive();

        const projects = files.filter(f => !/\.voice\..+\.json$/i.test(f.name));

        showProjectPickerDialog(projects, async (file) => {

          const loadBtn = document.getElementById('tracks-load-project-btn');
          loadBtn.disabled = true;
          const prev = loadBtn.textContent;
          try {
            loadBtn.textContent = 'Loading…';

            loadBtn.textContent = 'Loaded';
          } catch (e) {
            console.error(e);
            alert(`Load failed: ${e.message || e}`);

          }

    document.getElementById('tracks-load-project-btn').addEventListener('click', loadProjectFromDrive);

    // Bloops Projects bank — mirrors the Songs bank below the tracks. The
    // first click on Load signs in to Drive, lists projects, and replaces
    // itself with one chip per project. Subsequent clicks on the refreshed
    // Load button re-fetch the list.
    async function refreshProjectsBank() {
      const bank = document.getElementById('projects-bank');
      const loadBtn = document.getElementById('projects-load-btn');
      if (!bank || !loadBtn) return;
      const origText = loadBtn.textContent;
      loadBtn.disabled = true;
      try {
        loadBtn.textContent = 'Signing in…';
        await googleSignInForDrive();
        loadBtn.textContent = 'Listing…';
        const folderId = await findOrCreateDriveFolder('Bloops Projects');
        const allFiles = await listProjectsInDrive(folderId);
        // Voice files live alongside projects in the same folder but belong
        // in the Voices menu, not the Projects bank.
        const files = allFiles.filter(f => !/\.voice\..+\.json$/i.test(f.name));
        // Wipe any previously-rendered chips, keep the label + Load button.
        bank.querySelectorAll('.project-chip').forEach(el => el.remove());
        if (files.length === 0) {
          const empty = document.createElement('span');
          empty.className = 'project-chip project-chip-empty';
          empty.textContent = 'No saved projects yet';
          bank.appendChild(empty);
        } else {
          files.forEach(f => {
            const displayName = f.name.replace(/\.json$/i, '');
            const chip = document.createElement('button');
            chip.type = 'button';
            chip.className = 'song-btn project-chip';
            chip.textContent = displayName;
            chip.title = `Click to load · long-press to edit · last modified ${new Date(f.modifiedTime).toLocaleString()}`;

            // Long-press / right-click → context menu so the user can edit
            // the project (currently delete from Drive). The lp.fired flag
            // suppresses the click event that pointerup would otherwise
            // dispatch right after the menu opens.
            const lp = { timer: null, startX: 0, startY: 0, fired: false };
            const cancelLp = () => { clearTimeout(lp.timer); lp.timer = null; };
            chip.addEventListener('pointerdown', (e) => {
              lp.startX = e.clientX;
              lp.startY = e.clientY;
              lp.fired = false;
              lp.timer = setTimeout(() => {
                lp.timer = null;
                lp.fired = true;
                navigator.vibrate?.(40);
                showCtxMenu(e.clientX, e.clientY, [
                  { label: 'Delete from Drive', danger: true, fn: async () => {
                    if (!confirm(`Delete project "${displayName}" from Google Drive? This can't be undone.`)) return;
                    chip.disabled = true;
                    chip.textContent = 'Deleting…';
                    try {
                      await deleteDriveFile(f.id);
                      // Re-fetch the list so the chip + any tombstones drop.
                      refreshProjectsBank();
                    } catch (err) {
                      console.error(err);
                      alert(`Delete failed: ${err.message || err}`);
                      chip.disabled = false;
                      chip.textContent = displayName;
                    }
                  }},
                ]);
              }, 500);
            });
            chip.addEventListener('pointerup',     cancelLp);
            chip.addEventListener('pointercancel', cancelLp);
            chip.addEventListener('pointermove', (e) => {
              if (!lp.timer) return;
              if (Math.abs(e.clientX - lp.startX) > 8 || Math.abs(e.clientY - lp.startY) > 8) cancelLp();
            });
            chip.addEventListener('contextmenu', (e) => {
              e.preventDefault();
              cancelLp();
              showCtxMenu(e.clientX, e.clientY, [
                { label: 'Delete from Drive', danger: true, fn: async () => {
                  if (!confirm(`Delete project "${displayName}" from Google Drive? This can't be undone.`)) return;
                  chip.disabled = true;
                  chip.textContent = 'Deleting…';
                  try {
                    await gapi.client.drive.files.delete({ fileId: f.id });
                    refreshProjectsBank();
                  } catch (err) {
                    console.error(err);
                    alert(`Delete failed: ${err.message || err}`);
                    chip.disabled = false;
                    chip.textContent = displayName;
                  }
                }},
              ]);
            });

            chip.addEventListener('click', async () => {
              if (lp.fired) { lp.fired = false; return; }
              chip.disabled = true;
              const prev = chip.textContent;
              try {
                chip.textContent = 'Loading…';
                const snap = await fetchProjectJson(f.id);
                applyProjectSnapshot(snap);
                currentProjectName = displayName || null;
                chip.textContent = prev;
              } catch (e) {
                console.error(e);
                alert(`Load failed: ${e.message || e}`);
                chip.textContent = prev;
              } finally {
                setTimeout(() => { chip.disabled = false; }, 600);
              }
            });
            bank.appendChild(chip);
          });
        }
        loadBtn.textContent = '↻';
        loadBtn.title = 'Refresh project list';
      } catch (e) {
        console.error(e);
        alert(`Couldn't list projects: ${e.message || e}`);
        loadBtn.textContent = origText;
      } finally {
        loadBtn.disabled = false;
      }
    }
    document.getElementById('projects-load-btn').addEventListener('click', refreshProjectsBank);

    // Seed one default track on first run.
    if (tracks.length === 0) {
      addTrack();
    } else {
      renderTracks();
    }

    // ---- Long-press context menu for saved blocks ----

    let ctxMenu = null;
    let longPressTimer = null;

    function dismissCtxMenu() {
      if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
    }

    document.addEventListener('pointerdown', (e) => {
      if (!e.target.closest('.ctx-menu')) dismissCtxMenu();
    });

    function showCtxMenu(x, y, actions) {
      dismissCtxMenu();
      ctxMenu = document.createElement('div');
      ctxMenu.className = 'ctx-menu';

      actions.forEach(a => {
        if (a === 'hr') { const hr = document.createElement('hr'); ctxMenu.appendChild(hr); return; }
        const btn = document.createElement('button');
        btn.textContent = a.label;
        if (a.danger) btn.classList.add('danger');
        btn.addEventListener('pointerdown', (e) => e.stopPropagation());
        btn.addEventListener('click', () => { a.fn(); dismissCtxMenu(); });
        ctxMenu.appendChild(btn);
      });

      document.body.appendChild(ctxMenu);
      const vw = window.innerWidth, vh = window.innerHeight;
      const mw = 160, mh = ctxMenu.offsetHeight || 180;
      ctxMenu.style.left = Math.min(x, vw - mw - 8) + 'px';
      ctxMenu.style.top  = Math.min(y, vh - mh - 8) + 'px';
    }

    function showRenameDialog(seqIndex) {
      const seq = savedSequences[seqIndex];
      if (!seq) return;
      const overlay = document.createElement('div');
      overlay.className = 'sm-overlay';
      const modal = document.createElement('div');
      modal.className = 'sm-modal';
      modal.innerHTML = `
        <div class="sm-title">Rename sequence</div>
        <input type="text" class="rename-input" maxlength="40" />
        <div class="sm-footer">
          <button type="button" class="sm-preview sm-cancel">Cancel</button>
          <button type="button" class="sm-apply sm-save">Save</button>
        </div>
      `;
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      const input = modal.querySelector('.rename-input');
      input.value = seq.name;
      input.focus();
      input.select();
      const commit = () => {
        const newName = input.value.trim();
        if (newName) {
          savedSequences[seqIndex].name = newName;
          persistSaved();
          renderSavedSequences();
        }
        overlay.remove();
      };
      modal.querySelector('.sm-save').addEventListener('click', commit);
      modal.querySelector('.sm-cancel').addEventListener('click', () => overlay.remove());
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') commit();
        else if (e.key === 'Escape') overlay.remove();
      });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    function savedBlockActions(seqIndex) {
      const actions = [
        { label: 'Rename…',     fn: () => showRenameDialog(seqIndex) },
        { label: '⧉ Duplicate',  fn: () => { const base = savedSequences[seqIndex].name.replace(/\.\d+$/, ''); let n = 1; while (savedSequences.some(s => s.name === `${base}.${n}`)) n++; const copy = { ...savedSequences[seqIndex], name: `${base}.${n}`, steps: [...savedSequences[seqIndex].steps] }; savedSequences.splice(seqIndex+1, 0, copy); persistSaved(); renderSavedSequences(); } },
      ];
      actions.push('hr');
      actions.push({ label: '⊕ Add to new track', fn: () => {
        addTrack();
        addSavedToTrack(tracks.length - 1, savedSequences[seqIndex]);
      } });
      if (tracks.length > 0) {
        tracks.forEach((track, tIdx) => {
          actions.push({ label: `⊕ Add to ${track.name}`, fn: () => addSavedToTrack(tIdx, savedSequences[seqIndex]) });
        });
      }
      actions.push({ label: '⊕ Copy ×N to track…', fn: () => showCopySavedDialog(seqIndex) });
      actions.push('hr');
      actions.push({ label: 'Delete', danger: true, fn: () => {
        const removed = savedSequences[seqIndex];
        savedSequences.splice(seqIndex, 1);
        if (activeSeqIndex === seqIndex) { activeSeqIndex = null; sequence = []; renderSequence(); }
        else if (activeSeqIndex !== null && seqIndex < activeSeqIndex) { activeSeqIndex--; }
        if (removed && removed.name) replaceMatchingTrackItemsWithSilent(new Set([removed.name]));
        persistSaved();
        renderSavedSequences();
      } });
      return actions;
    }

    // Open the "Copy ×N to track…" dialog from a saved-sequence long-press.
    // Lets the user lay down a repeated section in one shot instead of
    // dragging the same chip onto the track over and over.
    function showCopySavedDialog(seqIndex) {
      const seq = savedSequences[seqIndex];
      if (!seq) return;
      const overlay = document.createElement('div');
      overlay.className = 'sm-overlay';
      const modal = document.createElement('div');
      modal.className = 'sm-modal';
      const trackOptions = tracks.map((t, i) => `<option value="${i}">${t.name}</option>`).join('');
      modal.innerHTML = `
        <div class="sm-title">Copy "${seq.name}" to track</div>
        <div class="sm-param">
          <div class="sm-param-row">Iterations <span class="sm-val" id="copy-n-v">4</span></div>
          <input type="range" id="copy-n" min="1" max="64" value="4" />
        </div>
        <div class="sm-section-label">Destination</div>
        <select id="copy-track" style="width:100%;padding:6px 10px;background:#0a0a14;border:1px solid #2d2d3f;color:#e2e8f0;border-radius:6px;font-family:inherit;font-size:0.85rem;margin-bottom:10px;">
          <option value="new">— New track —</option>
          ${trackOptions}
        </select>
        <div class="sm-footer">
          <button type="button" class="sm-preview" id="copy-cancel">Cancel</button>
          <button type="button" class="sm-apply" id="copy-apply">Add</button>
        </div>
      `;
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

      const nInput = modal.querySelector('#copy-n');
      const nVal   = modal.querySelector('#copy-n-v');
      nInput.addEventListener('input', () => { nVal.textContent = nInput.value; });

      modal.querySelector('#copy-cancel').addEventListener('click', () => overlay.remove());
      modal.querySelector('#copy-apply').addEventListener('click', () => {
        const n = Math.max(1, Math.min(64, parseInt(nInput.value, 10) || 1));
        const dest = modal.querySelector('#copy-track').value;
        let trackIdx;
        if (dest === 'new') {
          addTrack();
          trackIdx = tracks.length - 1;
        } else {
          trackIdx = parseInt(dest, 10);
          if (!Number.isFinite(trackIdx) || !tracks[trackIdx]) { overlay.remove(); return; }
        }
        for (let i = 0; i < n; i++) addSavedToTrack(trackIdx, seq);
        overlay.remove();
      });
    }

    // For each track item whose name matches one of `names`, swap it for a
    // silent placeholder of the same total duration. Track items keep their
    // grid-column position so anything after the deleted entry stays put
    // instead of sliding earlier in time.
    function replaceMatchingTrackItemsWithSilent(names) {
      let touched = false;
      tracks.forEach(track => {
        track.items.forEach((item, idx) => {
          if (item.type === 'silent' || item.type === 'audio') return;
          if (item && item.name && names.has(item.name)) {
            const dur = itemDurationMs(item) / 1000;
            track.items[idx] = {
              type: 'silent',
              name: item.name + ' (removed)',
              durationSec: dur,
            };
            touched = true;
          }
        });
      });
      if (touched) {
        persistTracks();
        renderTracks();
      }
    }

    // ---- Drag-and-drop reorder ----

    let _dragIdx = null;
    let _touchClone = null;
    let _touchOffsetX = 0, _touchOffsetY = 0;
    let _touchDropTarget = null;

    function moveSequence(from, to) {
      if (from === to) return;
      const [item] = savedSequences.splice(from, 1);
      savedSequences.splice(to, 0, item);
      if (activeSeqIndex === from) activeSeqIndex = to;
      else if (from < activeSeqIndex && to >= activeSeqIndex) activeSeqIndex--;
      else if (from > activeSeqIndex && to <= activeSeqIndex) activeSeqIndex++;
      persistSaved();
      renderSavedSequences();
    }

    function clearDragOver() {
      document.getElementById('saved-grid').querySelectorAll('.drag-over')
        .forEach(el => el.classList.remove('drag-over'));
    }

    function bindDrag(block, i) {
      block.draggable = true;

      block.addEventListener('dragstart', (e) => {
        _dragIdx = i;
        e.dataTransfer.effectAllowed = 'move';
        requestAnimationFrame(() => block.classList.add('dragging'));
      });

      block.addEventListener('dragenter', (e) => {
        e.preventDefault();
        if (_dragIdx === i) return;
        clearDragOver();
        block.classList.add('drag-over');
      });

      block.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      block.addEventListener('dragleave', (e) => {
        if (!block.contains(e.relatedTarget)) block.classList.remove('drag-over');
      });

      block.addEventListener('drop', (e) => {
        e.preventDefault();
        clearDragOver();
        if (_dragIdx !== null && _dragIdx !== i) moveSequence(_dragIdx, i);
        _dragIdx = null;
      });

      block.addEventListener('dragend', () => {
        block.classList.remove('dragging');
        clearDragOver();
        _dragIdx = null;
      });

      // Touch drag — threshold-based so a quick tap still fires the
      // native click (loading the saved sequence into the workspace).
      block.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        const startTouch = e.touches[0];
        const startX = startTouch.clientX;
        const startY = startTouch.clientY;
        const rect = block.getBoundingClientRect();
        let dragStarted = false;
        const DRAG_THRESHOLD = 10;

        const startDrag = () => {
          dragStarted = true;
          _dragIdx = i;
          _touchOffsetX = startX - rect.left;
          _touchOffsetY = startY - rect.top;
          const clone = block.cloneNode(true);
          Object.assign(clone.style, {
            position: 'fixed', left: rect.left + 'px', top: rect.top + 'px',
            width: rect.width + 'px', height: rect.height + 'px',
            opacity: '0.85', pointerEvents: 'none', zIndex: '9999',
            boxShadow: '0 8px 24px rgba(0,0,0,0.4)', borderRadius: '8px',
          });
          document.body.appendChild(clone);
          _touchClone = clone;
          block.classList.add('dragging');
        };

        const clearAllDragOver = () => {
          clearDragOver();
          document.querySelectorAll('.track-grid.drag-over').forEach(g => g.classList.remove('drag-over'));
        };

        const onMove = (ev) => {
          const t = ev.touches[0];
          if (!dragStarted) {
            const dx = t.clientX - startX;
            const dy = t.clientY - startY;
            if (Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
            startDrag();
          }
          ev.preventDefault();
          _touchClone.style.left = (t.clientX - _touchOffsetX) + 'px';
          _touchClone.style.top  = (t.clientY - _touchOffsetY) + 'px';
          _touchClone.style.visibility = 'hidden';
          const el = document.elementFromPoint(t.clientX, t.clientY);
          _touchClone.style.visibility = '';
          clearAllDragOver();
          _touchDropTarget = null;
          const savedTarget = el?.closest('.saved-block');
          const trackGrid   = el?.closest('.track-grid');
          if (savedTarget) {
            const idx = parseInt(savedTarget.dataset.seqIndex);
            if (!isNaN(idx) && idx !== _dragIdx) {
              savedTarget.classList.add('drag-over');
              _touchDropTarget = { kind: 'reorder', idx };
            }
          } else if (trackGrid) {
            const tIdx = parseInt(trackGrid.dataset.trackIdx);
            if (!isNaN(tIdx)) {
              trackGrid.classList.add('drag-over');
              _touchDropTarget = { kind: 'track', idx: tIdx };
            }
          }
        };

        const onEnd = () => {
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onEnd);
          if (!dragStarted) {
            // No drag occurred — let the native click event fire on the block,
            // which runs the load-saved-sequence handler.
            return;
          }
          _touchClone?.remove(); _touchClone = null;
          block.classList.remove('dragging');
          clearAllDragOver();
          if (_touchDropTarget) {
            if (_touchDropTarget.kind === 'reorder' && _touchDropTarget.idx !== _dragIdx) {
              moveSequence(_dragIdx, _touchDropTarget.idx);
            } else if (_touchDropTarget.kind === 'track' && savedSequences[_dragIdx]) {
              addSavedToTrack(_touchDropTarget.idx, savedSequences[_dragIdx]);
            }
          }
          _dragIdx = null; _touchDropTarget = null;
        };

        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
      }, { passive: true });
    }

    function bindLongPress(block, seqIndex) {
      block.addEventListener('pointerdown', (e) => {
        longPressTimer = setTimeout(() => {
          longPressTimer = null;
          navigator.vibrate?.(40);
          showCtxMenu(e.clientX, e.clientY, savedBlockActions(seqIndex));
        }, 500);
      });
      const cancel = () => { clearTimeout(longPressTimer); longPressTimer = null; };
      block.addEventListener('pointerup',    cancel);
      block.addEventListener('pointercancel', cancel);
      block.addEventListener('pointermove',  cancel);
      // Right-click also opens the same menu (desktop affordance for delete etc.)
      block.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        showCtxMenu(e.clientX, e.clientY, savedBlockActions(seqIndex));
      });
    }

    function cellActions(noteIndex) {
      const note = notes[noteIndex];
      return [
        { label: 'Sound editor…', fn: () => showSoundEditor(noteIndex) },
        'hr',
        { label: `Remove last ${note.label}`, fn: () => {
            const idx = [...sequence].map((s,i) => [s,i]).reverse().find(([s]) => s.cellIndex === noteIndex)?.[1];
            if (idx != null) { sequence.splice(idx, 1); renderSequence(); document.getElementById('save-btn').disabled = sequence.length === 0; }
        }},
        { label: `Remove all ${note.label}`, fn: () => {
            sequence = sequence.filter(s => s.cellIndex !== noteIndex);
            renderSequence();
            document.getElementById('save-btn').disabled = sequence.length === 0;
        }},
        'hr',
        { label: 'Reset sound → Sine', fn: () => {
            cellSounds[noteIndex] = 'sine';
            cellParams[noteIndex] = { type: 'sine', attack: 10, decay: 100, sustain: 50, release: 1400, volume: 100, detune: 0, reverb: 0, reverbSize: 70, reverbTone: 50, delay: 0, delayTime: 250, delayFeedback: 40, distortion: 0 };
            const sel = cells[noteIndex].querySelector('.cell-sound-select');
            if (sel) sel.value = 'sine';
            updateScaleBanner();
        }},
      ];
    }

    // ---- Step long-press + editor ----

    // ---- Drag-to-reorder sequence steps (desktop HTML5 drag) ----
    let _stepDragIdx = null;

    function clearStepDragOver() {
      document.querySelectorAll('.seq-step.drag-over').forEach(c => c.classList.remove('drag-over'));
    }

    function moveSequenceStep(from, to) {
      if (from === to || from < 0 || to < 0 || from >= sequence.length) return;
      const [item] = sequence.splice(from, 1);
      // Clamp target into the new (post-removal) array range and insert exactly
      // at the hovered slot — items at/after shift right by one, items between
      // the original source and the target shift left by one to close the gap.
      const insertAt = Math.max(0, Math.min(to, sequence.length));
      sequence.splice(insertAt, 0, item);
      renderSequence();
    }

    function bindStepDrag(chip, i) {
      chip.draggable = true;
      chip.addEventListener('dragstart', (e) => {
        _stepDragIdx = i;
        if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
        requestAnimationFrame(() => chip.classList.add('dragging'));
      });
      chip.addEventListener('dragenter', (e) => {
        if (_stepDragIdx === null || _stepDragIdx === i) return;
        e.preventDefault();
        clearStepDragOver();
        chip.classList.add('drag-over');
      });
      chip.addEventListener('dragover', (e) => {
        if (_stepDragIdx === null) return;
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      });
      chip.addEventListener('dragleave', (e) => {
        if (!chip.contains(e.relatedTarget)) chip.classList.remove('drag-over');
      });
      chip.addEventListener('drop', (e) => {
        e.preventDefault();
        clearStepDragOver();
        if (_stepDragIdx !== null && _stepDragIdx !== i) moveSequenceStep(_stepDragIdx, i);
        _stepDragIdx = null;
      });
      chip.addEventListener('dragend', () => {
        chip.classList.remove('dragging');
        clearStepDragOver();
        _stepDragIdx = null;
      });
    }

    // Touch drag state machine per chip:
    //   pending  — touch down, < 280ms or still below move threshold.
    //              Fast moves cancel pending → native horizontal scroll works.
    //   ready    — held ≥ 280ms without moving. Drag is "armed" but no clone yet.
    //              If still held without moving, the 500ms long-press menu fires.
    //   dragging — any move after ready creates the clone and starts following.
    function bindStepDragTouch(chip, i) {
      chip.dataset.stepIdx = String(i);
      let readyTimer = null;
      let startX = 0, startY = 0;
      let readyToDrag = false;
      let dragging = false;
      let clone = null;
      let offX = 0, offY = 0;
      let dropIdx = null;
      const READY_DELAY = 280;
      const MOVE_THRESHOLD = 8;

      const engageDrag = () => {
        dragging = true;
        _stepDragIdx = i;
        navigator.vibrate?.(40);
        const rect = chip.getBoundingClientRect();
        offX = startX - rect.left;
        offY = startY - rect.top;
        clone = chip.cloneNode(true);
        Object.assign(clone.style, {
          position: 'fixed', left: rect.left + 'px', top: rect.top + 'px',
          width: rect.width + 'px', height: rect.height + 'px',
          opacity: '0.85', pointerEvents: 'none', zIndex: '9999',
          boxShadow: '0 8px 24px rgba(0,0,0,0.4)',
        });
        document.body.appendChild(clone);
        chip.classList.add('dragging');
      };

      chip.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        const t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        readyToDrag = false;
        dragging = false;
        dropIdx = null;
        readyTimer = setTimeout(() => { readyTimer = null; readyToDrag = true; }, READY_DELAY);
      }, { passive: true });

      chip.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        const moved = Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD;

        if (readyTimer) {
          // Moved before the hold threshold — cancel the ready timer so
          // the browser can do native scroll, and let the long-press
          // pointermove cancel the menu timer as usual.
          if (moved) {
            clearTimeout(readyTimer);
            readyTimer = null;
            readyToDrag = false;
          }
          return;
        }

        if (readyToDrag && !dragging && moved) engageDrag();

        if (dragging) {
          e.preventDefault();
          clone.style.left = (t.clientX - offX) + 'px';
          clone.style.top  = (t.clientY - offY) + 'px';
          clone.style.visibility = 'hidden';
          const el = document.elementFromPoint(t.clientX, t.clientY);
          clone.style.visibility = '';
          clearStepDragOver();
          dropIdx = null;
          const target = el?.closest('.seq-step');
          if (target && target !== chip) {
            const idx = parseInt(target.dataset.stepIdx);
            if (!isNaN(idx) && idx !== i) {
              target.classList.add('drag-over');
              dropIdx = idx;
            }
          }
        }
      }, { passive: false });

      const onTouchEnd = () => {
        if (readyTimer) { clearTimeout(readyTimer); readyTimer = null; }
        readyToDrag = false;
        if (dragging) {
          clone?.remove();
          clone = null;
          chip.classList.remove('dragging');
          clearStepDragOver();
          if (dropIdx !== null) moveSequenceStep(_stepDragIdx, dropIdx);
        }
        dragging = false;
        dropIdx = null;
        _stepDragIdx = null;
      };
      chip.addEventListener('touchend', onTouchEnd);
      chip.addEventListener('touchcancel', onTouchEnd);
    }

    // Shift every audible note in a step (and any nested subSteps) by `semis`
    // half-steps. Updates the displayed label via Tone.js's freq→note helper.
    function modulateStepRec(s, semis) {
      const factor = Math.pow(2, semis / 12);
      const retune = (n) => {
        if (n.freq == null) return;
        n.freq *= factor;
        try { n.label = Tone.Frequency(n.freq).toNote(); } catch (e) {}
      };
      if (s.chord) {
        s.chord.forEach(retune);
        s.label = s.chord.map(n => n.label).join('·');
      } else if (s.freq != null) {
        retune(s);
      }
      if (s.isSub && Array.isArray(s.subSteps)) {
        s.subSteps.forEach(child => modulateStepRec(child, semis));
      }
    }
    function stepHasNotes(s) {
      if (!s) return false;
      if (s.chord && s.chord.length > 0) return true;
      if (s.freq != null) return true;
      if (s.isSub && Array.isArray(s.subSteps)) return s.subSteps.some(stepHasNotes);
      return false;
    }

    function bindStepLongPress(chip, stepIndex) {
      let lpt = null;
      let startX = 0, startY = 0;
      const MOVE_TOLERANCE = 8; // matches the drag system; ignores finger jitter
      chip.addEventListener('pointerdown', (e) => {
        startX = e.clientX;
        startY = e.clientY;
        lpt = setTimeout(() => {
          lpt = null;
          navigator.vibrate?.(40);
          const step = sequence[stepIndex];
          const actions = [];
          if (step && step.isSub) {
            actions.push({ label: 'Edit subsequence…', fn: () => enterSubEditMode(stepIndex) });
            actions.push('hr');
          } else {
            if (step && (step.chord || step.freq !== null)) {
              actions.push({ label: 'Edit step…', fn: () => showStepEditor(stepIndex) });
            }
            // No nested subsequences — disallow while already editing one.
            if (!subEditState) {
              actions.push({ label: 'Create subsequence…', fn: () => enterSubEditMode(stepIndex) });
            }
            if (actions.length > 0) actions.push('hr');
          }
          if (stepHasNotes(step)) {
            actions.push({ label: 'Modulate ↑½', fn: () => { snapshotForUndo('Modulate ↑½'); modulateStepRec(step, 1);  renderSequence(); } });
            actions.push({ label: 'Modulate ↓½', fn: () => { snapshotForUndo('Modulate ↓½'); modulateStepRec(step, -1); renderSequence(); } });
            actions.push('hr');
          }
          actions.push({ label: 'Insert before', fn: () => { insertionPoint = stepIndex; renderSequence(); } });
          actions.push({ label: 'Insert after',  fn: () => { insertionPoint = stepIndex + 1; renderSequence(); } });
          actions.push('hr');
          actions.push({ label: 'Remove step', danger: true, fn: () => {
            snapshotForUndo('Remove step');
            sequence.splice(stepIndex, 1);
            if (insertionPoint !== null) {
              if (stepIndex < insertionPoint) insertionPoint--;
              if (insertionPoint > sequence.length) insertionPoint = sequence.length;
              if (sequence.length === 0) insertionPoint = null;
            }
            renderSequence();
            document.getElementById('save-btn').disabled = sequence.length === 0;
          }});
          showCtxMenu(e.clientX, e.clientY, actions);
        }, 500);
      });
      const cancel = () => { clearTimeout(lpt); lpt = null; };
      chip.addEventListener('pointerup',     cancel);
      chip.addEventListener('pointercancel', cancel);
      chip.addEventListener('pointermove', (e) => {
        if (!lpt) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (Math.abs(dx) > MOVE_TOLERANCE || Math.abs(dy) > MOVE_TOLERANCE) cancel();
      });
      chip.addEventListener('contextmenu',   (e) => e.preventDefault());
    }

        ['se-dly',       'se-dly-v',       'delay',         '%'],
        ['se-dly-time',  'se-dly-time-v',  'delayTime',     ' ms'],
