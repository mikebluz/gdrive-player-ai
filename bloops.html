<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (max-width: 700px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .grid {
        flex: none;
        grid-auto-rows: minmax(70px, 1fr);
        min-height: 55vh;
      }
      .grid-control-row2 {
        flex-basis: 100%;
      }
    }

    /* MENU BAR */
    .menubar {
      background: #000;
      border-bottom: 3px solid #000;
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      padding: 10px 20px 10px 10px;
      gap: 12px;
      position: relative;
      overflow-x: auto;
    }
    .menubar > * { flex-shrink: 0; }

    #grid-settings-btn {
      padding: 6px 14px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #grid-settings-btn:hover { border-color: #4299e1; color: #4299e1; }
    #grid-settings-btn.open { border-color: #4299e1; color: #4299e1; background: rgba(66,153,225,0.12); }

    .grid-settings-panel {
      display: none;
      flex-direction: column;
      gap: 10px;
      position: absolute;
      top: calc(100% + 4px);
      right: 10px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 10px;
      padding: 14px;
      z-index: 900;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-width: calc(100vw - 20px);
    }
    .grid-settings-panel.open { display: flex; }

    .menubar a {
      color: #a0aec0;
      text-decoration: none;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s;
      margin-right: 4px;
    }
    .menubar a:hover { color: #4299e1; }

    .menubar-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .menubar-toggle input { cursor: pointer; }

    .menu-btn {
      width: 38px;
      height: 38px;
      min-width: 38px;
      min-height: 38px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    #play-btn {
      background: linear-gradient(135deg, #2b6cb0, #4299e1);
      color: white;
      box-shadow: 0 2px 10px rgba(66, 153, 225, 0.175);
    }
    #play-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(66, 153, 225, 0.275);
    }


    .tempo-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    #tempo-slider { width: 90px; min-width: 60px; accent-color: #4299e1; flex-shrink: 1; }
    #tempo-input {
      width: 52px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.85rem;
      font-family: 'Segoe UI', sans-serif;
      padding: 3px 6px;
      text-align: center;
    }
    #tempo-input:focus { outline: none; border-color: #4299e1; }
    .tempo-unit {
      color: #a0aec0;
      font-size: 0.8rem;
      font-family: 'Segoe UI', sans-serif;
    }

    .grid-control {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .grid-control label {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .grid-control input[type=number],
    .grid-control select {
      width: 54px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.8rem;
      font-family: 'Segoe UI', sans-serif;
      padding: 3px 6px;
      text-align: center;
    }
    .grid-control input[type=number]:focus,
    .grid-control select:focus { outline: none; border-color: #4299e1; }
    .grid-control select#scale-select { width: 110px; }
    .grid-control input[type=range] {
      width: 80px;
      accent-color: #4299e1;
    }

    .cell.out-of-scale {
      background: #000 !important;
      pointer-events: none;
    }
    .cell.out-of-scale span,
    .cell.out-of-scale .cell-sound-select { visibility: hidden; }

    #colors-menu-btn {
      padding: 6px 14px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #colors-menu-btn:hover { border-color: #4299e1; color: #4299e1; }
    #colors-menu-btn.open { border-color: #4299e1; color: #4299e1; background: rgba(66,153,225,0.12); }

    .colors-panel {
      display: none;
      flex-direction: column;
      gap: 6px;
      position: absolute;
      top: calc(100% + 4px);
      left: 10px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 10px;
      padding: 10px;
      z-index: 900;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      min-width: 160px;
    }
    .colors-panel.open { display: flex; }
    .colors-opt {
      padding: 6px 14px;
      border: 1px solid #2d2d3f;
      border-radius: 8px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
    }
    .colors-opt:hover { border-color: #4299e1; color: #4299e1; }

    .grid-state-row {
      display: flex; flex-direction: column; align-items: stretch; gap: 6px;
      border-top: 1px solid #2d2d3f; padding-top: 10px;
    }
    .grid-state-row label { color: #a0aec0; font-size: 0.78rem; }
    #grid-state-select {
      width: 100%;
      padding: 4px 8px;
      background: #0a0a14;
      border: 1px solid #2d2d3f;
      border-radius: 6px;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
    }
    .grid-state-actions { display: flex; gap: 6px; }
    .grid-state-actions button {
      flex: 1;
      padding: 5px 10px;
      background: transparent;
      border: 1px solid #2d2d3f;
      border-radius: 6px;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .grid-state-actions button:hover { border-color: #4299e1; color: #4299e1; }
    .grid-state-actions #grid-state-delete-btn:hover { border-color: #e53e3e; color: #e53e3e; }
    .grid-state-actions button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* NOTE GRID */
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(70px, 1fr);
      min-height: 0;
      overflow-y: auto;
    }

    .cell {
      border: 3px solid #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.08s ease;
      user-select: none;
      position: relative;
    }

    .cell-sound-select {
      position: absolute;
      bottom: 5px;
      left: 5px;
      background: rgba(0,0,0,0.35);
      border: none;
      border-radius: 4px;
      color: rgba(255,255,255,0.8);
      font-size: 0.6rem;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
      padding: 2px 4px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      z-index: 1;
      outline: none;
    }
    .cell-sound-select:focus { background: rgba(0,0,0,0.6); }
    .cell:active        { filter: brightness(0.75); }
    .cell.flash         { filter: brightness(1.35); }
    .cell.active-loop   { filter: brightness(1.25); outline: 4px solid #fff inset; }

    .cell span {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(2.25rem, 6vw, 3.3rem);
      font-weight: 900;
      color: rgba(0,0,0,0.35);
      letter-spacing: 1px;
      pointer-events: none;
    }

    .cell:nth-child(12n+1)  { background: #e63946; }
    .cell:nth-child(12n+2)  { background: #f4a261; }
    .cell:nth-child(12n+3)  { background: #e9c46a; }
    .cell:nth-child(12n+4)  { background: #2a9d8f; }
    .cell:nth-child(12n+5)  { background: #457b9d; }
    .cell:nth-child(12n+6)  { background: #9b5de5; }
    .cell:nth-child(12n+7)  { background: #f15bb5; }
    .cell:nth-child(12n+8)  { background: #00bbf9; }
    .cell:nth-child(12n+9)  { background: #06d6a0; }
    .cell:nth-child(12n+10) { background: #ffbe0b; }
    .cell:nth-child(12n+11) { background: #fb5607; }
    .cell:nth-child(12n)    { background: #8338ec; }

    /* REST BAR */
    :root { --rest-color: hsl(280, 55%, 78%); }
    .rest-bar {
      height: 56px;
      min-height: 56px;
      background: #000;
      border-top: 3px solid var(--rest-color);
      border-bottom: 3px solid var(--rest-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.08s ease;
    }
    .rest-bar:active      { background: #1a1a2e; }
    .rest-bar.flash       { background: #2d2d3f; }
    .rest-bar.active-loop { background: #1a1a2e; outline: 3px solid var(--rest-color) inset; }
    .rest-bar span {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--rest-color);
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* SEQUENCE DISPLAY */
    .sequence-display {
      min-height: 62px;
      max-height: 140px;
      background: #0a0a14;
      border-bottom: 3px solid #000;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      align-items: center;
      padding: 8px 14px;
      gap: 6px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2d2d3f #0a0a14;
    }
    .sequence-display::-webkit-scrollbar { width: 4px; }
    .sequence-display::-webkit-scrollbar-track { background: #0a0a14; }
    .sequence-display::-webkit-scrollbar-thumb { background: #2d2d3f; border-radius: 2px; }

    .seq-empty {
      color: #2d2d3f;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      white-space: nowrap;
      pointer-events: none;
    }

    .seq-step {
      width: 80px;
      height: 38px;
      border-radius: 8px;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: #a0aec0;
      user-select: none;
      cursor: grab;
      flex-shrink: 0;
      overflow: hidden;
      white-space: pre-line;
      text-align: center;
      transition: all 0.1s ease;
    }
    .seq-step.rest { color: #4a4a6a; }

    .seq-cursor {
      width: 4px;
      height: 38px;
      background: #68d391;
      border-radius: 2px;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(104, 211, 145, 0.7);
      animation: seqCursorPulse 1.1s ease-in-out infinite;
    }
    @keyframes seqCursorPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    .seq-step.subseq {
      border-color: #68d391;
      color: #68d391;
      background: rgba(104, 211, 145, 0.08);
    }
    .seq-step.active {
      background: linear-gradient(135deg, #2b6cb0, #4299e1);
      border-color: #4299e1;
      color: #fff;
      transform: scale(1.1);
    }
    .seq-step.subseq.active {
      background: linear-gradient(135deg, #38a169, #68d391);
      border-color: #68d391;
      color: #fff;
    }

    #subedit-banner {
      display: none;
      align-items: center;
      gap: 12px;
      margin: 6px 8px 0;
      padding: 6px 12px;
      background: rgba(104, 211, 145, 0.12);
      border: 1px solid #68d391;
      border-radius: 8px;
      color: #68d391;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
    }
    #subedit-banner.open { display: flex; }
    #subedit-cancel {
      margin-left: auto;
      padding: 4px 12px;
      border: 1px solid #68d391;
      background: transparent;
      color: #68d391;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #subedit-cancel:hover { background: rgba(104, 211, 145, 0.15); }

    /* FOOTER */
    .footer-bar {
      min-height: 48px;
      background: #000;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      padding: 6px 20px;
      gap: 10px;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .btn-group + .btn-group {
      padding-left: 12px;
      margin-left: 2px;
      border-left: 1px solid #2d2d3f;
    }
    @media (max-width: 700px) {
      .btn-group + .btn-group {
        padding-left: 0;
        margin-left: 0;
        border-left: none;
      }
    }

    /* Step controls cluster — its own row above the play button, framed
       with a thin teal border so it reads as a coherent group apart from
       the transport / sequence controls. */
    .btn-group--step {
      flex-basis: 100%;
      padding: 6px 12px;
      border: 1px solid rgba(79, 209, 197, 0.45);
      border-radius: 12px;
      background: rgba(79, 209, 197, 0.05);
    }
    .btn-group--step + .btn-group {
      border-left: none;
      padding-left: 0;
      margin-left: 0;
    }
    .btn-group-label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #4fd1c5;
      padding-right: 4px;
    }
    .btn-group--step #chord-btn {
      border-color: #4fd1c5;
      color: #81e6d9;
    }
    .btn-group--step #chord-btn:hover {
      border-color: #81e6d9;
      color: #b2f5ea;
    }
    .btn-group--step #chord-btn.active {
      border-color: #9f7aea;
      background: linear-gradient(135deg, #553c9a, #9f7aea);
      color: #fff;
      box-shadow: 0 0 14px rgba(159, 122, 234, 0.55);
    }
    .btn-group--step.chord-active {
      border-color: #9f7aea;
      background: rgba(159, 122, 234, 0.10);
    }
    .btn-group--step.chord-active .btn-group-label {
      color: #d6bcfa;
    }
    .btn-group--step .note-length-label { color: #81e6d9; }
    .btn-group--step #note-length,
    .btn-group--step #subdivision-select {
      border-color: #4fd1c5;
      color: #b2f5ea;
    }
    .btn-group--step #note-length:focus,
    .btn-group--step #subdivision-select:focus {
      border-color: #81e6d9;
    }

    #clear-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #clear-btn:hover { border-color: #e53e3e; color: #e53e3e; }

    #save-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #save-btn:hover { border-color: #4299e1; color: #4299e1; }
    #save-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #save-btn.flash-confirm { border-color: #68d391; color: #68d391; }

    #append-track-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #append-track-btn:hover { border-color: #4299e1; color: #4299e1; }
    #append-track-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #append-track-btn.flash-confirm { border-color: #68d391; color: #68d391; }

    #chord-btn,
    #rec-btn,
    #random-btn,
    #reverse-btn,
    #shuffle-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #chord-btn:hover { border-color: #9f7aea; color: #9f7aea; }
    #chord-btn.active {
      border-color: #9f7aea;
      background: rgba(159,122,234,0.15);
      color: #d6bcfa;
    }
    /* Rec: red outline + red text by default. When recording, the colors invert
       — fill becomes red, border and text adopt the original (transparent) fill —
       producing a solid red blob that pulses. */
    #rec-btn {
      border-color: #e53e3e;
      color: #e53e3e;
    }
    #rec-btn:hover {
      border-color: #fc8181;
      color: #fc8181;
    }
    #random-btn:hover { border-color: #ed8936; color: #fbd38d; }
    #reverse-btn:hover { border-color: #4299e1; color: #4299e1; }
    #reverse-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #shuffle-btn:hover { border-color: #4299e1; color: #4299e1; }
    #shuffle-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #rec-btn.recording {
      background: #e53e3e;
      border-color: #e53e3e;
      color: #fff;
      animation: rec-pulse 1s ease-in-out infinite;
    }
    @keyframes rec-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229,62,62,0.6); }
      50%      { box-shadow: 0 0 0 6px rgba(229,62,62,0); }
    }

    .saved-block.audio-item {
      border-color: #e53e3e;
    }
    .saved-block.audio-item.active-seq {
      background: linear-gradient(135deg, #3a1a2a, #5a1e3a);
      border-color: #fc8181;
    }
    .track-item.audio-item {
      background: linear-gradient(135deg, #4a1a2a, #5a2a3a);
      border-color: #e53e3e;
    }
    .track-item.audio-item.active {
      background: linear-gradient(135deg, #b13a50, #e53e3e);
      border-color: #fc8181;
    }

    .note-length-label {
      display: flex; align-items: center; gap: 4px;
      color: #a0aec0; font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem; flex-shrink: 0;
    }
    #note-length,
    #subdivision-select {
      width: 60px;
      background: #1a1a2e; border: 1px solid #2d2d3f;
      border-radius: 6px; color: #e2e8f0;
      font-size: 0.8rem; font-family: 'Segoe UI', sans-serif;
      padding: 3px 6px; text-align: center;
    }
    #note-length:focus,
    #subdivision-select:focus { outline: none; border-color: #4299e1; }

    #loop-btn {
      padding: 6px 18px;
      border: 1px solid #2d2d3f;
      border-radius: 20px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #loop-btn:hover { border-color: #38b2ac; color: #38b2ac; }
    #loop-btn.active {
      border-color: #38b2ac;
      background: rgba(56,178,172,0.15);
      color: #81e6d9;
    }

    .seq-step.chord {
      background: rgba(159,122,234,0.18);
      border-color: #9f7aea;
      color: #d6bcfa;
      min-width: 48px;
    }
    .seq-step.chord.active {
      background: linear-gradient(135deg, #553c9a, #9f7aea);
      border-color: #9f7aea;
      color: #fff;
    }
    .seq-step.chord-pending {
      background: rgba(159,122,234,0.08);
      border: 1px dashed #9f7aea;
      color: #9f7aea;
      min-width: 48px;
    }

    .seq-count {
      color: #4a4a6a;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      min-width: 60px;
    }

    /* SAVED SEQUENCES VIEWER */
    .saved-viewer {
      background: #050510;
      border-top: 3px solid #000;
      padding: 14px 20px;
      overflow-y: auto;
      max-height: 160px;
    }

    .saved-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .saved-block {
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 8px;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      gap: 3px;
    }
    .saved-block:hover { border-color: #4299e1; background: #1e2a3a; }
    .saved-block.dragging { opacity: 0.35; }
    .saved-block.drag-over { outline: 2px solid #4299e1; }
    .seq-step.dragging { opacity: 0.35; cursor: grabbing; }
    .seq-step.drag-over { outline: 2px solid #4299e1; outline-offset: -1px; }
    .saved-block.active-seq { border-color: #4299e1; background: linear-gradient(135deg, #1a2a4a, #1e3a5a); }

    .saved-block-name {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .saved-block-count {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.65rem;
      color: #4a4a6a;
    }

    /* PLAYLIST BAR */
    /* TRACKS SECTION */
    .tracks-section {
      background: #050510;
      border-top: 3px solid #000;
      padding: 10px 16px;
      overflow-y: auto;
      max-height: 240px;
    }
    .tracks-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    #tracks-title-btn {
      flex: 1;
      text-align: left;
      background: transparent;
      border: none;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s ease;
    }
    #tracks-title-btn:hover { color: #4299e1; }
    #tracks-back-btn {
      display: none;
      padding: 5px 12px;
      border: 1px solid #2d2d3f;
      border-radius: 16px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #tracks-back-btn:hover { border-color: #4299e1; color: #4299e1; }

    /* Fullscreen tracks view — triggered by tapping the Tracks title.
       Hides every sibling and pins the tracks section to the viewport so
       a phone held lengthwise shows the whole tracks grid edge-to-edge. */
    body.tracks-fullscreen > *:not(.tracks-section) { display: none !important; }
    body.tracks-fullscreen {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* track the visible viewport on iOS so the URL bar
                         collapsing in landscape doesn't clip content */
    }
    body.tracks-fullscreen .tracks-section {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      max-height: none;
      z-index: 1000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        max(14px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));
    }
    /* Pin the header to the top of the scrollable area so Back / Play / Add
       Track stay reachable in landscape where vertical room is tight. */
    body.tracks-fullscreen .tracks-header {
      position: sticky;
      top: 0;
      background: #050510;
      padding: 4px 0 8px;
      margin-bottom: 8px;
      z-index: 5;
      border-bottom: 1px solid #1a1a2e;
    }
    body.tracks-fullscreen #tracks-back-btn { display: inline-block; }
    body.tracks-fullscreen #tracks-title-btn { display: none; }
    #tracks-play-all {
      background: linear-gradient(135deg, #276749, #38a169);
      color: white;
      box-shadow: 0 2px 10px rgba(56, 161, 105, 0.175);
      width: 34px; height: 34px; min-width: 34px; min-height: 34px;
    }
    #add-track-btn,
    #tracks-export-btn,
    #tracks-loop-all {
      padding: 5px 12px;
      border: 1px solid #2d2d3f;
      border-radius: 16px;
      background: transparent;
      color: #a0aec0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #add-track-btn:hover { border-color: #4299e1; color: #4299e1; }
    #tracks-export-btn:hover { border-color: #38a169; color: #38a169; }
    #tracks-export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #tracks-loop-all:hover { border-color: #38b2ac; color: #38b2ac; }
    #tracks-loop-all.active {
      border-color: #38b2ac;
      background: rgba(56,178,172,0.15);
      color: #81e6d9;
    }
    .track-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      margin-bottom: 8px;
      align-items: stretch;
    }
    .track-controls {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .track-controls button {
      padding: 4px 8px;
      border: 1px solid #2d2d3f;
      border-radius: 12px;
      background: transparent;
      color: #a0aec0;
      font-size: 0.72rem;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .track-play { min-width: 30px; font-size: 0.8rem; }
    .track-play.playing { border-color: #4299e1; color: #4299e1; background: rgba(66,153,225,0.1); }
    .track-loop.active { border-color: #38b2ac; color: #81e6d9; background: rgba(56,178,172,0.15); }
    .track-remove:hover { border-color: #e53e3e; color: #e53e3e; }
    .track-clear:hover { border-color: #e53e3e; color: #e53e3e; }
    .track-name {
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.76rem; font-weight: 600;
      padding: 0 4px;
      min-width: 54px;
      cursor: pointer;
      user-select: none;
    }
    .track-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 30px;
      grid-template-rows: 44px;
      gap: 2px;
      overflow-x: auto;
      background: #0a0a14;
      border: 1px solid #1a1a2e;
      border-radius: 6px;
      padding: 4px;
      min-height: 52px;
      scrollbar-width: thin;
      scrollbar-color: #2d2d3f #0a0a14;
    }
    .track-grid.drag-over {
      outline: 2px dashed #4299e1;
      outline-offset: -2px;
      background: #0e1324;
    }
    .track-grid::-webkit-scrollbar { height: 4px; }
    .track-grid::-webkit-scrollbar-track { background: #0a0a14; }
    .track-grid::-webkit-scrollbar-thumb { background: #2d2d3f; border-radius: 2px; }
    .track-item {
      background: linear-gradient(135deg, #1a2a4a, #1e3a5a);
      border: 1px solid #2b6cb0;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer;
      transition: all 0.15s;
    }
    .track-item:hover { border-color: #4299e1; }
    .track-item.active {
      background: linear-gradient(135deg, #2b6cb0, #4299e1);
      border-color: #4299e1;
    }
    .track-empty {
      color: #4a4a6a;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      padding: 10px;
      grid-column: 1 / -1;
      white-space: nowrap;
    }

    /* LONG-PRESS CONTEXT MENU */
    .ctx-menu {
      position: fixed;
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 999;
      overflow: hidden;
      min-width: 140px;
    }

    .ctx-menu button {
      display: block;
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: none;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ctx-menu button:hover { background: #2d2d3f; }
    .ctx-menu button.danger { color: #fc8181; }
    .ctx-menu button.danger:hover { background: #2d1a1a; }
    .ctx-menu hr { border: none; border-top: 1px solid #2d2d3f; margin: 0; }

    .saved-empty {
      color: #2d2d3f;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      grid-column: 1 / -1;
    }

    /* SOUND EDITOR MODAL */
    .sm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 1100;
      display: flex; align-items: center; justify-content: center;
    }

    .sm-modal {
      background: #1a1a2e;
      border: 1px solid #2d2d3f;
      border-radius: 16px;
      padding: 24px;
      width: min(360px, 92vw);
      box-shadow: 0 16px 48px rgba(0,0,0,0.65);
    }

    .sm-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      color: #f0f4ff; margin-bottom: 18px;
    }

    .sm-waves {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px;
    }

      cursor: pointer; transition: all 0.15s;
    }
    .sm-wave:hover { border-color: #4299e1; color: #4299e1; }
    .sm-wave.active { border-color: #4299e1; color: #4299e1; background: rgba(66,153,225,0.12); }

    .sm-param { margin-bottom: 12px; }
    .sm-param-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-family: 'Segoe UI', sans-serif; font-size: 0.73rem;
      color: #a0aec0; margin-bottom: 4px;
    }
    .sm-param-row .sm-val { color: #e2e8f0; font-weight: 600; }
    .sm-param input[type=range] { width: 100%; accent-color: #4299e1; }

    .sm-footer {
      display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;
    }

    .sm-preview {
      padding: 6px 14px; border-radius: 18px;
      background: transparent; border: 1px solid #2d2d3f;
      color: #a0aec0; font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
    }
    .sm-preview:hover { border-color: #4299e1; color: #4299e1; }

    .sm-apply {
      padding: 6px 18px; border-radius: 18px;
      background: linear-gradient(135deg, #2b6cb0, #4299e1);
      border: none; color: white;
      font-family: 'Segoe UI', sans-serif; font-size: 0.78rem;
      cursor: pointer; transition: all 0.15s;
    }
    .sm-apply:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(66,153,225,0.275); }

    .rename-input {
      width: 100%;

      border: 1px solid #2d2d3f;

    .sm-modal { max-height: 85vh; overflow-y: auto; }

    .sm-remove-step {

    }
    .sm-remove-step:hover { border-color: #fc8181; background: rgba(252,129,129,0.08); }

    .sm-section-label {
      font-family: 'Segoe UI', sans-serif; font-size: 0.7rem;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: #4a4a6a; margin: 14px 0 8px;

    .se-chord-list { margin-bottom: 4px; }

      display: flex; align-items: center; gap: 6px;

    }

      font-size: 0.85rem; font-weight: 700; color: #e2e8f0;

    .sm-copy {

<body>

  <div class="menubar">
    <a href="index.html">Mike Luz</a>
    <button id="colors-menu-btn" title="Note block colors">Colors ▾</button>
    <div class="colors-panel" id="colors-panel">
      <button type="button" class="colors-opt" data-mode="shuffle">Color shuffle</button>
      <button type="button" class="colors-opt" data-mode="chess">Chess</button>
      <button type="button" class="colors-opt" data-mode="checkers">Checkers</button>
    </div>
    <button id="grid-settings-btn" title="Grid settings">Grid ▾</button>
    <div class="grid-settings-panel" id="grid-settings-panel">
      <div class="grid-control">
        <label title="Starting note of the chromatic grid">Root
          <select id="root-select"></select>
        </label>
        <label title="Octave number of the lowest note (master shift)">Oct
          <input type="number" id="base-octave-input" min="1" max="7" value="4" />
        </label>
        <label title="Number of octaves (1–3)">Octaves
          <input type="number" id="octaves-input" min="1" max="3" value="1" />
        </label>
      </div>
      <div class="grid-control grid-control-row2">
        <label title="Highlight a scale — non-scale notes are blacked out">Scale
          <select id="scale-select"></select>
        </label>
        <label title="Master tuning: frequency of A4 (Hz)">A4
          <input type="range" id="master-freq-slider" min="400" max="480" value="440" step="1" />
          <input type="number" id="master-freq-input" min="400" max="480" value="440" />
        </label>
      </div>
      <div class="grid-state-row" title="Save and recall the whole grid state — root, scale, octaves, palette, and per-cell sounds.">
        <label for="grid-state-select">Saved states</label>
        <select id="grid-state-select">
          <option value="">— Load a saved state —</option>
        </select>
        <div class="grid-state-actions">
          <button type="button" id="grid-state-save-btn">Save current</button>
          <button type="button" id="grid-state-delete-btn" disabled>Delete</button>
        </div>
      </div>
    </div>
    <label class="menubar-toggle" title="When on, saving a sequence also resets root, octave, scale, palette, and cell sounds back to defaults.">
      <input type="checkbox" id="clear-after-save" />
      Clear after save
    </label>
  </div>

  <div class="grid" id="grid"></div>

  <div class="rest-bar" id="rest-bar"><span>REST</span></div>

  <div id="subedit-banner">
    <span>Editing subsequence — click <strong>Save</strong> to commit.</span>
    <button id="subedit-cancel" type="button">Cancel</button>
  </div>

  <div class="sequence-display" id="sequence-display">
    <span class="seq-empty">Click notes or REST to build a sequence…</span>
  </div>

  <div class="footer-bar">
    <div class="btn-group btn-group--step" title="Step controls — set how the next note is added">
      <span class="btn-group-label">Step</span>
      <button id="chord-btn">Chord</button>
      <label class="note-length-label" title="How many steps each new note should be held for">Hold
        <select id="note-length">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="8">8</option>
        </select>
      </label>
      <label class="note-length-label" title="Step subdivision — 1 step = this note value at the current BPM">Div
        <select id="subdivision-select">
          <option value="4">1/1</option>
          <option value="2">1/2</option>
          <option value="1" selected>1/4</option>
          <option value="0.5">1/8</option>
          <option value="0.25">1/16</option>
          <option value="0.125">1/32</option>
        </select>
      </label>
    </div>

    <button id="play-btn" class="menu-btn" title="Play / stop sequence">▶</button>
    <button id="loop-btn" title="Loop the current sequence">Loop</button>
    <div class="tempo-control">
      <input type="range" id="tempo-slider" min="60" max="320" value="120" step="10" />
      <input type="number" id="tempo-input" min="60" max="320" value="120" title="BPM" />
    </div>

    <div class="btn-group btn-group--seq" title="Sequence controls">
      <button id="clear-btn">Clear</button>
      <button id="save-btn" disabled>Save</button>
      <button id="append-track-btn" title="Append the current sequence to a track" disabled>→ Track ▾</button>
      <button id="rec-btn" title="Record audio from the microphone into the sequence bank">● Rec</button>
      <button id="random-btn" title="Generate a random sequence">Random</button>
      <button id="reverse-btn" title="Reverse the order of the sequence" disabled>Reverse</button>
      <button id="shuffle-btn" title="Shuffle the order of steps" disabled>Shuffle</button>
    </div>

    <span class="seq-count" id="seq-count">0 steps</span>

  <div class="saved-viewer">
    <div class="saved-grid" id="saved-grid">
      <span class="saved-empty">No saved sequences yet.</span>
    </div>
  </div>

  <div class="tracks-section">
    <div class="tracks-header">
      <button id="tracks-back-btn" type="button" title="Return to the full UI">← Back</button>
      <button id="tracks-play-all" class="menu-btn" title="Play / stop all tracks">▶</button>
      <button id="tracks-loop-all" title="Loop the whole sequencer — restart all tracks together after the longest track ends">Loop</button>
      <button id="tracks-title-btn" type="button" title="Open tracks in fullscreen view">Tracks ⛶</button>
      <button id="tracks-export-btn" title="Render tracks to a WAV file and save to Google Drive">Export</button>
      <button id="add-track-btn">+ Add Track</button>
    </div>
    <div id="tracks-container"></div>
  </div>

  <script>
    const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    let rootIdx = 0;       // 0 = C
    let baseOctave = 4;    // octave number of the root note
    let octaveCount = 1;   // 1..3
    let masterFreqA = 440; // Hz — master tuning reference (A4)

    function computeNotes() {
      const out = [];
      const total = 12 * octaveCount;
      for (let i = 0; i < total; i++) {
        const semi = rootIdx + i;
        const noteIdx = semi % 12;
        const octaveNum = baseOctave + Math.floor(semi / 12);
        const midi = 12 * (octaveNum + 1) + noteIdx;
        const freq = masterFreqA * Math.pow(2, (midi - 69) / 12);
        out.push({ freq, label: CHROMATIC[noteIdx] + octaveNum });
      }
      return out;
    }

    let notes = computeNotes();

    let sequenceTimer = null;
    let sequence = []; // [{ freq, label, cellIndex }] — freq null = rest; chord: [{...}]
    let chordMode = false;
    let loopMode = false;
    let noteLength = 1;
    let stepSubdivision = 1; // multiplier vs quarter note (1 = 1/4, 0.5 = 1/8, 0.25 = 1/16, 2 = 1/2, 4 = 1/1)
    let pendingChord = [];
    const cells = [];

    // Saved sequences — persisted to localStorage
    let savedSequences = JSON.parse(localStorage.getItem('sounds-saved') || '[]');
    let activeSeqIndex = null;

    function seqName(index) {
      let name = '';
      let n = index;
      while (true) {
        name = String.fromCharCode(65 + (n % 26)) + name;
        if (n < 26) break;
        n = Math.floor(n / 26) - 1;
      }
      return name;
    }

    function persistSaved() {
      localStorage.setItem('sounds-saved', JSON.stringify(savedSequences));
    }

    function renderSavedSequences() {
      const grid = document.getElementById('saved-grid');
      if (savedSequences.length === 0) {
        grid.innerHTML = '<span class="saved-empty">No saved sequences yet.</span>';
        return;
      }
      grid.innerHTML = '';
      savedSequences.forEach((saved, i) => {
        const isAudio = saved.type === 'audio';
        const block = document.createElement('div');
        block.className = 'saved-block'
          + (i === activeSeqIndex ? ' active-seq' : '')
          + (isAudio ? ' audio-item' : '');
        block.dataset.seqIndex = i;
        const countLabel = isAudio
          ? `audio · ${(saved.durationSec || 0).toFixed(1)}s`
          : `${(saved.steps || []).length} steps${saved.bpm ? ` · ${saved.bpm}` : ''}`;
        block.innerHTML = `
          <span class="saved-block-name">${saved.name}</span>
          <span class="saved-block-count">${countLabel}</span>
        `;
        block.addEventListener('click', () => {
          if (isAudio) {
            previewSavedAudio(saved);
            return;
          }
          if (saved.rootIdx != null)     rootIdx     = saved.rootIdx;
          if (saved.baseOctave != null)  baseOctave  = saved.baseOctave;
          if (saved.octaveCount != null) octaveCount = saved.octaveCount;
          if (saved.masterFreqA != null) masterFreqA = saved.masterFreqA;
          if (saved.scale)               currentScale = normalizeScaleName(saved.scale);
          if (saved.subdivision != null) stepSubdivision = saved.subdivision;
          if (saved.restColor)           { restColor = saved.restColor; applyRestColor(); }
          if (Array.isArray(saved.palette) && saved.palette.length === 12) {
            palette = [...saved.palette];
          }

          const rootSel   = document.getElementById('root-select');
          const baseOctIn = document.getElementById('base-octave-input');
          const octsIn    = document.getElementById('octaves-input');
          const freqSl    = document.getElementById('master-freq-slider');
          const freqIn    = document.getElementById('master-freq-input');
          const scaleSel  = document.getElementById('scale-select');
          if (rootSel)   rootSel.value   = String(rootIdx);
          if (baseOctIn) baseOctIn.value = baseOctave;
          if (octsIn)    octsIn.value    = octaveCount;
          if (freqSl)    freqSl.value    = masterFreqA;
          if (freqIn)    freqIn.value    = masterFreqA;
          if (scaleSel)  scaleSel.value  = currentScale;
          const subSel = document.getElementById('subdivision-select');
          if (subSel)    subSel.value    = String(stepSubdivision);

          rebuildGrid();

          if (Array.isArray(saved.cellSounds) && saved.cellSounds.length === cellSounds.length
              && Array.isArray(saved.cellParams) && saved.cellParams.length === cellParams.length) {
            cellSounds = [...saved.cellSounds];
            cellParams = saved.cellParams.map(p => ({ ...p }));
            cells.forEach((cell, idx) => {
              const sel = cell.querySelector('.cell-sound-select');
              if (sel) sel.value = cellSounds[idx];
            });
          }

          if (saved.loopMode != null) {
            loopMode = !!saved.loopMode;
            document.getElementById('loop-btn').classList.toggle('active', loopMode);
          }

          sequence = [...saved.steps];
          insertionPoint = null;
          if (saved.bpm) {
            tempoInput.value = saved.bpm;
            tempoSlider.value = saved.bpm;
          }
          activeSeqIndex = i;
          renderSequence();
          renderSavedSequences();
          document.getElementById('save-btn').disabled = false;
        });
        bindDrag(block, i);
        bindLongPress(block, i);
        grid.appendChild(block);
      });
    }

    document.addEventListener('pointerdown', () => Tone.start(), { once: true });

    const tempoSlider = document.getElementById('tempo-slider');
    const tempoInput  = document.getElementById('tempo-input');

    tempoSlider.addEventListener('input', () => {
      tempoInput.value = tempoSlider.value;
    });

    tempoInput.addEventListener('input', () => {
      const v = Math.min(320, Math.max(60, parseInt(tempoInput.value) || 60));
      tempoSlider.value = v;
    });

    // iOS audio unlock: Tone.start() alone is async and often hasn't finished
    // resuming by the time the first tap fires playNote. Playing a silent buffer
    // synchronously inside the gesture forces the context to transition to
    // running immediately, and Tone.start() keeps the Tone-level state in sync.
    ['pointerdown','touchstart','keydown'].forEach(ev => {
      document.addEventListener(ev, () => {
        try {
          const ac = Tone.getContext().rawContext;
          const src = ac.createBufferSource();
          src.buffer = ac.createBuffer(1, 1, 22050);
          src.connect(ac.destination);
          src.start(0);
        } catch (e) {}
        Tone.start();
      }, { once: true, capture: true });
    });
    document.addEventListener('visibilitychange', () => {
      const tctx = Tone.getContext().rawContext;
      if (!document.hidden && tctx && tctx.state === 'suspended') tctx.resume();
    });

    function getStepMs() {
      return Math.round(60000 / (parseInt(tempoInput.value) || 120) * stepSubdivision);
    }

    const SOUNDS = ['sine','square','triangle','sawtooth','pulse','fat','fm','am','mono','bell','pluck','kick','metal'];

    // Master bus: compressor softens dynamic peaks, limiter is a brick wall at
    // -1 dB so simultaneous voices (chords, overlapping tracks, long releases)
    // never clip. Aggressive settings because chord playback can spike well
    // above 0 dB from the raw sum of multiple synths.
    const masterLimiter = new Tone.Limiter(-1).toDestination();
    const masterBus = new Tone.Compressor({
      threshold: -24, ratio: 4, attack: 0.003, release: 0.25, knee: 12,
    }).connect(masterLimiter);

    // ---- Custom sample loading (samples/manifest.json) ----
    // Each entry creates a Tone.Sampler that pitch-shifts the file across
    // the keyboard. type strings of the form 'sample:<id>' route through these.
    const sampleSamplers = new Map();

    function isSampleType(type) {
      return typeof type === 'string' && type.startsWith('sample:');
    }
    function getSampleEntry(type) {
      if (!isSampleType(type)) return null;
      return sampleSamplers.get(type.slice(7)) || null;
    }
    function getAllSoundOptions() {
      const opts = SOUNDS.map(s => ({ value: s, label: s.charAt(0).toUpperCase() + s.slice(1) }));
      for (const [id, info] of sampleSamplers) {
        opts.push({ value: 'sample:' + id, label: info.name });
      }
      return opts;
    }

    async function loadSampleManifest() {
      try {
        const res = await fetch('samples/manifest.json', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        const list = Array.isArray(data?.samples) ? data.samples : [];
        list.forEach(s => {
          if (!s || !s.id || !s.file) return;
          const rootNote = s.rootNote || 'C4';
          try {
            const sampler = new Tone.Sampler({
              urls: { [rootNote]: s.file },
              release: 1,
              baseUrl: 'samples/',
            }).connect(masterBus);
            sampleSamplers.set(s.id, {
              sampler,
              name: s.name || s.id,
              rootNote,
            });
          } catch (e) {
            console.warn('Failed to load sample', s.id, e);
          }
        });
      } catch (e) {
        // No manifest, malformed JSON, or offline — just skip samples silently.
      }
    }

    // Scale a chord note's params so N simultaneous voices sum to a roughly
    // single-voice loudness — otherwise the bus hits the compressor / limiter
    // far above threshold and audibly distorts on the attack.
    function chordVoiceParams(noteParams, chordSize) {
      const scale = 1 / Math.sqrt(Math.max(1, chordSize));
      const base = (noteParams && typeof noteParams === 'object') ? noteParams : (typeof noteParams === 'string' ? { type: noteParams } : {});
      const baseVol = base.volume ?? 100;
      return { ...base, volume: baseVol * scale };
    }

    function playNote(freq, params = {}, durationMs, startTime, destination) {
      if (typeof params === 'string') params = { type: params };
      const {
        type    = 'sine',
        attack  = 10,
        decay   = 100,
        sustain = 50,
        release = 1400,
        volume  = 100,
        detune  = 0,
      } = params;

      const atk = Math.max(attack  / 1000, 0.005);
      const dec = Math.max(decay   / 1000, 0.01);
      const sus = Math.max(sustain / 100,  0.001);
      const rel = Math.max(release / 1000, 0.1);
      const velocity = Math.min(1, Math.max(0, volume / 100));
      const env = { attack: atk, decay: dec, sustain: sus, release: rel };

      const targetDur = durationMs ? durationMs / 1000 : Math.max(atk + dec, 0.1);
      const preReleaseDur = durationMs
        ? Math.max(0.02, targetDur - rel)
        : atk + dec;
      const disposeMs = (preReleaseDur + rel + 0.4) * 1000;

      // Loaded sample (Tone.Sampler) — pitch-shifts the file to play any note.
      if (isSampleType(type)) {
        const entry = getSampleEntry(type);
        if (entry?.sampler && entry.sampler.loaded) {
          const tunedFreq = (typeof freq === 'number')
            ? freq * Math.pow(2, detune / 1200)
            : freq;
          const dur = Math.max(targetDur, 0.05);
          try {
            entry.sampler.triggerAttackRelease(tunedFreq, dur, startTime, velocity);
          } catch (e) {
            console.warn('Sample playback failed', type, e);
          }
        }
        return;
      }

      let synth;

      if (type === 'bell') {
        synth = new Tone.FMSynth({
          harmonicity: 2.14,
          modulationIndex: 4,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.001, decay: 2.0, sustain: 0, release: 0.8 },
          modulation: { type: 'sine' },
          modulationEnvelope: { attack: 0.001, decay: 0.5, sustain: 0.2, release: 0.5 },
        }).connect(destination || masterBus);
      } else if (type === 'pluck') {
        // PluckSynth has no detune param — fold cents into the frequency.
        synth = new Tone.PluckSynth({
          attackNoise: 1,
          dampening: 4000,
          resonance: 0.7,
          release: 1,
        }).connect(destination || masterBus);
        const tunedFreq = (typeof freq === 'number') ? freq * Math.pow(2, detune / 1200) : freq;
        synth.triggerAttackRelease(tunedFreq, Math.max(targetDur, 0.1), startTime, velocity);
        if (startTime === undefined) setTimeout(() => synth.dispose(), (targetDur + 1.5) * 1000);
        return;
      } else if (type === 'fm') {
        synth = new Tone.FMSynth({
          harmonicity: 3,
          modulationIndex: 10,
          oscillator: { type: 'sine' },
          envelope: env,
          modulation: { type: 'square' },
          modulationEnvelope: { attack: 0.5, decay: 0, sustain: 1, release: 0.5 },
        }).connect(destination || masterBus);
      } else if (type === 'am') {
        synth = new Tone.AMSynth({
          harmonicity: 2,
          oscillator: { type: 'sine' },
          envelope: env,
          modulation: { type: 'square' },
          modulationEnvelope: { attack: 0.5, decay: 0, sustain: 1, release: 0.5 },
        }).connect(destination || masterBus);
      } else if (type === 'mono') {
        synth = new Tone.MonoSynth({
          oscillator: { type: 'sawtooth' },
          envelope: env,
          filterEnvelope: {
            attack: 0.01, decay: 0.3, sustain: 0.3, release: 2,
            baseFrequency: 200, octaves: 3,
          },
          filter: { Q: 6, type: 'lowpass', rolloff: -24 },
        }).connect(destination || masterBus);
      } else if (type === 'kick') {
        synth = new Tone.MembraneSynth({
          pitchDecay: 0.05,
          octaves: 10,
          envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 },
        }).connect(destination || masterBus);
      } else if (type === 'metal') {
        synth = new Tone.MetalSynth({
          harmonicity: 5.1,
          modulationIndex: 32,
          resonance: 4000,
          octaves: 1.5,
          envelope: { attack: 0.001, decay: 1.4, release: 0.2 },
        }).connect(destination || masterBus);
      } else {
        // Sustainable waves: sine / square / triangle / sawtooth / pulse / fat
        const oscOpts = type === 'fat'
          ? { type: 'fatsawtooth', count: 3, spread: 30 }
          : type === 'pulse'
            ? { type: 'pulse', width: 0.4 }
            : { type };
        synth = new Tone.Synth({
          oscillator: oscOpts,
          envelope: env,
        }).connect(destination || masterBus);
      }

      if (synth.detune) synth.detune.value = detune;
      synth.triggerAttackRelease(freq, preReleaseDur, startTime, velocity);
      if (startTime === undefined) setTimeout(() => synth.dispose(), disposeMs);
    }

    // ---- Sequence display ----

    // Visual width of a step chip. The reference unit is "length 1, step 1/1"
    // (subdivision value 4) → 80 px. Anything shorter shrinks proportionally;
    // anything longer grows. A subsequence's width is the sum of its subSteps.
    const STEP_BASE_PX = 80;
    function stepLengthFactor(step) {
      if (step.isSub && Array.isArray(step.subSteps)) {
        if (step.subSteps.length === 0) return 1;
        return step.subSteps.reduce((sum, s) => sum + stepLengthFactor(s), 0);
      }
      const dur = step.duration || 1;
      const sub = (step.subdivision != null) ? step.subdivision : stepSubdivision;
      return dur * sub / 4;
    }
    function stepWidthPx(step) {
      return STEP_BASE_PX * stepLengthFactor(step);
    }

    function renderSequence(activeIndex = -1) {
      const display = document.getElementById('sequence-display');
      const count   = document.getElementById('seq-count');

      const isEmpty = sequence.length === 0 && pendingChord.length === 0;
      if (isEmpty) {
        display.innerHTML = '<span class="seq-empty">Click notes or REST to build a sequence…</span>';
        count.textContent = '0 steps';
        const revBtn = document.getElementById('reverse-btn');
        if (revBtn) revBtn.disabled = true;
        const shuffBtn = document.getElementById('shuffle-btn');
        if (shuffBtn) shuffBtn.disabled = true;
        const appBtn = document.getElementById('append-track-btn');
        if (appBtn) appBtn.disabled = true;
        return;
      }

      display.innerHTML = '';
      sequence.forEach((step, i) => {
        if (insertionPoint === i) display.appendChild(makeInsertCursor());
        const chip = document.createElement('div');
        const durSuffix = (step.duration && step.duration > 1) ? `×${step.duration}` : '';
        if (step.isSub) {
          const count = (step.subSteps || []).length;
          chip.className = 'seq-step subseq' + (i === activeIndex ? ' active' : '');
          chip.textContent = count > 0 ? `▤\n×${count}` : '▤';
        } else if (step.chord) {
          chip.className = 'seq-step chord' + (i === activeIndex ? ' active' : '');
          chip.textContent = step.chord.map(n => n.label).join('·') + (durSuffix ? ' ' + durSuffix : '');
        } else {
          chip.className = 'seq-step' + (step.freq === null ? ' rest' : '') + (i === activeIndex ? ' active' : '');
          const main = step.freq !== null
            ? `${step.label}${step.sound && step.sound !== 'sine' ? '\n' + step.sound.slice(0,3) : ''}`
            : step.label;
          chip.textContent = durSuffix ? `${main}\n${durSuffix}` : main;
        }
        chip.style.width = stepWidthPx(step) + 'px';
        bindStepLongPress(chip, i);
        bindStepDrag(chip, i);
        bindStepDragTouch(chip, i);
        display.appendChild(chip);
      });
      if (insertionPoint != null && insertionPoint >= sequence.length) {
        display.appendChild(makeInsertCursor());
      }

      // Show in-progress chord as a dashed pending chip
      if (chordMode && pendingChord.length > 0) {
        const chip = document.createElement('div');
        chip.className = 'seq-step chord-pending';
        chip.textContent = pendingChord.map(n => n.label).join('·') + '…';
        display.appendChild(chip);
        chip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      count.textContent = `${sequence.length} step${sequence.length !== 1 ? 's' : ''}`;

      if (activeIndex >= 0) {
        const chips = display.querySelectorAll('.seq-step:not(.chord-pending)');
        chips[activeIndex]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      const revBtn = document.getElementById('reverse-btn');
      if (revBtn) revBtn.disabled = sequence.length < 2;
      const shuffBtn = document.getElementById('shuffle-btn');
      if (shuffBtn) shuffBtn.disabled = sequence.length < 2;
      const appBtn = document.getElementById('append-track-btn');
      if (appBtn) appBtn.disabled = sequence.length === 0;
    }

    // null = append; otherwise the next note is spliced at this index.
    // The cursor advances by 1 after each insert so consecutive clicks
    // build a run of notes at the insertion point.
    let insertionPoint = null;

    function addToSequence(step) {
      if (insertionPoint !== null && insertionPoint >= 0 && insertionPoint <= sequence.length) {
        sequence.splice(insertionPoint, 0, step);
        insertionPoint++;
      } else {
        sequence.push(step);
      }
      renderSequence();
      document.getElementById('save-btn').disabled = false;
    }

    function makeInsertCursor() {
      const cursor = document.createElement('div');
      cursor.className = 'seq-cursor';
      cursor.title = 'Insertion point — click to cancel';
      cursor.addEventListener('click', () => {
        insertionPoint = null;
        renderSequence();
      });
      return cursor;
    }

    // ---- Playback ----

    function clearHighlights() {
      cells.forEach(c => c.classList.remove('active-loop'));
      document.getElementById('rest-bar').classList.remove('active-loop');
    }

    function stopSequence() {
      clearTimeout(sequenceTimer);
      sequenceTimer = null;
      clearHighlights();
      renderSequence();
      document.getElementById('play-btn').textContent = '▶';
    }

    function advanceAfterStep(index) {
      const next = index + 1;
      if (next < sequence.length) {
        playSequence(next);
      } else if (loopMode && sequence.length > 0) {
        playSequence(0);
      } else {
        stopSequence();
      }
    }

    function playStepCB(step, onDone) {
      // Subsequence: recurse through subSteps, then onDone.
      if (step.isSub && Array.isArray(step.subSteps) && step.subSteps.length > 0) {
        playSubStepsCB(step.subSteps, 0, onDone);
        return;
      }
      const stepDur = step.duration || 1;
      const stepSub = (step.subdivision != null) ? step.subdivision : stepSubdivision;
      const bpm = parseInt(tempoInput.value) || 120;
      const waitMs = Math.round(60000 / bpm * stepSub) * stepDur;
      clearHighlights();
      if (step.chord) {
        const size = step.chord.length;
        step.chord.forEach(n => {
          playNote(n.freq, chordVoiceParams(n.params || n.sound || 'sine', size), waitMs);
          if (n.cellIndex != null) cells[n.cellIndex]?.classList.add('active-loop');
        });
      } else if (step.freq != null) {
        playNote(step.freq, step.params || step.sound || 'sine', waitMs);
        if (step.cellIndex != null) cells[step.cellIndex]?.classList.add('active-loop');
      } else {
        document.getElementById('rest-bar').classList.add('active-loop');
      }
      sequenceTimer = setTimeout(onDone, waitMs);
    }

    function playSubStepsCB(subSteps, idx, onDone) {
      if (idx >= subSteps.length) { onDone(); return; }
      playStepCB(subSteps[idx], () => playSubStepsCB(subSteps, idx + 1, onDone));
    }

    function playSequence(index = 0) {
      if (index === 0) {
        document.getElementById('play-btn').textContent = '■';
      }
      if (sequence.length === 0) { stopSequence(); return; }
      renderSequence(index);
      playStepCB(sequence[index], () => advanceAfterStep(index));
    }

    document.getElementById('play-btn').addEventListener('click', async () => {
      if (sequence.length === 0) return;
      await Tone.start();
      if (sequenceTimer !== null) {
        stopSequence();
      } else {
        playSequence(0);
      }
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      stopSequence();
      sequence = [];
      pendingChord = [];
      activeSeqIndex = null;
      insertionPoint = null;
      renderSequence();
      renderSavedSequences();
      document.getElementById('save-btn').disabled = true;
    });

    document.getElementById('reverse-btn').addEventListener('click', () => {
      if (sequence.length < 2) return;
      stopSequence();
      sequence.reverse();
      pendingChord = [];
      insertionPoint = null;
      renderSequence();
    });

    document.getElementById('shuffle-btn').addEventListener('click', () => {
      if (sequence.length < 2) return;
      stopSequence();
      // Fisher-Yates
      for (let i = sequence.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [sequence[i], sequence[j]] = [sequence[j], sequence[i]];
      }
      pendingChord = [];
      insertionPoint = null;
      renderSequence();
    });

    function appendWorkspaceToTrack(trackIdx) {
      if (sequence.length === 0 || !tracks[trackIdx]) return;
      const name = (activeSeqIndex !== null && savedSequences[activeSeqIndex])
        ? savedSequences[activeSeqIndex].name
        : seqName(savedSequences.length);
      const snapshot = {
        name,
        bpm: parseInt(tempoInput.value) || 120,
        subdivision: stepSubdivision,
        steps: sequence.map(cloneStep),
      };
      tracks[trackIdx].items.push(snapshot);
      persistTracks();
      renderTracks();
      const btn = document.getElementById('append-track-btn');
      const original = btn.textContent;
      btn.textContent = 'Appended ✓';
      btn.classList.add('flash-confirm');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('flash-confirm');
      }, 1100);
    }

    document.getElementById('append-track-btn').addEventListener('click', (e) => {
      if (sequence.length === 0) return;
      const actions = [
        { label: '+ New track', fn: () => {
          addTrack();
          appendWorkspaceToTrack(tracks.length - 1);
        } },
      ];
      if (tracks.length > 0) {
        actions.push('hr');
        tracks.forEach((track, tIdx) => {
          actions.push({ label: `→ ${track.name}`, fn: () => appendWorkspaceToTrack(tIdx) });
        });
      }
      const rect = e.currentTarget.getBoundingClientRect();
      showCtxMenu(rect.left, rect.bottom + 4, actions);
    });

    document.getElementById('note-length').addEventListener('change', (e) => {
      noteLength = parseInt(e.target.value) || 1;
    });

      steps.forEach(s => {

      // value affects the whole sequence, not just the next note added.

    // ---- Random sequence generator ----

    function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    const _RAND_SUBS = [4, 2, 1, 1, 0.5, 0.5, 0.5, 0.25, 0.25, 0.125];
    const _RAND_DURS = [1, 1, 1, 1, 2, 2, 3, 4, 8];

    function sampleWithoutReplacement(sourceLen, k) {
      const pool = [];
      for (let i = 0; i < sourceLen; i++) pool.push(i);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, Math.min(k, sourceLen));
    }

    function randomStepParams(type) {
      return { type, attack: 10, decay: 100, sustain: 50, release: 1400, volume: 100, detune: 0 };
    }

    // Text → sequence translation. Mapping rules:
    //   letters       → scale-tone note. Letter index (a=0, …, z=25) wraps
    //                   over the available scale cells of the chosen scale.
    //   tone          → deterministic by letter (tonePool[letterIdx % len])
    //                   so every 'a' uses the same sound.
    //   vowels        → +1 to duration (held longer)
    //   uppercase     → +1 to duration (combines with vowel rule)
    //   consonant run → groups of 2+ consecutive consonants flush as one
    //                   chord (capped at MAX_CHORD voices, deduped by pitch).
    //                   Vowels and non-letters break the run.
    //   non-letters   → rest if includeRests, otherwise skipped (also flush
    //                   any pending chord run first).
    function generateTextSequence(text, scaleName, tones, includeRests) {
      const intervals = (scaleName && SCALES[scaleName]) || SCALES['chromatic'];
      const scaleCells = [];
      for (let i = 0; i < notes.length; i++) {
        if (intervals.includes(i % 12)) scaleCells.push(i);
      }
      if (scaleCells.length === 0) return [];
      const tonePool = (Array.isArray(tones) && tones.length > 0) ? tones : SOUNDS;
      const VOWELS = new Set(['a','e','i','o','u']);
      const MAX_CHORD = 5;
      const subdivision = 1;
      const out = [];

      const letterCellIdx = (ch) => {
        const i = ch.toLowerCase().charCodeAt(0) - 97;
        return scaleCells[i % scaleCells.length];
      };
      const letterTone = (ch) => {
        const i = ch.toLowerCase().charCodeAt(0) - 97;
        return tonePool[i % tonePool.length];
      };
      const makeVoice = (letter) => {
        const cellIdx = letterCellIdx(letter);
        const sound = letterTone(letter);
        return {
          freq: notes[cellIdx].freq,
          label: notes[cellIdx].label,
          cellIndex: cellIdx,
          sound,
          params: randomStepParams(sound),
        };
      };

      let run = [];
      let runHasUpper = false;
      const flushRun = () => {
        if (run.length === 0) return;
        const dur = 1 + (runHasUpper ? 1 : 0);
        if (run.length === 1) {
          const v = makeVoice(run[0]);
          out.push({ ...v, duration: dur, subdivision });
        } else {
          const voices = [];
          const seenCells = new Set();
          for (const letter of run.slice(0, MAX_CHORD)) {
            const v = makeVoice(letter);
            if (seenCells.has(v.cellIndex)) continue;
            seenCells.add(v.cellIndex);
            voices.push(v);
          }
          if (voices.length === 1) {
            out.push({ ...voices[0], duration: dur, subdivision });
          } else {
            out.push({
              chord: voices,
              label: voices.map(n => n.label).join('·'),
              duration: dur, subdivision,
            });
          }
        }
        run = [];
        runHasUpper = false;
      };

      for (const ch of String(text)) {
        if (/[a-zA-Z]/.test(ch)) {
          const lower = ch.toLowerCase();
          const isUpper = ch !== lower;
          if (VOWELS.has(lower)) {
            flushRun();
            const dur = 2 + (isUpper ? 1 : 0);
            const v = makeVoice(ch);
            out.push({ ...v, duration: dur, subdivision });
          } else {
            run.push(ch);
            if (isUpper) runHasUpper = true;
          }
        } else {
          flushRun();
          if (includeRests) {
            out.push({ freq: null, label: '—', cellIndex: null, duration: 1, subdivision });
          }
        }
      }
      flushRun();
      return out;
    }

    function generateRandomSequence(numSteps, maxChordSize, maxStepLength, includeRests = true, includeChords = true, scaleName = null, tones = null) {
      // Filter the chromatic note grid down to scale tones — `pool` holds
      // the cell indices we're allowed to sample from.
      const intervals = (scaleName && SCALES[scaleName]) || SCALES['chromatic'];
      const pool = [];
      for (let i = 0; i < notes.length; i++) {
        if (intervals.includes(i % 12)) pool.push(i);
      }
      const poolSize = pool.length;
      if (poolSize === 0) return [];
      const tonePool = (Array.isArray(tones) && tones.length > 0) ? tones : SOUNDS;
      const out = [];
      const chordAllowed = includeChords && maxChordSize > 1 && poolSize > 1;
      const maxLen = Math.max(1, maxStepLength || 1);
      const durPool = _RAND_DURS.filter(d => d <= maxLen);
      if (durPool.length === 0) durPool.push(1);
      for (let s = 0; s < numSteps; s++) {
        const roll = Math.random();
        const subdivision = randomFrom(_RAND_SUBS);
        const duration    = randomFrom(durPool);
        if (includeRests && roll < 0.18) {
          out.push({ freq: null, label: '—', cellIndex: null, duration, subdivision });
          continue;
        }
        if (chordAllowed && roll < 0.45) {
          const size = 2 + Math.floor(Math.random() * (maxChordSize - 1));
          const picked = sampleWithoutReplacement(poolSize, size);
          const chord = picked.map(p => {
            const idx = pool[p];
            const sound = randomFrom(tonePool);
            return {
              freq: notes[idx].freq,
              label: notes[idx].label,
              cellIndex: idx,
              sound,
              params: randomStepParams(sound),
            };
          });
          out.push({
            chord,
            label: chord.map(n => n.label).join('·'),
            duration, subdivision,
          });
          continue;
        }
        const idx = pool[Math.floor(Math.random() * poolSize)];
        const sound = randomFrom(tonePool);
        out.push({
          freq: notes[idx].freq,
          label: notes[idx].label,
          cellIndex: idx,
          sound,
          params: randomStepParams(sound),
          duration, subdivision,
        });
      }
      return out;
    }
