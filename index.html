<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Drive Music Player</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body {
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcome {
      text-align: center;
      padding: 60px 40px;
      background: #1a1a2e;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      max-width: 480px;
      width: 100%;
    }

    .welcome-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .welcome h1 {
      font-size: 2rem;
      color: #f0f4ff;
      margin-bottom: 12px;
    }

    .welcome p {
      color: #a0aec0;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .launch-btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #5a67d8, #667eea);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(90, 103, 216, 0.4);
    }

    .launch-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(90, 103, 216, 0.6);
    }
  </style>
</head>
<body>
  <div class="welcome">
    <div class="welcome-icon">🎵</div>
    <h1>Google Drive Music Player</h1>
    <p>Stream your music directly from Google Drive. Connect your account and start listening instantly.</p>
    <a href="player.html" class="launch-btn">Open Player</a>
  </div>
</body>
</html>
