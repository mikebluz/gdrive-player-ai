<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mike Luz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #1a1a2e;
      --surface2: #0f0f1a;
      --accent: #4299e1;
      --accent2: #2b6cb0;
      --text: #e2e8f0;
      --muted: #a0aec0;
      --border: #2d2d3f;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HERO BANNER (Mercy Wizard wordmark, replaces the old h1) */
    .hero-banner {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 12px;
      max-width: 480px;
    }
    .hero-banner img {
      display: block;
      width: 100%;
      height: auto;
      filter: invert(1);
    }

    .hero-name {
      color: #f0f4ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 500;
      letter-spacing: 0.2px;
      margin-bottom: 32px;
    }
    .hero-name-em {
      font-weight: 700;
    }
    .hero-name-de {
      font-size: 0.65em;
      font-weight: 300;
      color: rgba(240, 244, 255, 0.75);
      letter-spacing: 0.4px;
      margin: 0 0.6em;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 60px;
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    /* HERO */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
    }

    .hero-inner {
      max-width: 640px;
    }

    .hero-portrait {
      display: block;
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 50%;
      margin: 0 auto 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    @media (max-width: 600px) {
      .hero-portrait { width: 160px; height: 160px; margin-bottom: 20px; }
    }

    .hero h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      color: #f0f4ff;
      letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .hero p {
      color: var(--muted);
      font-size: 1.15rem;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .hero-cta {
      display: inline-flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    .hero-cta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hero-cta-top { margin-bottom: 20px; }

    .btn {
      display: inline-block;
      padding: 13px 32px;
      border-radius: 30px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: #000;
      color: #fff;
      border: 1px solid #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      background: #bf00ff;
      color: #fff;
      border-color: #bf00ff;
      box-shadow: 0 0 24px rgba(191, 0, 255, 0.65);
    }

    .btn-secondary {
      background: transparent;
      color: #4299e1;
      border: 1px solid #4299e1;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(66, 153, 225, 0.1);
      box-shadow: 0 8px 28px rgba(66, 153, 225, 0.175);
    }

    .btn-mailinglist {
      background: transparent;
      color: #68d391;
      border: 1px solid #68d391;
    }

    .btn-mailinglist:hover {
      transform: translateY(-2px);
      background: rgba(104, 211, 145, 0.1);
      box-shadow: 0 8px 28px rgba(104, 211, 145, 0.2);
    }

    .btn-guitars {
      background: transparent;
      color: #f6ad55;
      border: 1px solid #f6ad55;
    }
    .btn-guitars:hover {
      transform: translateY(-2px);
      background: rgba(246, 173, 85, 0.1);
      box-shadow: 0 8px 28px rgba(246, 173, 85, 0.2);
    }

    .btn-ghost {
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* SECTIONS */
    section {
      padding: 100px 24px;
    }

    .section-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      color: #f0f4ff;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }

    .section-body {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .section-body p + p {
      margin-top: 16px;
    }

    /* DIVIDER */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      max-width: 800px;
      margin: 0 auto;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 36px;
      margin-top: 40px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .card h3 {
      font-size: 1.4rem;
      color: #f0f4ff;
      margin-bottom: 10px;
    }

    .card p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .card-grid .card { margin-top: 0; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      text-align: center;
      color: var(--border);
      font-size: 0.75rem;
    }

    /* SOCIAL BAR — sits inside the hero, just under the heading. Replace the
       # hrefs on the TikTok and Substack links with the real URLs when ready. */
    .social-bar {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 0 0 28px;
      flex-wrap: wrap;
    }
    .social-bar a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .social-bar a:hover { color: var(--accent); }
    .social-bar svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* MAILING LIST MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 24px;
    }

    .modal-backdrop.open {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .modal h2 {
      font-size: 1.5rem;
      color: #f0f4ff;
      margin-bottom: 8px;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .mc-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mc-form input[type="email"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .mc-form input[type="email"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .mc-form button {
      background: linear-gradient(135deg, #2b6cb0, #4299e1);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .mc-form button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(66, 153, 225, 0.3);
    }

    .mc-honeypot {
      position: absolute;
      left: -5000px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* MOBILE */
    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .nav-links { gap: 20px; }
      section { padding: 80px 20px; }
      .card { padding: 24px; }
      .modal { padding: 28px 22px; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-inner">
      <img src="me2026.jpg" alt="Mike Luz" class="hero-portrait" />
      <div class="hero-cta hero-cta-top">
        <a href="https://linktr.ee/mercywizard" class="btn btn-primary" target="_blank" rel="noopener">Recordings</a>
        <div class="hero-cta-row">
          <a href="serialbox.html" class="btn btn-primary">Serialbox</a>
          <a href="bloops.html" class="btn btn-primary">Bloops</a>
        </div>
      </div>
      <div class="hero-banner">
        <img src="banner.jpg" alt="Mercy Wizard" />
      </div>
      <div class="hero-name"><span class="hero-name-de">a</span><span class="hero-name-em">Mike Luz</span><span class="hero-name-de">production</span></div>
      <div class="social-bar">
        <a href="#" target="_blank" rel="noopener" title="TODO: replace # with the TikTok URL" aria-label="TikTok (placeholder)">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="9" cy="17" r="3"></circle>
            <path d="M12 17 L12 6 C12 6, 14 8, 18 8"></path>
          </svg>
          TikTok
        </a>
        <a href="https://instagram.com/mercywizard" target="_blank" rel="noopener" aria-label="Instagram: @mercywizard">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.5" cy="6.5" r="0.6" fill="currentColor" stroke="none"></circle>
          </svg>
          Instagram
        </a>
        <a href="#" target="_blank" rel="noopener" title="TODO: replace # with the Substack URL" aria-label="Substack (placeholder)">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="7" x2="19" y2="7"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <line x1="5" y1="17" x2="19" y2="17"></line>
          </svg>
          Substack
        </a>
        <a href="https://www.youtube.com/@mike_buys_guitars" target="_blank" rel="noopener" aria-label="YouTube: @mike_buys_guitars">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="6" width="20" height="14" rx="3"></rect>
            <polygon points="10,10 16,13 10,16" fill="currentColor" stroke="none"></polygon>
          </svg>
          YouTube
        </a>
      </div>
      <div class="hero-cta">
        <button type="button" class="btn btn-mailinglist" id="mailing-list-btn">Join Mailing List</button>
        <a href="https://linktr.ee/mikebuys" class="btn btn-guitars" target="_blank" rel="noopener">Guitars</a>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 Mike Luz
  </footer>

  <!--
    Mailing list modal — uses Mailchimp's classic embedded form.
    Replace the placeholders below with values from your Mailchimp account
    (Audience → Signup forms → Embedded forms → Naked):
      MC_ACTION_URL: form action URL, e.g.
        https://YOUR_DC.list-manage.com/subscribe/post?u=USER_ID&id=LIST_ID
      MC_HONEYPOT_NAME: the b_USER_ID_LIST_ID name from Mailchimp's hidden bot field
  -->
  <div class="modal-backdrop" id="mailing-list-modal" role="dialog" aria-modal="true" aria-labelledby="mailing-list-title">
    <div class="modal">
      <button type="button" class="modal-close" id="mailing-list-close" aria-label="Close">&times;</button>
      <h2 id="mailing-list-title">Join the mailing list</h2>
      <p>Occasional updates on new music, tools, and writing. No spam.</p>
      <form
        action="MC_ACTION_URL"
        method="post"
        target="_blank"
        novalidate
        class="mc-form"
      >
        <input type="email" name="EMAIL" placeholder="you@example.com" required aria-label="Email address" />
        <div class="mc-honeypot" aria-hidden="true">
          <input type="text" name="MC_HONEYPOT_NAME" tabindex="-1" value="" />
        </div>
        <button type="submit" name="subscribe">Subscribe</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const modal = document.getElementById('mailing-list-modal');
      const openBtn = document.getElementById('mailing-list-btn');
      const closeBtn = document.getElementById('mailing-list-close');
      const open = () => modal.classList.add('open');
      const close = () => modal.classList.remove('open');
      openBtn?.addEventListener('click', open);
      closeBtn?.addEventListener('click', close);
      modal?.addEventListener('click', (e) => { if (e.target === modal) close(); });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('open')) close();
      });
    })();
  </script>

</body>
</html>
